<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>天命｜过回合加载</title>
  <link rel="icon" href="data:,">
  <!--
    过回合加载 · 预览页（preview mockup，不是运行时代码；对齐 schema 以运行时渲染器为权威）
    2026-06-10 接手收拢：原稿为四层叠加 CSS（三栏布局 → minimal cinematic → real loading → typography），
    此版收成单层定稿，删除被废弃布局遗留的隐藏 DOM（左侧阶段栏 / 右侧战报面板 / 回合摘要 chips / 缩略图池）。
    31 个真实管线阶段与 34 张场景图数据逐字保留。右下角操控条为预览页专属，不属于拟上线 UI。
  -->
  <style>
    :root {
      --ink-950: #080604;
      --ink-900: #100c08;
      --ink-820: #17110c;
      --ink-760: #241a11;
      --paper-100: #f5ead0;
      --paper-200: #dfcda6;
      --paper-350: #b9a06b;
      --gold-300: #e4c475;
      --gold-450: #c59b42;
      --gold-650: #7b5821;
      --red-400: #b84a38;
      --red-650: #6e211a;
      --green-300: #8cb99a;
      --blue-300: #8caac2;
      --stage-accent-rgb: 228, 196, 117;
      --stage-cinnabar-rgb: 184, 74, 56;
      --shadow-hard: 0 24px 80px rgba(0, 0, 0, 0.68);
      --display: "Source Han Serif SC Heavy", "Source Han Serif SC", "Noto Serif CJK SC", "Noto Serif SC", "STZhongsong", "SimSun", serif;
      --serif: "Source Han Serif SC", "Noto Serif CJK SC", "Noto Serif SC", "STZhongsong", "SimSun", serif;
      --narrative: "FangSong", "STFangsong", "KaiTi", "Kaiti SC", "SimSun", serif;
      --sans: "Microsoft YaHei UI", "Microsoft YaHei", "Source Han Sans SC", "Noto Sans CJK SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--ink-950);
      color: var(--paper-100);
      font-family: var(--serif);
      font-kerning: normal;
      font-synthesis-weight: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body {
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    /* ============ 壳层与阶段组色相 ============ */

    .etl-shell {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background: #0a0704;
    }

    .etl-shell[data-group-key="prep"] {
      --stage-accent-rgb: 226, 196, 117;
      --stage-cinnabar-rgb: 128, 84, 38;
    }

    .etl-shell[data-group-key="entry"] {
      --stage-accent-rgb: 228, 196, 117;
      --stage-cinnabar-rgb: 184, 74, 56;
    }

    .etl-shell[data-group-key="prefetch"] {
      --stage-accent-rgb: 196, 176, 120;
      --stage-cinnabar-rgb: 94, 108, 86;
    }

    .etl-shell[data-group-key="ai"] {
      --stage-accent-rgb: 232, 210, 142;
      --stage-cinnabar-rgb: 170, 68, 50;
    }

    .etl-shell[data-group-key="deepsim"] {
      --stage-accent-rgb: 198, 196, 156;
      --stage-cinnabar-rgb: 96, 104, 118;
    }

    .etl-shell[data-group-key="edict"] {
      --stage-accent-rgb: 232, 184, 94;
      --stage-cinnabar-rgb: 184, 74, 56;
    }

    .etl-shell[data-group-key="systems"] {
      --stage-accent-rgb: 186, 205, 174;
      --stage-cinnabar-rgb: 115, 76, 42;
    }

    .etl-shell[data-group-key="render"] {
      --stage-accent-rgb: 225, 194, 132;
      --stage-cinnabar-rgb: 144, 48, 38;
    }

    .etl-shell[data-group-key="final"] {
      --stage-accent-rgb: 246, 222, 154;
      --stage-cinnabar-rgb: 190, 72, 46;
    }

    /* ============ 背景影像（双缓冲交叉淡化 + 缓慢推镜） ============ */

    .etl-bg,
    .etl-bg-next {
      position: fixed;
      inset: 0;
      z-index: -5;
      background-image: var(--scene-url);
      background-size: cover;
      background-position: center;
      filter: saturate(0.86) contrast(1.08) brightness(0.72);
      transform: scale(1.055);
      transform-origin: 58% 46%;
      transition: opacity 1400ms ease, transform 2200ms ease, filter 1400ms ease;
      will-change: opacity, transform;
      animation: etl-scene-drift 16s ease-in-out infinite alternate;
    }

    .etl-bg-next {
      opacity: 0;
      background-image: var(--next-scene-url);
    }

    .etl-shell.is-swapping .etl-bg {
      opacity: 0;
      transform: scale(1.075) translate3d(-0.35%, 0.15%, 0);
    }

    .etl-shell.is-swapping .etl-bg-next {
      opacity: 1;
      transform: scale(1.055) translate3d(0.2%, -0.12%, 0);
      /* 墨晕转场：新景如墨滴在绢上洇开 */
      -webkit-mask-image: radial-gradient(circle at 44% 50%, black 55%, transparent 74%);
      mask-image: radial-gradient(circle at 44% 50%, black 55%, transparent 74%);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: 44% 50%;
      mask-position: 44% 50%;
      animation: etl-ink-wipe 1400ms ease forwards;
    }

    /* 影像缺失兜底：无可用场景时隐藏影像层，靠氛围层撑住画面 */
    .etl-shell.no-scenes .etl-bg,
    .etl-shell.no-scenes .etl-bg-next {
      display: none;
    }

    .etl-shell.no-scenes .etl-stage-wash {
      opacity: 0.72;
    }

    .etl-shell.no-scenes::before {
      background:
        radial-gradient(circle at 64% 36%, rgba(226, 174, 79, 0.16), transparent 38%),
        radial-gradient(circle at 22% 74%, rgba(122, 34, 22, 0.2), transparent 34%),
        linear-gradient(90deg, rgba(5, 4, 3, 0.96) 0%, rgba(10, 7, 5, 0.86) 38%, rgba(12, 8, 5, 0.78) 62%, rgba(5, 4, 3, 0.94) 100%),
        linear-gradient(180deg, rgba(8, 6, 4, 0.9) 0%, rgba(10, 7, 5, 0.6) 34%, rgba(8, 6, 4, 0.96) 100%);
    }

    /* 暗角与扫描纹帷幕 */
    .etl-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(5, 4, 3, 0.95) 0%, rgba(8, 6, 4, 0.68) 34%, rgba(8, 6, 4, 0.22) 62%, rgba(5, 4, 3, 0.82) 100%),
        linear-gradient(180deg, rgba(8, 6, 4, 0.86) 0%, rgba(8, 6, 4, 0.12) 34%, rgba(8, 6, 4, 0.94) 100%);
    }

    .etl-shell::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      opacity: 0.2;
      background-image:
        linear-gradient(90deg, rgba(228, 196, 117, 0.18), transparent 20%, transparent 80%, rgba(228, 196, 117, 0.08)),
        repeating-linear-gradient(180deg, rgba(255, 244, 210, 0.028) 0 1px, transparent 1px 9px);
      background-size: 100% 100%, 100% 18px;
      animation: etl-veil-scan 5.6s linear infinite;
    }

    .etl-grain {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.12;
      mix-blend-mode: soft-light;
      background:
        repeating-radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.24) 0 1px, transparent 1px 7px),
        repeating-radial-gradient(circle at 76% 62%, rgba(0, 0, 0, 0.35) 0 1px, transparent 1px 9px);
      background-size: 220px 180px, 260px 220px;
    }

    .etl-stage-wash,
    .etl-archive-drift,
    .etl-ruling-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .etl-stage-wash {
      z-index: -3;
      inset: -10%;
      opacity: 0.52;
      mix-blend-mode: screen;
      background:
        linear-gradient(112deg, transparent 0 18%, rgba(var(--stage-accent-rgb), 0.13) 34%, transparent 54%),
        linear-gradient(82deg, rgba(var(--stage-cinnabar-rgb), 0.12), transparent 42%, rgba(var(--stage-accent-rgb), 0.08) 78%, transparent);
      background-size: 150% 100%, 120% 120%;
      filter: blur(10px);
      transform: translate3d(-3%, 0, 0);
      transition: opacity 360ms ease, filter 360ms ease;
      animation: etl-wash-breathe 7.2s ease-in-out infinite;
    }

    .etl-shell.is-stage-change .etl-stage-wash {
      animation: etl-stage-wash-pop 460ms ease both, etl-wash-breathe 7.2s ease-in-out infinite;
    }

    .etl-archive-drift {
      z-index: -2;
      inset: -18%;
      opacity: 0.2;
      background:
        repeating-linear-gradient(92deg, transparent 0 74px, rgba(var(--stage-accent-rgb), 0.1) 74px 75px, transparent 75px 132px),
        linear-gradient(90deg, transparent, rgba(255, 244, 210, 0.08), transparent);
      mask-image: linear-gradient(90deg, black 0 42%, transparent 82%);
      transform: translate3d(-4%, 0, 0) rotate(-1deg);
      animation: etl-archive-drift 18s linear infinite;
    }

    .etl-ruling-lines {
      z-index: 1;
      opacity: 0.13;
      mix-blend-mode: screen;
      background:
        repeating-linear-gradient(180deg, rgba(var(--stage-accent-rgb), 0.24) 0 1px, transparent 1px 34px),
        linear-gradient(90deg, rgba(var(--stage-cinnabar-rgb), 0.14), transparent 32%, transparent 72%, rgba(var(--stage-accent-rgb), 0.08));
      mask-image: linear-gradient(90deg, black 0 42%, transparent 74%);
      transform: translate3d(0, -18px, 0);
      animation: etl-ruling-scan 6.4s linear infinite;
    }

    /* 金尘微粒：低密度上浮，撑出空气感 */
    .etl-motes {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .etl-mote {
      position: absolute;
      left: var(--mote-x, 20%);
      bottom: -2vh;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(var(--stage-accent-rgb), 0.85);
      box-shadow: 0 0 8px rgba(var(--stage-accent-rgb), 0.55);
      filter: blur(0.4px);
      opacity: 0;
      animation: etl-mote-rise var(--mote-dur, 13s) linear infinite;
      animation-delay: var(--mote-delay, 0s);
    }

    .etl-mote:nth-child(2n) {
      width: 2px;
      height: 2px;
    }

    .etl-mote:nth-child(3n) {
      width: 4px;
      height: 4px;
      filter: blur(1px);
    }

    /* ============ 中轴主栏 ============ */

    .etl-frame {
      position: relative;
      z-index: 3;
      display: block;
      min-height: 100vh;
      padding: 0;
    }

    .etl-main {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 0;
    }

    .etl-main-inner {
      position: relative;
      width: min(650px, calc(100vw - 36px));
      margin-left: clamp(22px, 10vw, 148px);
      padding-left: clamp(0px, 1.4vw, 20px);
      transform: translateY(-5vh);
      animation: etl-panel-arrive 780ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .etl-shell.is-restarting .etl-main-inner {
      animation: etl-panel-leave 560ms ease both;
    }

    .etl-main-inner::before,
    .etl-main-inner::after {
      content: "";
      position: absolute;
      left: 0;
      pointer-events: none;
    }

    .etl-main-inner::before {
      top: 10px;
      bottom: 8px;
      width: 1px;
      background:
        linear-gradient(180deg, transparent, rgba(var(--stage-accent-rgb), 0.62) 16%, rgba(var(--stage-cinnabar-rgb), 0.36) 58%, transparent);
      box-shadow: 0 0 24px rgba(var(--stage-accent-rgb), 0.2);
      opacity: 0.7;
      transform-origin: top;
      animation: etl-rule-grow 980ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .etl-main-inner::after {
      top: 10px;
      width: min(260px, 44vw);
      height: 1px;
      background: linear-gradient(90deg, rgba(var(--stage-accent-rgb), 0.56), transparent);
      opacity: 0.44;
    }

    .etl-date {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 22px;
      margin-bottom: 12px;
      color: rgba(var(--stage-accent-rgb), 0.76);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.78);
      transition: color 360ms ease;
    }

    .etl-date::before {
      content: "";
      width: 46px;
      height: 1px;
      background: linear-gradient(90deg, rgba(var(--stage-accent-rgb), 0.72), rgba(var(--stage-cinnabar-rgb), 0.24), transparent);
    }

    /* 大标题随阶段组切换叙事词，渐变金随组色相走 */
    .etl-title {
      margin: 0;
      color: transparent;
      font-family: var(--display);
      font-size: 96px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0.09em;
      text-indent: 0.09em;
      white-space: nowrap;
      word-break: keep-all;
      background:
        linear-gradient(180deg, #fff3c8 0%, rgba(var(--stage-accent-rgb), 0.96) 34%, rgba(117, 77, 34, 0.98) 74%, #f8e7ad 100%);
      background-size: 100% 180%;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 1px 0 rgba(255, 248, 219, 0.18),
        0 22px 52px rgba(0, 0, 0, 0.86);
      animation: etl-title-breathe 4.8s ease-in-out infinite, etl-gold-shift 8.4s ease-in-out infinite;
    }

    .etl-title-text {
      display: inline-block;
    }

    .etl-shell.is-title-swap .etl-title-text {
      animation: etl-title-swap 760ms cubic-bezier(0.3, 0.7, 0.2, 1) both;
    }

    .etl-current {
      width: min(500px, 100%);
      margin-top: 22px;
      color: rgba(245, 234, 208, 0.9);
      font-family: var(--narrative);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.58;
      letter-spacing: 0.035em;
      text-shadow:
        0 1px 0 rgba(255, 239, 198, 0.08),
        0 3px 16px rgba(0, 0, 0, 0.86);
      transition: color 360ms ease, text-shadow 360ms ease;
    }

    .etl-current strong {
      color: var(--gold-300);
      font-weight: 800;
    }

    .etl-live-detail {
      width: min(500px, 100%);
      min-height: 20px;
      margin-top: 9px;
      color: rgba(232, 217, 184, 0.58);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.62;
      letter-spacing: 0.035em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.76);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .etl-shell.is-stage-change .etl-live-detail {
      opacity: 0;
      transform: translateY(4px);
    }

    /* ============ 进度区（主轨 + 31 细项微轨 + 队列 + 管线分组） ============ */

    .etl-progress-wrap {
      position: relative;
      width: min(520px, 100%);
      margin-top: 24px;
      padding-top: 10px;
    }

    .etl-progress-wrap::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      opacity: 0.38;
      background:
        linear-gradient(90deg, rgba(var(--stage-accent-rgb), 0.72), rgba(var(--stage-cinnabar-rgb), 0.28), transparent 76%);
      transform-origin: left;
      animation: etl-rail-prime 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .etl-progress-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
      color: rgba(var(--stage-accent-rgb), 0.82);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: color 260ms ease;
    }

    .etl-progress-meta span:first-child {
      max-width: 74%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .etl-progress-meta span:last-child {
      color: rgba(246, 234, 202, 0.74);
      font-size: 10px;
      font-weight: 800;
    }

    .etl-progress {
      position: relative;
      height: 10px;
      overflow: hidden;
      border: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0 calc((100% / var(--micro-count, 30)) - 1px), rgba(var(--stage-accent-rgb), 0.2) calc((100% / var(--micro-count, 30)) - 1px) calc(100% / var(--micro-count, 30))),
        linear-gradient(90deg, rgba(8, 6, 4, 0.88), rgba(18, 13, 8, 0.84));
      box-shadow:
        inset 0 0 0 1px rgba(var(--stage-accent-rgb), 0.2),
        inset 0 0 18px rgba(0, 0, 0, 0.9),
        0 12px 28px rgba(0, 0, 0, 0.42);
    }

    .etl-progress::after {
      content: "";
      position: absolute;
      inset: -18px 0;
      opacity: 0.18;
      background:
        linear-gradient(90deg, transparent, rgba(var(--stage-accent-rgb), 0.42), transparent);
      transform: translateX(-70%);
      animation: etl-progress-sweep 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .etl-shell.is-stage-change .etl-progress {
      animation: etl-progress-knock 340ms ease;
    }

    .etl-progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress, 8%);
      background:
        linear-gradient(90deg, rgba(var(--stage-cinnabar-rgb), 0.72), rgba(var(--stage-accent-rgb), 0.98) 62%, rgba(var(--stage-cinnabar-rgb), 0.9));
      box-shadow:
        0 0 18px rgba(var(--stage-accent-rgb), 0.3),
        0 0 1px rgba(255, 244, 210, 0.9);
      transition: width 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .etl-progress-fill::before {
      /* 笔锋：进度前沿如笔尖运墨 */
      content: "";
      position: absolute;
      top: -5px;
      right: -4px;
      width: 9px;
      height: 20px;
      background: linear-gradient(180deg, rgba(255, 244, 210, 0.95), rgba(var(--stage-accent-rgb), 0.85) 55%, rgba(var(--stage-cinnabar-rgb), 0.8));
      clip-path: polygon(50% 0, 92% 30%, 62% 100%, 22% 58%);
      box-shadow: 0 0 16px rgba(var(--stage-accent-rgb), 0.8);
    }

    .etl-progress-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.74;
      background: linear-gradient(90deg, transparent, rgba(255, 244, 210, 0.65), transparent);
      transform: translateX(-80%);
      animation: etl-shimmer 2.2s linear infinite;
    }

    .etl-micro-rail {
      display: grid;
      grid-template-columns: repeat(var(--micro-count, 30), minmax(0, 1fr));
      gap: 2px;
      width: 100%;
      height: 18px;
      margin-top: 8px;
    }

    .etl-micro-cell {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-top: 1px solid rgba(var(--stage-accent-rgb), 0.16);
      opacity: 0.5;
    }

    .etl-micro-cell::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 5px;
      height: 3px;
      background: rgba(223, 205, 166, 0.16);
      transform-origin: left center;
      transform: scaleX(0.28);
      transition: transform 320ms ease, background 240ms ease, box-shadow 240ms ease;
    }

    .etl-micro-cell.is-done::before {
      transform: scaleX(1);
      background: rgba(var(--stage-accent-rgb), 0.56);
    }

    .etl-micro-cell.is-active {
      opacity: 1;
    }

    .etl-micro-cell.is-active::before {
      transform: scaleX(1);
      background: rgba(245, 234, 208, 0.92);
      box-shadow: 0 0 13px rgba(var(--stage-accent-rgb), 0.64);
      animation: etl-cell-pulse 820ms ease-in-out infinite alternate;
    }

    .etl-subqueue {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      width: min(520px, 100%);
      margin-top: 6px;
      color: rgba(232, 217, 184, 0.5);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
      font-size: 10.5px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.025em;
    }

    .etl-subqueue span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .etl-subqueue span:first-child {
      color: rgba(var(--stage-accent-rgb), 0.62);
      font-weight: 800;
    }

    .etl-subqueue .now {
      color: rgba(246, 234, 202, 0.86);
      font-weight: 800;
    }

    .etl-flow {
      display: grid;
      grid-template-columns: repeat(var(--flow-count, 8), minmax(0, 1fr));
      gap: 2px;
      width: min(520px, 100%);
      margin-top: 12px;
    }

    .etl-flow-step {
      position: relative;
      height: 23px;
      padding-top: 7px;
      border-top: 1px solid rgba(var(--stage-accent-rgb), 0.13);
      color: rgba(223, 205, 166, 0.36);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
      font-size: 10.5px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.035em;
      overflow: hidden;

        return aliveSceneIndexes();
      }

      function setDateLine(scene) {
        dateLine.textContent = scene.tone + ' · 天启七年 九月 朔后';
      }

      function setScene(index, instant) {
        if (index === sceneIndex || index == null || broken[index]) return;
        if (swapping) {
          pendingScene = index;
          return;
        }
        sceneIndex = index;
        var scene = scenes[sceneIndex];
        setDateLine(scene);
        if (instant || reduceMotion) {
          shell.style.setProperty('--scene-url', "url('" + scene.url + "')");
          return;
        }
        swapping = true;
        shell.style.setProperty('--next-scene-url', "url('" + scene.url + "')");
        shell.classList.add('is-swapping');
        window.clearTimeout(swapTimer);
        swapTimer = window.setTimeout(function() {
          shell.style.setProperty('--scene-url', "url('" + scene.url + "')");
          shell.classList.remove('is-swapping');
          swapping = false;
          if (pendingScene >= 0) {
            var next = pendingScene;
            pendingScene = -1;
            setScene(next);
          }
        }, CROSSFADE_MS);
      }

      function advanceWithinPool() {
        var key = shell.getAttribute('data-group-key') || 'entry';
        var pool = poolFor(key);
        if (!pool.length) return;
        var at = pool.indexOf(sceneIndex);
        setScene(pool[(at + 1) % pool.length]);
      }

      function manualScene() {
        var alive = aliveSceneIndexes();
        if (!alive.length) return;
        var at = alive.indexOf(sceneIndex);
        setScene(alive[(at + 1) % alive.length]);
      }

      function sceneForGroup(groupKey) {
        var pool = poolFor(groupKey);
        if (!pool.length) return;
        if (pool.indexOf(sceneIndex) >= 0) return; // 已在该组氛围内，不强切
        setScene(pool[0]);
      }

      function preloadScenes() {
        scenes.forEach(function(scene, index) {
          var img = new Image();
          img.decoding = 'async';
          img.onerror = function() {
            broken[index] = true;
            brokenCount += 1;
            if (brokenCount >= scenes.length) {
              shell.classList.add('no-scenes');
            } else if (index === sceneIndex) {
              var alive = aliveSceneIndexes();
              if (alive.length) setScene(alive[0], true);
            }
          };
          img.src = scene.url;
        });
      }

      // ---- 大标题叙事 ----

      function setTitle(groupKey) {
        var next = groupTitles[groupKey] || groupTitles.entry;
        var glyph = groupGlyphs[groupKey] || groupGlyphs.entry;
        if (titleLine.textContent === next) return;
        if (reduceMotion) {
          titleLine.textContent = next;
          groupGlyph.textContent = glyph;
          return;
        }
        shell.classList.remove('is-title-swap');
        void shell.offsetWidth;
        shell.classList.add('is-title-swap');
        window.clearTimeout(titleTimer);
        window.setTimeout(function() {
          titleLine.textContent = next;
          groupGlyph.textContent = glyph;
        }, Math.round(TITLE_SWAP_MS * 0.42));
        titleTimer = window.setTimeout(function() {
          shell.classList.remove('is-title-swap');
        }, TITLE_SWAP_MS + 40);
      }

      // ---- 起居注流水（已毕阶段，右缘竖排） ----

      var ANNALS_CAP = 12;
      var annalsCount = 0;

      function annalEntry(idx, fresh) {
        var el = document.createElement('span');
        var groupStart = idx === 0 || stages[idx - 1].group !== stages[idx].group;
        el.className = 'etl-annal' + (groupStart ? ' is-group-start' : '') + (fresh ? ' is-fresh' : '');
        el.textContent = stages[idx].name;
        return el;
      }

      function syncAnnals(animate) {
        if (step < annalsCount) {
          // 回跳/重演：直接重建，不做笔触动画
          annalsLog.innerHTML = '';
          annalsCount = 0;
          animate = false;
        }
        while (annalsCount < step) {
          annalsLog.appendChild(annalEntry(annalsCount, animate));
          annalsCount += 1;
        }
        while (annalsLog.children.length > ANNALS_CAP) {
          annalsLog.removeChild(annalsLog.firstChild);
        }
      }

      // ---- 流式拍模拟（复刻 tm-endturn-ai:3467 的字数进度回调） ----

      function startStreamSim(stage) {
        window.clearInterval(streamTimer);
        var chars = 0;
        streamTimer = window.setInterval(function() {
          if (paused || document.hidden) return;
          chars += Math.round((1400 + Math.random() * 800) * speed);
          var approx = 50 + Math.min(15, Math.floor(chars / 1500));
          var label = 'AI推演中·已生成' + (Math.round(chars / 100) / 10) + 'k字';
          phaseText.textContent = label;
          queueNow.textContent = '正：' + label;
          progressText.textContent = approx + '%';
          progressFill.style.setProperty('--progress', approx + '%');
        }, 160);
      }

      // ---- 阶段推进 ----

      function setStage(index) {
        step = (index + stages.length) % stages.length;
        var stage = stages[step];
        window.clearInterval(streamTimer);
        var groupKey = groupKeyOf(stage.group || stage.short || stage.name);
        var groupChanged = shell.getAttribute('data-group-key') !== groupKey;

        shell.classList.remove('is-stage-change');
        shell.setAttribute('data-group-key', groupKey);
        void shell.offsetWidth;
        shell.classList.add('is-stage-change');
        window.clearTimeout(changeTimer);
        changeTimer = window.setTimeout(function() {
          shell.classList.remove('is-stage-change');
        }, STAGE_CHANGE_MS);

        if (groupChanged) {
          setTitle(groupKey);
          sceneForGroup(groupKey);
        }

        currentLine.innerHTML = stage.line;
        detailLine.textContent = stage.detail || stage.note;
        queueIndex.textContent = '推演项 ' + (step + 1) + '/' + stages.length;
        queueNow.textContent = '正：' + stage.name;
        queueNext.textContent = step < stages.length - 1 ? '候：' + stages[step + 1].name : '候：打开回合结果';
        phaseText.textContent = stage.name;
        progressText.textContent = padPct(stage.pct);
        progressFill.style.setProperty('--progress', stage.pct + '%');

        var groups = flowTrack._groups || [];
        var groupIndex = Math.max(0, groups.indexOf(stage.group || stage.short || stage.name));
        Array.prototype.forEach.call(flowTrack.querySelectorAll('.etl-flow-step'), function(el, idx) {
          el.classList.toggle('is-active', idx === groupIndex);
          el.classList.toggle('is-done', idx < groupIndex);
        });
        Array.prototype.forEach.call(microRail.querySelectorAll('.etl-micro-cell'), function(el, idx) {
          el.classList.toggle('is-active', idx === step);
          el.classList.toggle('is-done', idx < step);
        });
        syncAnnals(true);

        if (stage.stream && !reduceMotion) {
          startStreamSim(stage);
        }

        if (step === stages.length - 1) {
          triggerSeal();
        }
      }

      function triggerSeal() {
        shell.classList.remove('is-sealed');
        void shell.offsetWidth;
        shell.classList.add('is-sealed');
        window.setTimeout(function() {
          shell.classList.remove('is-sealed');
        }, 1000);
      }

      function queueNextStage() {
        window.clearTimeout(stageTimer);
        if (paused) return;
        stageTimer = window.setTimeout(function() {
          if (step === stages.length - 1) {
            restartLoop();
            return;
          }
          setStage(step + 1);
          queueNextStage();
        }, (stages[step].duration || 1600) / speed);
      }

      function restartLoop() {
        // 收束一拍：整栏淡出，再从头开演
        if (reduceMotion) {
          setStage(0);
          queueNextStage();
          return;
        }
        shell.classList.add('is-restarting');
        window.clearTimeout(restartTimer);
        restartTimer = window.setTimeout(function() {
          setStage(0);
          shell.classList.remove('is-restarting');
          // 重新触发入场动画
          mainInner.style.animation = 'none';
          void mainInner.offsetWidth;
          mainInner.style.animation = '';
          queueNextStage();
        }, RESTART_FADE_MS);
      }

      // ---- 计时器编排 ----

      function startAmbient() {
        window.clearInterval(sceneTimer);
        if (reduceMotion) return; // 削减动态：背景不自动轮换（阶段推进保留）
        sceneTimer = window.setInterval(function() {
          if (paused || document.hidden || swapping) return;
          advanceWithinPool();
        }, AMBIENT_SCENE_MS / speed);
      }

      function pause() {
        if (paused) return;
        paused = true;
        window.clearTimeout(stageTimer);
        btnPause.textContent = '继续';
        btnPause.setAttribute('aria-pressed', 'true');
      }

      function resume() {
        if (!paused) return;
        paused = false;
        btnPause.textContent = '暂停';
        btnPause.setAttribute('aria-pressed', 'false');
        queueNextStage();
      }

      function togglePause() {
        if (paused) resume();
        else pause();
      }

      function setSpeed(next) {
        speed = next;
        btnSpeed.textContent = speed + '×';
        queueNextStage();
        startAmbient();
      }

      function stepBy(delta) {
        if (step === stages.length - 1 && delta > 0) {
          restartLoop();
          return;
        }
        setStage(step + delta);
        queueNextStage();
      }

      // ---- 预览操控 ----

      btnPause.addEventListener('click', togglePause);
      btnPrev.addEventListener('click', function() { stepBy(-1); });
      btnNext.addEventListener('click', function() { stepBy(1); });
      btnScene.addEventListener('click', manualScene);
      btnSpeed.addEventListener('click', function() {
        setSpeed(speed === 1 ? 2 : (speed === 2 ? 4 : 1));
      });
      btnReplay.addEventListener('click', function() {
        setStage(0);
        queueNextStage();
      });

      document.addEventListener('keydown', function(ev) {
        if (ev.defaultPrevented) return;
        if (ev.code === 'Space') {
          ev.preventDefault();
          togglePause();
        } else if (ev.code === 'ArrowLeft') {
          stepBy(-1);
        } else if (ev.code === 'ArrowRight') {
          stepBy(1);
        } else if (ev.code === 'KeyS') {
          manualScene();
        } else if (ev.code === 'KeyR') {
          setStage(0);
          queueNextStage();
        }
      });

      // 切到后台暂停计时，回前台续演，避免堆积
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          if (!paused) {
            hiddenAutoPaused = true;
            pause();
          }
        } else if (hiddenAutoPaused) {
          hiddenAutoPaused = false;
          resume();
        }
      });

      // ---- 启动 ----

      renderFlow();
      renderMicroRail();
      preloadScenes();
      shell.style.setProperty('--scene-url', "url('" + scenes[sceneIndex].url + "')");
      setDateLine(scenes[sceneIndex]);
      setStage(0);
      queueNextStage();
      startAmbient();
    })();
  </script>
</body>
</html>
