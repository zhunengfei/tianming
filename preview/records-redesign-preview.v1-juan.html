<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御案·史官实录 · 新 UI 预览 v1</title>
<style>
/* ============================================================
   御案·史官实录 v1 — 史官实录面板重做 (frontend-design + ui-ux-pro-max)
   paradigm: 档案柜 + 卷宗 · 核心 = 四类档案 / 史料权威 / 御批 / 编年长卷
   材质承御案·奏疏·诏书·鸿雁: 绢纸米金 / 朱砂 / 描金 / 墨 / KaiTi
   史官气质: 钤印权威级 · 引用链按语 · 御批朱笔 · 编年年轴进度
   两区: 左书函架(史记/起居注/纪事/编年) | 右卷宗台
   ============================================================ */
:root{
  --desk-1:#dccca6;--desk-2:#c6b083;--desk-3:#a78f68;
  --silk-hi:#fffdf3;--silk:#f6efda;--silk-lo:#ece1c6;--silk-edge:#dcc99c;
  --silk-shadow:rgba(120,90,36,0.1);
  --paper-hi:#fffefb;--paper:#fcf7ec;--paper-lo:#f3ecd9;
  --ink:#241d15;--ink-soft:#574733;--ink-faint:#9c8b6b;
  --gold-hi:#d8b96a;--gold:#a8833a;--gold-d:#7d5e22;
  --cinnabar:#a83228;--cinnabar-hi:#c64a3e;--cinnabar-d:#7a2018;
  --wood-1:#6b4a28;--wood-2:#3f2a14;--wood-edge:#2a1b0c;--knob:#241810;
  --jade:#557f6f;--jade-hi:#6fa291;
  --indigo:#4a5e8a;--indigo-hi:#6a7eaa;--violet:#7c6a90;--amber:#b98b2f;
  /* 史官专用 */
  --vermilion:#b83a2b;        /* 御批朱笔 */
  --seal-faith:#a83228;       /* 信史·朱实印 */
  --seal-doubt:#5c4a2e;       /* 存疑·墨框印 */
  --seal-rumor:#9c8b6b;       /* 风闻·虚线印 */
  --rule-red:rgba(168,50,40,0.16);   /* 朱丝栏 */
  --rule-ink:rgba(80,60,36,0.12);    /* 乌丝栏 */
  --font:"STKaiti","KaiTi","楷体","Noto Serif SC","Source Han Serif CN","STSong",serif;
  --font-doc:"FangSong","STFangsong","仿宋","Noto Serif SC",serif;
  --font-song:"STSong","SimSun","宋体",serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;
  background:
    radial-gradient(46% 36% at 50% -4%, rgba(255,238,196,0.5), transparent 70%),
    radial-gradient(60% 50% at 18% 24%, rgba(120,100,70,0.13), transparent 60%),
    radial-gradient(52% 60% at 86% 76%, rgba(80,60,40,0.16), transparent 55%),
    radial-gradient(120% 120% at 50% 28%, var(--desk-1), var(--desk-2) 54%, var(--desk-3) 100%);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.55;
  background:
    radial-gradient(66% 48% at 50% -2%, rgba(255,239,196,0.38), transparent 60%),
    radial-gradient(150% 130% at 50% 50%, transparent 58%, rgba(48,34,18,0.46) 100%);}

.shi-stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;padding:16px 22px;}
.shi-frame{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;}

/* ── 标题条 ── */
.shi-titlebar{flex:0 0 auto;position:relative;display:flex;align-items:center;justify-content:center;padding:6px 0 12px;margin-bottom:10px;}
.shi-titlebar::after{content:"";position:absolute;left:6%;right:6%;bottom:2px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(216,185,106,0.75) 22%,rgba(216,185,106,0.75) 78%,transparent);}
.shi-titlebar::before{content:"";position:absolute;left:6%;right:6%;bottom:5px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,131,58,0.32) 30%,rgba(168,131,58,0.32) 70%,transparent);}
.st-center{text-align:center;position:relative;}
.st-main{position:relative;z-index:1;font-size:25px;font-weight:bold;letter-spacing:0.32em;color:var(--ink);line-height:1.05;
  text-shadow:0 1px 0 rgba(255,255,255,0.7),0 2px 4px rgba(120,90,36,0.26),0 0 16px rgba(216,185,106,0.24);}
.st-main::before,.st-main::after{content:"";display:inline-block;width:30px;height:1px;vertical-align:0.34em;margin:0 16px;background:linear-gradient(90deg,transparent,var(--gold));}
.st-main::after{background:linear-gradient(90deg,var(--gold),transparent);}
.st-sub{font-size:12.5px;color:var(--ink-faint);letter-spacing:0.34em;margin-top:5px;}
.st-sub::before,.st-sub::after{content:"❖";font-size:7px;color:var(--gold);opacity:0.62;vertical-align:0.22em;margin:0 11px;letter-spacing:0;}
.shi-chips{position:absolute;right:2px;top:8px;display:flex;gap:7px;}
.chip{font-size:11.5px;letter-spacing:0.06em;padding:3px 11px;border-radius:11px;border:1px solid var(--gold-d);
  background:rgba(255,250,235,0.7);color:var(--ink-soft);white-space:nowrap;}
.chip.hot{border-color:var(--cinnabar);color:#fff;background:linear-gradient(160deg,var(--cinnabar),var(--cinnabar-d));box-shadow:0 1px 5px rgba(122,32,24,0.4);}
.chip.green{border-color:var(--jade);color:#23463a;background:rgba(111,162,145,0.22);}
.shi-close{position:absolute;left:0;top:2px;z-index:40;width:34px;height:34px;border-radius:50%;border:1px solid var(--gold-d);
  background:rgba(255,253,243,0.7);color:var(--gold-d);font-size:18px;line-height:1;cursor:pointer;transition:all .18s ease;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(60,40,20,0.25);}
.shi-close:hover{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);transform:rotate(90deg);}

/* ── 两区主体 ── */
.shi-body{flex:1;min-height:0;display:flex;gap:18px;}

/* ════════ 左 · 书函架 ════════ */
.rack{flex:0 0 244px;min-height:0;display:flex;flex-direction:column;position:relative;
  border:1px solid rgba(168,131,58,0.22);border-radius:12px;overflow:hidden;
  background:linear-gradient(180deg,rgba(58,40,22,0.06),rgba(40,28,15,0.1)),linear-gradient(180deg,rgba(255,253,243,0.4),rgba(245,236,210,0.2));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.4),0 16px 38px -20px rgba(50,32,14,0.46);}
.rack-hd{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:15px 16px 12px;border-bottom:1px solid rgba(168,131,58,0.2);}
.rack-seal{width:32px;height:32px;flex:0 0 auto;display:grid;place-items:center;border-radius:8px;font-size:17px;color:#fff;font-weight:bold;
  background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.6);
  box-shadow:0 2px 6px rgba(122,32,24,0.4),inset 0 1px 0 rgba(255,255,255,0.28);}
.rack-hd b{font-size:15px;letter-spacing:0.12em;color:var(--ink);display:block;}
.rack-hd span{font-size:11px;color:var(--ink-faint);letter-spacing:0.05em;}

/* 四函书脊 */
.rack-fns{flex:0 0 auto;padding:13px 13px 6px;display:flex;flex-direction:column;gap:9px;}
.fn{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;font-family:var(--font);
  padding:12px 13px 12px 16px;border-radius:8px;border:1px solid rgba(168,131,58,0.28);
  background:linear-gradient(100deg,var(--silk-hi),var(--silk) 72%,var(--silk-lo));
  box-shadow:0 2px 8px -3px rgba(60,40,20,0.2),inset 0 1px 0 rgba(255,255,255,0.5);transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden;}
.fn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--fnc,var(--gold));}
.fn:hover{transform:translateX(3px);box-shadow:0 5px 14px -5px rgba(60,40,20,0.34);border-color:var(--gold);}
.fn.active{transform:translateX(5px);border-color:var(--cinnabar);box-shadow:-2px 0 0 var(--cinnabar),0 7px 18px -6px rgba(60,40,20,0.4);background:linear-gradient(100deg,#fffef7,#fbf4e0);}
.fn-glyph{width:36px;height:46px;flex:0 0 auto;border-radius:5px;display:grid;place-items:center;font-size:21px;font-weight:bold;color:#fff;
  background:linear-gradient(160deg,var(--fnc,var(--gold)),color-mix(in srgb,var(--fnc,var(--gold)) 62%,#000));
  border:1px solid rgba(0,0,0,0.22);box-shadow:0 2px 6px rgba(40,28,15,0.3),inset 0 1px 0 rgba(255,255,255,0.3);position:relative;}
.fn-glyph::after{content:"";position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.28);border-radius:3px;}
.fn-main{flex:1;min-width:0;}
.fn-main b{font-size:15px;color:var(--ink);letter-spacing:0.14em;display:block;line-height:1.3;}
.fn-main span{font-size:10.5px;color:var(--ink-faint);letter-spacing:0.02em;display:block;margin-top:2px;}
.fn-count{flex:0 0 auto;min-width:24px;height:22px;padding:0 7px;border-radius:11px;font-size:11.5px;display:grid;place-items:center;
  color:var(--gold-d);background:rgba(168,131,58,0.14);border:1px solid rgba(168,131,58,0.3);}
.fn.active .fn-count{color:#fff;background:linear-gradient(150deg,var(--cinnabar),var(--cinnabar-d));border-color:var(--cinnabar-d);}

/* 权威级筛选 */
.rack-tools{flex:0 0 auto;margin:8px 13px 0;padding-top:12px;border-top:1px solid rgba(168,131,58,0.2);}
.rack-tools-t{font-size:10.5px;letter-spacing:0.16em;color:var(--ink-faint);margin:0 0 8px 2px;}
.auth-filters{display:flex;flex-direction:column;gap:6px;}
.authf{display:flex;align-items:center;gap:9px;cursor:pointer;font-family:var(--font);font-size:12px;letter-spacing:0.03em;
  padding:6px 10px;border-radius:6px;border:1px solid rgba(168,131,58,0.24);background:rgba(255,252,240,0.5);color:var(--ink-soft);transition:all .15s;}
.authf:hover{border-color:var(--gold);background:rgba(255,252,240,0.8);}
.authf.active{background:rgba(168,131,58,0.12);border-color:var(--gold-d);}
.authf .ax{width:14px;height:14px;flex:0 0 auto;border-radius:50%;}
.authf .ax.faith{background:var(--seal-faith);}
.authf .ax.doubt{background:transparent;border:1.5px solid var(--seal-doubt);}
.authf .ax.rumor{background:transparent;border:1.5px dashed var(--seal-rumor);}
.authf .acount{margin-left:auto;font-size:10.5px;color:var(--ink-faint);}

.rack-foot{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:flex-end;padding:12px 15px 14px;}
.rack-note{font-size:10.5px;line-height:1.7;color:var(--ink-faint);letter-spacing:0.02em;padding-top:11px;border-top:1px dashed rgba(168,131,58,0.26);}
.rack-note b{color:var(--ink-soft);}

/* ════════ 右 · 卷宗台 ════════ */
.table-main{flex:1;min-height:0;display:flex;flex-direction:column;border:1px solid rgba(168,131,58,0.2);border-radius:12px;overflow:hidden;
  background:
    radial-gradient(80% 18% at 50% 0%, rgba(255,255,255,0.5), transparent 60%),
    linear-gradient(180deg,rgba(255,253,243,0.5),rgba(245,236,210,0.26));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),0 18px 44px -22px rgba(50,32,14,0.46);}
.table-head{flex:0 0 auto;padding:16px 24px 13px;border-bottom:1px solid rgba(168,131,58,0.2);position:relative;}
.table-head::after{content:"";position:absolute;left:24px;right:24px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(216,185,106,0.55) 18%,rgba(216,185,106,0.55) 82%,transparent);}
.th-row{display:flex;align-items:flex-end;gap:13px;}
.th-title{flex:1;min-width:0;}
.th-title h2{font-size:20px;letter-spacing:0.14em;color:var(--ink);line-height:1.25;font-weight:bold;text-shadow:0 1px 0 rgba(255,255,255,0.6);}
.th-title p{font-size:11.5px;color:var(--ink-faint);letter-spacing:0.03em;margin-top:4px;}
.th-chips{display:flex;gap:6px;}
.table-tools{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid rgba(168,131,58,0.14);}
.shi-search{position:relative;flex:1;}
.shi-search input{width:100%;font-family:var(--font);font-size:12.5px;letter-spacing:0.03em;color:var(--ink);
  padding:8px 11px 8px 30px;border:1px solid rgba(168,131,58,0.3);border-radius:8px;background:rgba(255,252,242,0.66);outline:none;transition:border-color .15s;}
.shi-search input::placeholder{color:var(--ink-faint);}
.shi-search input:focus{border-color:var(--gold);}
.shi-search::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--ink-faint);}
.tbtn{font-family:var(--font);font-size:12px;letter-spacing:0.05em;cursor:pointer;padding:7px 14px;border-radius:8px;
  border:1px solid rgba(168,131,58,0.42);background:rgba(255,252,243,0.5);color:var(--ink-soft);transition:all .15s;white-space:nowrap;}
.tbtn:hover{background:#fffdf6;border-color:var(--gold);color:var(--ink);transform:translateY(-1px);box-shadow:0 6px 14px -8px rgba(80,56,24,0.4);}

.juan-scroll{flex:1;min-height:0;overflow-y:auto;padding:18px 24px 22px;scrollbar-width:none;}
.juan-scroll::-webkit-scrollbar{width:0;height:0;}
.juan-group{margin-bottom:20px;}
.juan-group-t{font-size:11.5px;letter-spacing:0.18em;color:var(--ink-faint);margin:0 0 11px 2px;display:flex;align-items:center;gap:9px;}
.juan-group-t::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px rgba(168,131,58,0.18);}
.juan-group-t::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(168,131,58,0.28),transparent);}

/* 卷宗卡 */
.juan{position:relative;margin-bottom:14px;padding:16px 20px 15px 22px;border-radius:10px;border:1px solid rgba(168,131,58,0.18);
  background:linear-gradient(180deg,rgba(255,253,243,0.78),rgba(246,239,218,0.55));
  box-shadow:0 12px 26px -16px rgba(60,40,20,0.4),inset 0 1px 0 rgba(255,255,255,0.55);overflow:hidden;transition:transform .16s,box-shadow .16s;}
.juan::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--jc,var(--gold));}
.juan:hover{transform:translateY(-1px);box-shadow:0 16px 32px -16px rgba(60,40,20,0.46);}
.juan.faith{--jc:var(--seal-faith);}
.juan.doubt{--jc:var(--seal-doubt);}
.juan.rumor{--jc:var(--seal-rumor);background:linear-gradient(180deg,rgba(250,247,238,0.7),rgba(242,236,222,0.5));}
.juan-top{display:flex;align-items:flex-start;gap:13px;margin-bottom:9px;}
/* 权威钤印 */
.seal-stamp{flex:0 0 auto;width:46px;height:46px;border-radius:7px;display:grid;place-items:center;position:relative;transform:rotate(-5deg);
  font-family:var(--font);font-size:11px;font-weight:bold;letter-spacing:0.02em;line-height:1.1;text-align:center;}
.seal-stamp.faith{color:#fff;background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.5);
  box-shadow:0 2px 7px rgba(122,32,24,0.4),inset 0 1px 0 rgba(255,255,255,0.25);}
.seal-stamp.faith::after{content:"";position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.4);border-radius:5px;}
.seal-stamp.doubt{color:var(--seal-doubt);background:rgba(92,74,46,0.07);border:1.5px solid var(--seal-doubt);box-shadow:inset 0 0 0 2px rgba(92,74,46,0.12);}
.seal-stamp.rumor{color:var(--seal-rumor);background:rgba(156,139,107,0.05);border:1.5px dashed var(--seal-rumor);}
.juan-head{flex:1;min-width:0;}
.juan-title{font-size:16px;color:var(--ink);letter-spacing:0.04em;line-height:1.4;font-weight:bold;}
.juan-meta{font-size:11px;color:var(--ink-faint);margin-top:4px;letter-spacing:0.02em;display:flex;flex-wrap:wrap;align-items:center;gap:5px 9px;}
.juan-meta .dot{opacity:0.45;}
.juan-meta .jtag{font-size:10px;letter-spacing:0.03em;padding:1px 8px;border-radius:8px;color:#fff;}
.juan-star{flex:0 0 auto;font-size:16px;cursor:pointer;color:var(--gold);background:none;border:none;line-height:1;padding:2px;opacity:0.55;transition:opacity .15s,transform .15s;}
.juan-star:hover{opacity:1;transform:scale(1.12);}
.juan-star.on{opacity:1;color:var(--gold-hi);text-shadow:0 0 8px rgba(216,185,106,0.6);}

/* 正文（朱丝栏/乌丝栏） */
.juan-body{font-family:var(--font-doc);font-size:13.5px;line-height:1.92;color:var(--ink);letter-spacing:0.01em;text-align:justify;
  padding:11px 15px;border-radius:5px;position:relative;
  background:
    repeating-linear-gradient(0deg, transparent 0 calc(1.92em - 1px), var(--rulec,var(--rule-ink)) calc(1.92em - 1px) 1.92em),
    rgba(255,253,247,0.5);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.juan.faith .juan-body{--rulec:var(--rule-red);}
.juan-body.expand{-webkit-line-clamp:unset;}
.juan-toggle{display:inline-block;margin-top:5px;font-size:11.5px;color:var(--cinnabar-d);cursor:pointer;border:none;background:none;font-family:var(--font);letter-spacing:0.04em;}
.juan-toggle:hover{text-decoration:underline;}

/* 引用链按语 */
.ref-chain{margin-top:10px;padding:8px 12px;border-radius:6px;border-left:3px solid rgba(120,90,40,0.3);background:rgba(168,131,58,0.06);
  font-size:11px;line-height:1.7;color:var(--ink-soft);letter-spacing:0.01em;}
.ref-chain b{color:var(--ink-soft);font-style:normal;}
.ref-chain .rc-lbl{display:inline-block;font-family:var(--font);color:var(--gold-d);margin-right:4px;}
.ref-chain .rc-row{display:block;}
.ref-chain .rc-row + .rc-row{margin-top:2px;}

/* 御批朱笔 */
.yu-annot{margin-top:10px;padding:9px 13px 9px 14px;border-radius:6px;position:relative;
  border:1px solid rgba(184,58,43,0.28);background:linear-gradient(180deg,rgba(184,58,43,0.05),rgba(184,58,43,0.02));}
.yu-annot::before{content:"御 批";position:absolute;left:-1px;top:-10px;font-size:10px;letter-spacing:0.1em;color:#fff;
  background:linear-gradient(150deg,var(--vermilion),var(--cinnabar-d));padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(122,32,24,0.34);}
.yu-annot p{font-family:var(--font);font-size:13.5px;line-height:1.75;color:var(--vermilion);letter-spacing:0.03em;margin-top:3px;}

/* 卷宗动作 */
.juan-acts{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
.jact{font-family:var(--font);font-size:11.5px;letter-spacing:0.04em;cursor:pointer;padding:5px 12px;border-radius:7px;
  border:1px solid rgba(168,131,58,0.34);background:rgba(255,252,243,0.45);color:var(--ink-soft);transition:all .14s;}
.jact:hover{background:#fffdf6;border-color:var(--gold);color:var(--ink);}
.jact.red{border-color:rgba(184,58,43,0.4);color:var(--cinnabar-d);}
.jact.red:hover{background:rgba(184,58,43,0.08);}

/* ── 编年长卷 ── */
.affair{position:relative;margin-bottom:16px;padding:16px 20px 17px;border-radius:10px;border:1px solid rgba(168,131,58,0.22);
  background:linear-gradient(180deg,rgba(255,253,243,0.74),rgba(246,239,218,0.52));box-shadow:0 12px 26px -16px rgba(60,40,20,0.4),inset 0 1px 0 rgba(255,255,255,0.5);}
.affair-top{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
.affair-glyph{width:38px;height:38px;flex:0 0 auto;border-radius:7px;display:grid;place-items:center;font-size:16px;font-weight:bold;color:#fff;
  background:linear-gradient(150deg,var(--gold-hi),var(--gold-d));box-shadow:0 2px 6px rgba(125,94,34,0.36),inset 0 1px 0 rgba(255,255,255,0.3);}
.affair-main b{font-size:15px;color:var(--ink);letter-spacing:0.05em;display:block;}
.affair-main span{font-size:11px;color:var(--ink-faint);display:block;margin-top:2px;letter-spacing:0.02em;}
.affair-state{margin-left:auto;font-size:11px;letter-spacing:0.04em;padding:3px 11px;border-radius:11px;white-space:nowrap;}
.affair-state.going{color:var(--gold-d);background:rgba(168,131,58,0.14);border:1px solid rgba(168,131,58,0.34);}
.affair-state.done{color:#23463a;background:rgba(111,162,145,0.18);border:1px solid var(--jade);}
.affair-body{font-family:var(--font-doc);font-size:12.5px;line-height:1.8;color:var(--ink-soft);letter-spacing:0.01em;margin-bottom:12px;}
/* 年轴进度 */
.timeline{position:relative;height:42px;margin:6px 4px 0;}
.timeline::before{content:"";position:absolute;left:0;right:0;top:13px;height:3px;border-radius:2px;background:rgba(120,90,40,0.16);}
.tl-done{position:absolute;left:0;top:13px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold-d),var(--gold-hi));box-shadow:0 0 6px rgba(216,185,106,0.5);}
.tl-node{position:absolute;top:8px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
.tl-node .tn-dot{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid rgba(120,90,40,0.3);}
.tl-node.reached .tn-dot{background:linear-gradient(150deg,var(--gold-hi),var(--gold-d));border-color:var(--gold-d);box-shadow:0 0 0 3px rgba(168,131,58,0.16);}
.tl-node.now .tn-dot{background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border-color:var(--cinnabar-d);box-shadow:0 0 0 3px rgba(168,50,40,0.18);}
.tl-node .tn-lbl{font-size:9.5px;color:var(--ink-faint);letter-spacing:0;white-space:nowrap;position:absolute;top:17px;}
.affair-pct{font-size:11px;color:var(--ink-faint);margin-top:22px;letter-spacing:0.03em;text-align:right;}
.affair-pct b{color:var(--gold-d);}

.juan-empty{padding:48px 20px;text-align:center;color:var(--ink-faint);}
.juan-empty b{font-size:16px;letter-spacing:0.18em;color:var(--ink-soft);display:block;margin-bottom:9px;}
.juan-empty p{font-size:12.5px;line-height:1.8;letter-spacing:0.02em;}

/* 提示气泡 */
.toast{position:fixed;left:50%;bottom:38px;transform:translateX(-50%) translateY(20px);z-index:90;opacity:0;pointer-events:none;
  font-size:13.5px;letter-spacing:0.08em;color:#fff;padding:11px 23px;border-radius:9px;
  background:linear-gradient(155deg,rgba(58,40,22,0.96),rgba(36,24,14,0.96));border:1px solid var(--gold-d);box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast b{color:var(--gold-hi);}
@keyframes shiIn{from{opacity:0;transform:translateY(10px) scale(0.99);}to{opacity:1;transform:translateY(0) scale(1);}}
.juan-scroll>*{animation:shiIn .4s cubic-bezier(.2,.72,.28,1) both;}

.previewbar{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center;
  font-family:var(--font);font-size:11px;color:var(--ink-faint);background:rgba(255,250,235,0.7);border:1px solid rgba(168,131,58,0.3);
  padding:4px 12px;border-radius:20px;backdrop-filter:blur(3px);}
.previewbar b{color:var(--cinnabar-d);}
</style>

<body class="tm-phase8-formal">
<div class="shi-stage">
  <div class="shi-frame">
    <div class="shi-titlebar">
      <button class="shi-close" title="退回御案">×</button>
      <div class="st-center">
        <div class="st-main">史 官 实 录</div>
        <div class="st-sub">秉笔直书　信史昭昭　御览存档</div>
      </div>
      <div class="shi-chips" id="hdChips"></div>
    </div>
    <div class="shi-body">
      <!-- 左·书函架 -->
      <aside class="rack">
        <div class="rack-hd"><span class="rack-seal">史</span><div><b>四库档案</b><span>史记 · 起居注 · 纪事 · 编年</span></div></div>
        <div class="rack-fns" id="rackFns"></div>
        <div class="rack-tools">
          <div class="rack-tools-t">史料权威</div>
          <div class="auth-filters" id="authFilters"></div>
        </div>
        <div class="rack-foot"><div class="rack-note"><b>史官直书</b>，过回合推演、诏令、奏疏、朝议、鸿雁与地块事变皆随回合归档。御批可垂训后世，星标以备御览。</div></div>
      </aside>
      <!-- 右·卷宗台 -->
      <main class="table-main">
        <div class="table-head"><div class="th-row">
          <div class="th-title" id="thTitle"></div>
          <div class="th-chips" id="thChips"></div>
        </div></div>
        <div class="table-tools">
          <div class="shi-search"><input id="search" placeholder="检索题名、人物、年月、事类、正文"></div>
          <button class="tbtn" id="exportBtn">导出此卷</button>
        </div>
        <div class="juan-scroll" id="juanList"></div>
      </main>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="previewbar">御案·史官实录 · 新 UI 预览 <b>v1</b> · 档案柜+卷宗 · 四类切换 · 权威钤印/引用链/御批朱笔 · 编年长卷</div>

<script>
/* ───────── 字典 ───────── */
// 四类档案
var FNS = [
  {key:'shiji',   label:'史 记', sub:'正史·回合大事', glyph:'记', c:'#a83228'},
  {key:'qiju',    label:'起居注', sub:'御前逐日流水', glyph:'居', c:'#a8833a'},
  {key:'jishi',   label:'纪 事', sub:'一事本末线索', glyph:'纪', c:'#4a5e8a'},
  {key:'biannian',label:'编 年', sub:'跨年长期事势', glyph:'编', c:'#557f6f'}
];
// 史料权威级
var AUTH = {
  faith:{label:'信史', glyph:'信史', desc:'据确凿·官修'},
  doubt:{label:'存疑', glyph:'存疑', desc:'尚需查核'},
  rumor:{label:'风闻', glyph:'风闻', desc:'稗野传闻'}
};
// 事类色
var TYPE_C = { '战事':'#7a2018','人事':'#8e6aa8','灾异':'#b98b2f','党争':'#a83228','边务':'#4a5e8a','财赋':'#557f6f','礼制':'#a8833a','外交':'#4a5e8a' };
function typeColor(t){ return TYPE_C[t] || '#a8833a'; }

/* ───────── 样本数据（四类·含史官特色维度） ───────── */
var DATA = {
  shiji: [
    {id:'s1', turn:3, date:'天启七年·三月', title:'诏袁崇焕便宜行边', type:'边务', authority:'faith', star:true,
     body:'三月，上密诏辽东巡抚袁崇焕，许其相机料理关宁防务，若京师有警，许便宜入援，毋拘成法。崇焕受诏，克日整军，关宁为之一肃。史臣曰：人主能假边臣以权，则封疆得人；然便宜之柄，亦人主所慎也。',
     sources:['御案推演','密旨·袁崇焕'], basis:'本回时政记·辽东条', evidence:'起居注三月十二',
     annotation:'卿言是也，着即施行。边事付卿，朕无北顾之忧。'},
    {id:'s2', turn:3, date:'天启七年·三月', title:'阉党余孽未尽辨', type:'党争', authority:'doubt', star:false,
     body:'是月，言路交章论阉党余孽未尽，请究治。然所列名姓，多风影之词，未有实状。史臣录之以俟考。',
     sources:['朝议·常朝','奏疏·都察院'], basis:'本回廷议纪要', evidence:'',
     annotation:''},
    {id:'s3', turn:2, date:'天启七年·二月', title:'陕西大旱饥民将起', type:'灾异', authority:'faith', star:false,
     body:'二月，陕西自去秋不雨，至是大旱，赤地千里，斗米千钱，饥民相聚为盗。有司请蠲赋发赈，部议未决。史臣曰：天灾流行，国家代有，唯在备豫不虞耳。',
     sources:['地块事变·陕西','奏疏·三边'], basis:'本回灾异条', evidence:'近事·陕西饥',
     annotation:'着户部速议蠲赈，毋使流离为乱。'}
  ],
  qiju: [
    {id:'q1', turn:3, date:'三月十二', title:'遣密旨致袁崇焕', type:'边务', authority:'faith', star:false,
     body:'上御文华殿，亲拟密旨一道，遣密使八百里加急致辽东巡抚袁崇焕，谕以便宜入援之权。阴书缄封，阅后即焚。',
     sources:['鸿雁·密旨'], basis:'', evidence:'',
     annotation:''},
    {id:'q2', turn:3, date:'三月十一', title:'召对户部尚书毕自严', type:'财赋', authority:'faith', star:true,
     body:'上召户部尚书毕自严入对，问辽饷出入之数。自严具陈太仓岁入不足支边，请清核屯田、裁冗费。上颔之，命详议以闻。',
     sources:['御前问对·毕自严'], basis:'纪事·辽饷', evidence:'',
     annotation:'国用匮乏，节流为先。卿其实心任事。'},
    {id:'q3', turn:3, date:'三月初九', title:'览陕西塘报', type:'灾异', authority:'doubt', star:false,
     body:'上览陕西塘报，言饥民聚众，恐生变。或言已成流寇数千，或言不过乌合，所报互异，未可遽信。',
     sources:['塘报·陕西'], basis:'', evidence:'',
     annotation:''}
  ],
  jishi: [
    {id:'j1', turn:3, date:'三月·始末', title:'平辽方略本末', type:'边务', authority:'faith', star:true,
     body:'自上即位，辽事屡议而未定。二月，起孙承宗议守；三月，畀袁崇焕以便宜，定以守为战、以辽人守辽土之策。诸臣议虽不一，要以固守关宁、徐图恢复为主。本末既具，著为一编。',
     sources:['朝议·常朝','御前问对·孙承宗','密旨·袁崇焕'], basis:'纪事·辽事三议', evidence:'起居注二月—三月',
     annotation:''},
    {id:'j2', turn:2, date:'二月·始末', title:'清核辽饷始末', type:'财赋', authority:'doubt', star:false,
     body:'辽饷之议，始于太仓不继。毕自严请清屯田、裁冗，户部部议未决，兵部以缓不济急争之。事尚在议，未有定章。',
     sources:['御前问对·毕自严','奏疏·兵部'], basis:'', evidence:'',
     annotation:''}
  ],
  biannian: [
    {id:'b1', title:'辽东防务重整', startTurn:1, nowTurn:3, endTurn:8, status:'going', type:'边务',
     body:'自起孙承宗、用袁崇焕以来，关宁防线渐次重整。预计经数回合修城、练兵、积粮，方可成犄角之势。',
     nodes:[{t:1,l:'起孙承宗'},{t:3,l:'畀袁崇焕'},{t:5,l:'修宁锦'},{t:8,l:'成防线'}]},
    {id:'b2', title:'辽饷财政改革', startTurn:2, nowTurn:3, endTurn:7, status:'going', type:'财赋',
     body:'清核屯田、裁汰冗费、整顿盐法，以纾太仓之困。改革方兴，部议未协，阻力犹在。',
     nodes:[{t:2,l:'议清核'},{t:3,l:'召毕自严'},{t:5,l:'行屯政'},{t:7,l:'见成效'}]},
    {id:'b3', title:'肃清阉党', startTurn:1, nowTurn:3, endTurn:4, status:'going', type:'党争',
     body:'魏忠贤虽除，党羽盘根。逐次罢黜、追论、定逆案，以清朝纲。',
     nodes:[{t:1,l:'诛魏阉'},{t:3,l:'论余党'},{t:4,l:'定逆案'}]}
  ]
};

/* ───────── 状态 ───────── */
var state = { fn:'shiji', search:'', auth:'all', expand:{}, stars:{} };
// 初始化 stars
Object.keys(DATA).forEach(function(k){ DATA[k].forEach(function(it){ if(it.star) state.stars[it.id]=true; }); });

/* ───────── 工具 ───────── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ var t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1900); }
function fnDef(k){ return FNS.find(function(f){return f.key===k;}) || FNS[0]; }
function fnCount(k){ return (DATA[k]||[]).length; }
function authCount(a){ var n=0; Object.keys(DATA).forEach(function(k){ DATA[k].forEach(function(it){ if(it.authority===a) n++; }); }); return n; }

/* ───────── 渲染：标题 chips ───────── */
function renderChips(){
  var total=0; Object.keys(DATA).forEach(function(k){ total+=DATA[k].length; });
  var thisTurn=0; ['shiji','qiju','jishi'].forEach(function(k){ DATA[k].forEach(function(it){ if(it.turn===3) thisTurn++; }); });
  document.getElementById('hdChips').innerHTML='<span class="chip green">总卷 '+total+'</span><span class="chip hot">本回新增 '+thisTurn+'</span>';
}

/* ───────── 渲染：书函架 ───────── */
function renderRack(){
  document.getElementById('rackFns').innerHTML = FNS.map(function(f){
    return '<button class="fn '+(state.fn===f.key?'active':'')+'" data-fn="'+f.key+'" style="--fnc:'+f.c+'">'+
      '<span class="fn-glyph" style="--fnc:'+f.c+'">'+esc(f.glyph)+'</span>'+
      '<span class="fn-main"><b>'+esc(f.label)+'</b><span>'+esc(f.sub)+'</span></span>'+
      '<span class="fn-count">'+fnCount(f.key)+'</span></button>';
  }).join('');
  var auths=[['all','全部',0]].concat(Object.keys(AUTH).map(function(a){return [a,AUTH[a].label,authCount(a)];}));
  document.getElementById('authFilters').innerHTML = auths.map(function(a){
    var axCls = a[0]==='all'?'':a[0];
    return '<button class="authf '+(state.auth===a[0]?'active':'')+'" data-auth="'+a[0]+'">'+
      (a[0]==='all'?'<span class="ax" style="background:var(--ink-faint)"></span>':'<span class="ax '+axCls+'"></span>')+
      esc(a[1])+'<span class="acount">'+(a[0]==='all'?(authCount('faith')+authCount('doubt')+authCount('rumor')):a[2])+'</span></button>';
  }).join('');
  bindRack();
}

/* ───────── 渲染：卷宗台 ───────── */
function visibleRows(){
  var rows=(DATA[state.fn]||[]).slice();
  if(state.auth!=='all' && state.fn!=='biannian') rows=rows.filter(function(r){return r.authority===state.auth;});
  var q=state.search.trim().toLowerCase();
  if(q) rows=rows.filter(function(r){ return [r.title,r.date,r.type,r.body,(r.topic||'')].join(' ').toLowerCase().indexOf(q)>=0; });
  return rows;
}
function sealStamp(auth){
  var a=AUTH[auth]||AUTH.doubt;
  return '<span class="seal-stamp '+auth+'" title="'+esc(a.desc)+'">'+esc(a.glyph)+'</span>';
}
function refChain(r){
  var rows='';
  if(r.sources&&r.sources.length) rows+='<span class="rc-row"><span class="rc-lbl">来源</span>'+esc(r.sources.join('、'))+'</span>';
  if(r.basis) rows+='<span class="rc-row"><span class="rc-lbl">依据</span>'+esc(r.basis)+'</span>';
  if(r.evidence) rows+='<span class="rc-row"><span class="rc-lbl">佐证</span>'+esc(r.evidence)+'</span>';
  if(!rows) return '';
  return '<div class="ref-chain">'+rows+'</div>';
}
function juanCard(r){
  var exp=state.expand[r.id], starred=state.stars[r.id];
  var long=(r.body||'').length>52;
  var meta='<span class="jtag" style="background:'+typeColor(r.type)+'">'+esc(r.type||'')+'</span>'+
    '<span>'+esc(r.date||'')+'</span>'+(r.turn?'<span class="dot">·</span><span>第 '+r.turn+' 回</span>':'')+
    '<span class="dot">·</span><span>'+esc((AUTH[r.authority]||{}).label||'')+'</span>';
  var acts='<button class="jact red" data-act="annot" data-id="'+r.id+'">'+(r.annotation?'改御批':'御批')+'</button>'+
    '<button class="jact" data-act="excerpt" data-id="'+r.id+'">摘录</button>'+
    '<button class="jact" data-act="link" data-id="'+r.id+'">关联人物</button>';
  return '<article class="juan '+r.authority+'">'+
    '<div class="juan-top">'+sealStamp(r.authority)+
      '<div class="juan-head"><div class="juan-title">'+esc(r.title)+'</div><div class="juan-meta">'+meta+'</div></div>'+
      '<button class="juan-star'+(starred?' on':'')+'" data-act="star" data-id="'+r.id+'">'+(starred?'★':'☆')+'</button>'+
    '</div>'+
    '<div class="juan-body'+(exp?' expand':'')+'">'+esc(r.body||'')+'</div>'+
    (long?'<button class="juan-toggle" data-tg="'+r.id+'">'+(exp?'卷起':'展卷全文')+'</button>':'')+
    refChain(r)+
    (r.annotation?'<div class="yu-annot"><p>'+esc(r.annotation)+'</p></div>':'')+
    '<div class="juan-acts">'+acts+'</div></article>';
}
function affairCard(r){
  var span=r.endTurn-r.startTurn || 1;
  var pct=Math.max(4,Math.min(100,Math.round((r.nowTurn-r.startTurn)/span*100)));
  var nodes=(r.nodes||[]).map(function(n){
    var x=Math.max(0,Math.min(100,Math.round((n.t-r.startTurn)/span*100)));
    var cls=n.t<r.nowTurn?'reached':(n.t===r.nowTurn?'now':'');
    return '<div class="tl-node '+cls+'" style="left:'+x+'%"><span class="tn-dot"></span><span class="tn-lbl">'+esc(n.l)+'</span></div>';
  }).join('');
  return '<article class="affair">'+
    '<div class="affair-top"><span class="affair-glyph">'+esc((r.type||'事').slice(0,1))+'</span>'+
      '<div class="affair-main"><b>'+esc(r.title)+'</b><span>'+esc(r.type||'')+' · 第 '+r.startTurn+' 回起 · 预计第 '+r.endTurn+' 回竟</span></div>'+
      '<span class="affair-state '+r.status+'">'+(r.status==='done'?'已竟':'进行中')+'</span></div>'+
    '<div class="affair-body">'+esc(r.body||'')+'</div>'+
    '<div class="timeline"><div class="tl-done" style="width:'+pct+'%"></div>'+nodes+'</div>'+
    '<div class="affair-pct">已历 <b>'+(r.nowTurn-r.startTurn)+'</b> 回 / 共约 '+span+' 回 · 进度 '+pct+'%</div></article>';
}
function renderTable(){
  var f=fnDef(state.fn);
  document.getElementById('thTitle').innerHTML='<h2>'+esc(f.label.replace(/ /g,''))+'</h2><p>'+esc(tableHint(state.fn))+'</p>';
  document.getElementById('thChips').innerHTML='<span class="chip green">第 3 回</span>'+(state.auth!=='all'?'<span class="chip">'+esc((AUTH[state.auth]||{}).label||'')+'</span>':'');
  var rows=visibleRows();
  var el=document.getElementById('juanList');
  if(!rows.length){ el.innerHTML='<div class="juan-empty"><b>此卷尚虚</b><p>过回合推演、诏令、问对、朝议、奏疏、鸿雁与地块事变<br>会随回合自动归入相应档案。</p></div>'; bindTable(); return; }
  if(state.fn==='biannian'){ el.innerHTML=rows.map(affairCard).join(''); }
  else { el.innerHTML=rows.map(juanCard).join(''); }
  bindTable();
}
function tableHint(k){
  return ({ shiji:'按回合归档的正史大事，史臣秉笔，附论赞与御批',
    qiju:'御前逐日起居流水，诏令、问对、披览皆录',
    jishi:'把连续事件串为一事本末，便于稽考',
    biannian:'跨回合的长期事势，沿年轴追踪其进退' })[k] || '';
}

/* ───────── 交互 ───────── */
function bindRack(){
  document.querySelectorAll('[data-fn]').forEach(function(b){ b.onclick=function(){ state.fn=this.getAttribute('data-fn'); state.search=''; document.getElementById('search').value=''; renderRack(); renderTable(); }; });
  document.querySelectorAll('[data-auth]').forEach(function(b){ b.onclick=function(){ state.auth=this.getAttribute('data-auth'); renderRack(); renderTable(); }; });
}
function bindTable(){
  document.querySelectorAll('[data-tg]').forEach(function(b){ b.onclick=function(){ var id=this.getAttribute('data-tg'); state.expand[id]=!state.expand[id]; renderTable(); }; });
  document.querySelectorAll('.juan [data-act], .affair [data-act]').forEach(function(b){ b.onclick=function(){ doAct(this.getAttribute('data-act'), this.getAttribute('data-id')); }; });
}
function findRow(id){ var r=null; Object.keys(DATA).forEach(function(k){ DATA[k].forEach(function(x){ if(x.id===id) r=x; }); }); return r; }
function doAct(act,id){
  var r=findRow(id); if(!r) return;
  if(act==='star'){ state.stars[id]=!state.stars[id]; r.star=state.stars[id]; renderTable(); return; }
  if(act==='annot'){ var v=prompt('御批（朱笔垂训）：', r.annotation||''); if(v!=null){ r.annotation=v.trim(); toast(r.annotation?'御批已朱书入卷':'御批已撤'); renderTable(); } return; }
  if(act==='excerpt'){ toast('已摘录 · <b>'+esc(r.title||'此卷')+'</b>'); return; }
  if(act==='link'){ toast('已转入<b>人物档案</b>关联'); return; }
}
function bindTools(){
  document.getElementById('search').oninput=function(){ state.search=this.value; renderTable(); };
  document.getElementById('exportBtn').onclick=function(){ toast('已导出 <b>'+esc(fnDef(state.fn).label.replace(/ /g,''))+'</b> 全卷'); };
  document.querySelector('.shi-close').onclick=function(){ toast('（预览）退回御案'); };
}

/* ───────── 主渲染 ───────── */
function renderAll(){ renderChips(); renderRack(); renderTable(); }
bindTools();
renderAll();
</script>
</body>
</html>
