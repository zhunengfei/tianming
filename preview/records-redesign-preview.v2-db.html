<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御案·史册库 · 史官实录(档案/资料库) 预览 v2</title>
<style>
/* ============================================================
   御案·史册库 v2 — 史官实录 = 档案 / 资料库 (frontend-design + ui-ux-pro-max)
   paradigm: 馆阁档案 · 核心 = 多维检索 / 分类索引 / 查阅 / 交叉引征
   材质承御案·奏疏·诏书·鸿雁: 绢纸米金 / 朱砂 / 描金 / 墨 / KaiTi
   三栏: 左书库索引(四库+facet) | 中目录列表 | 右卷宗详情(交叉引征)
   ============================================================ */
:root{
  --desk-1:#dccca6;--desk-2:#c6b083;--desk-3:#a78f68;
  --silk-hi:#fffdf3;--silk:#f6efda;--silk-lo:#ece1c6;--silk-edge:#dcc99c;
  --paper-hi:#fffefb;--paper:#fcf7ec;--paper-lo:#f3ecd9;
  --ink:#241d15;--ink-soft:#574733;--ink-faint:#9c8b6b;
  --gold-hi:#d8b96a;--gold:#a8833a;--gold-d:#7d5e22;
  --cinnabar:#a83228;--cinnabar-hi:#c64a3e;--cinnabar-d:#7a2018;
  --jade:#557f6f;--jade-hi:#6fa291;--indigo:#4a5e8a;--indigo-hi:#6a7eaa;--violet:#7c6a90;--amber:#b98b2f;
  --vermilion:#b83a2b;--seal-faith:#a83228;--seal-doubt:#5c4a2e;--seal-rumor:#9c8b6b;
  --rule-red:rgba(168,50,40,0.16);--rule-ink:rgba(80,60,36,0.1);
  --font:"STKaiti","KaiTi","楷体","Noto Serif SC","Source Han Serif CN","STSong",serif;
  --font-doc:"FangSong","STFangsong","仿宋","Noto Serif SC",serif;
  --font-song:"STSong","SimSun","宋体",serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;
  background:
    radial-gradient(46% 36% at 50% -4%, rgba(255,238,196,0.5), transparent 70%),
    radial-gradient(60% 50% at 18% 24%, rgba(120,100,70,0.13), transparent 60%),
    radial-gradient(52% 60% at 86% 76%, rgba(80,60,40,0.16), transparent 55%),
    radial-gradient(120% 120% at 50% 28%, var(--desk-1), var(--desk-2) 54%, var(--desk-3) 100%);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.55;
  background:radial-gradient(66% 48% at 50% -2%, rgba(255,239,196,0.38), transparent 60%),radial-gradient(150% 130% at 50% 50%, transparent 58%, rgba(48,34,18,0.46) 100%);}

.shi-stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;padding:14px 20px;}
.shi-frame{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;}

/* 标题条 */
.shi-titlebar{flex:0 0 auto;position:relative;display:flex;align-items:center;justify-content:center;padding:4px 0 11px;margin-bottom:9px;}
.shi-titlebar::after{content:"";position:absolute;left:6%;right:6%;bottom:2px;height:1px;background:linear-gradient(90deg,transparent,rgba(216,185,106,0.75) 22%,rgba(216,185,106,0.75) 78%,transparent);}
.shi-titlebar::before{content:"";position:absolute;left:6%;right:6%;bottom:5px;height:1px;background:linear-gradient(90deg,transparent,rgba(168,131,58,0.32) 30%,rgba(168,131,58,0.32) 70%,transparent);}
.st-center{text-align:center;}
.st-main{font-size:24px;font-weight:bold;letter-spacing:0.32em;color:var(--ink);line-height:1.05;text-shadow:0 1px 0 rgba(255,255,255,0.7),0 2px 4px rgba(120,90,36,0.26),0 0 16px rgba(216,185,106,0.24);}
.st-main::before,.st-main::after{content:"";display:inline-block;width:28px;height:1px;vertical-align:0.34em;margin:0 15px;background:linear-gradient(90deg,transparent,var(--gold));}
.st-main::after{background:linear-gradient(90deg,var(--gold),transparent);}
.st-sub{font-size:12px;color:var(--ink-faint);letter-spacing:0.32em;margin-top:5px;}
.st-sub::before,.st-sub::after{content:"❖";font-size:7px;color:var(--gold);opacity:0.62;vertical-align:0.22em;margin:0 10px;}
.shi-chips{position:absolute;right:2px;top:7px;display:flex;gap:7px;}
.chip{font-size:11px;letter-spacing:0.05em;padding:3px 10px;border-radius:11px;border:1px solid var(--gold-d);background:rgba(255,250,235,0.7);color:var(--ink-soft);white-space:nowrap;}
.chip.hot{border-color:var(--cinnabar);color:#fff;background:linear-gradient(160deg,var(--cinnabar),var(--cinnabar-d));}
.chip.green{border-color:var(--jade);color:#23463a;background:rgba(111,162,145,0.22);}
.shi-close{position:absolute;left:0;top:1px;z-index:40;width:32px;height:32px;border-radius:50%;border:1px solid var(--gold-d);background:rgba(255,253,243,0.7);color:var(--gold-d);font-size:17px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(60,40,20,0.25);}
.shi-close:hover{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);transform:rotate(90deg);}

/* 三栏 */
.shi-body{flex:1;min-height:0;display:flex;gap:14px;}
.panel{min-height:0;border:1px solid rgba(168,131,58,0.2);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(255,253,243,0.46),rgba(245,236,210,0.24));box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),0 16px 36px -22px rgba(50,32,14,0.44);}
.panel-hd{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:13px 15px 11px;border-bottom:1px solid rgba(168,131,58,0.18);}
.panel-hd .seal{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center;border-radius:7px;font-size:15px;color:#fff;font-weight:bold;background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.55);box-shadow:0 2px 6px rgba(122,32,24,0.36),inset 0 1px 0 rgba(255,255,255,0.26);}
.panel-hd b{font-size:14px;letter-spacing:0.1em;color:var(--ink);display:block;}
.panel-hd span{font-size:10.5px;color:var(--ink-faint);letter-spacing:0.04em;}

/* ════ 左·书库索引 ════ */
.stacks{flex:0 0 220px;}
.stacks-scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:10px 12px 8px;}
.stacks-scroll::-webkit-scrollbar{width:0;}
/* 四库 */
.lib-cats{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
.libcat{position:relative;display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;font-family:var(--font);
  padding:9px 11px 9px 13px;border-radius:8px;border:1px solid rgba(168,131,58,0.26);background:linear-gradient(100deg,var(--silk-hi),var(--silk) 75%,var(--silk-lo));
  box-shadow:0 1px 5px -2px rgba(60,40,20,0.18);transition:all .16s;overflow:hidden;}
.libcat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cc,var(--gold));}
.libcat:hover{transform:translateX(2px);border-color:var(--gold);}
.libcat.active{transform:translateX(3px);border-color:var(--cinnabar);box-shadow:-2px 0 0 var(--cinnabar),0 5px 13px -5px rgba(60,40,20,0.34);background:linear-gradient(100deg,#fffef7,#fbf4e0);}
.libcat-g{width:28px;height:34px;flex:0 0 auto;border-radius:4px;display:grid;place-items:center;font-size:16px;font-weight:bold;color:#fff;background:linear-gradient(160deg,var(--cc,var(--gold)),color-mix(in srgb,var(--cc,var(--gold)) 62%,#000));border:1px solid rgba(0,0,0,0.2);box-shadow:inset 0 1px 0 rgba(255,255,255,0.28);}
.libcat-m{flex:1;min-width:0;}
.libcat-m b{font-size:13.5px;letter-spacing:0.1em;color:var(--ink);display:block;}
.libcat-m span{font-size:10px;color:var(--ink-faint);display:block;margin-top:1px;}
.libcat-n{flex:0 0 auto;font-size:11px;color:var(--gold-d);background:rgba(168,131,58,0.14);border:1px solid rgba(168,131,58,0.28);border-radius:9px;padding:1px 7px;}
.libcat.active .libcat-n{color:#fff;background:linear-gradient(150deg,var(--cinnabar),var(--cinnabar-d));border-color:var(--cinnabar-d);}
/* facet 检索维度 */
.facet{margin-bottom:11px;}
.facet-t{font-size:10.5px;letter-spacing:0.14em;color:var(--ink-faint);margin:0 0 6px 2px;display:flex;align-items:center;gap:6px;}
.facet-t::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--gold);}
.facet-opts{display:flex;flex-wrap:wrap;gap:5px;}
.fopt{font-family:var(--font);font-size:11px;letter-spacing:0.02em;cursor:pointer;padding:3px 9px;border-radius:11px;border:1px solid rgba(168,131,58,0.3);background:rgba(255,252,242,0.55);color:var(--ink-soft);transition:all .14s;display:inline-flex;align-items:center;gap:5px;}
.fopt:hover{border-color:var(--gold);background:rgba(255,252,242,0.9);}
.fopt.active{color:#fff;background:linear-gradient(150deg,var(--cinnabar),var(--cinnabar-d));border-color:var(--cinnabar-d);}
.fopt .fn{font-size:9.5px;opacity:0.7;}
.fopt.active .fn{opacity:0.85;}
.fopt .ax{width:9px;height:9px;border-radius:50%;}
.fopt .ax.faith{background:var(--seal-faith);}.fopt .ax.doubt{background:transparent;border:1.5px solid var(--seal-doubt);}.fopt .ax.rumor{background:transparent;border:1.5px dashed var(--seal-rumor);}
.fopt.active .ax{filter:brightness(2.5);}
.stacks-stat{flex:0 0 auto;border-top:1px solid rgba(168,131,58,0.2);padding:11px 14px;font-size:10.5px;line-height:1.7;color:var(--ink-faint);letter-spacing:0.02em;}
.stacks-stat b{color:var(--ink-soft);}
.stacks-stat .ss-row{display:flex;justify-content:space-between;}

/* ════ 中·目录 ════ */
.catalog{flex:1;min-width:0;}
.cat-tools{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:11px 15px;border-bottom:1px solid rgba(168,131,58,0.16);}
.cat-search{position:relative;flex:1;}
.cat-search input{width:100%;font-family:var(--font);font-size:12.5px;color:var(--ink);padding:8px 11px 8px 30px;border:1px solid rgba(168,131,58,0.3);border-radius:8px;background:rgba(255,252,242,0.66);outline:none;transition:border-color .15s;}
.cat-search input:focus{border-color:var(--gold);}
.cat-search::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--ink-faint);}
.cat-sort{display:flex;gap:4px;}
.sortb{font-family:var(--font);font-size:11px;cursor:pointer;padding:6px 11px;border-radius:7px;border:1px solid rgba(168,131,58,0.3);background:rgba(255,252,242,0.5);color:var(--ink-soft);transition:all .14s;white-space:nowrap;}
.sortb:hover{border-color:var(--gold);}
.sortb.active{color:#fff;background:linear-gradient(150deg,var(--gold),var(--gold-d));border-color:var(--gold-d);}
/* 活动筛选条 */
.cat-active{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:9px 15px 0;}
.cat-active:empty{display:none;}
.afilter{font-size:10.5px;letter-spacing:0.02em;padding:2px 8px 2px 10px;border-radius:10px;background:rgba(168,50,40,0.08);border:1px solid rgba(122,32,24,0.3);color:var(--cinnabar-d);display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
.afilter:hover{background:rgba(168,50,40,0.16);}
.afilter::after{content:"✕";font-size:8px;opacity:0.7;}
.cat-count{flex:0 0 auto;margin-left:auto;font-size:10.5px;color:var(--ink-faint);letter-spacing:0.02em;}
.cat-list{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:8px 12px 12px;}
.cat-list::-webkit-scrollbar{width:0;}
/* 目录条目(密集) */
.entry{position:relative;display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;cursor:pointer;font-family:var(--font);
  padding:11px 13px;border-radius:9px;border:1px solid transparent;background:transparent;margin-bottom:2px;transition:background .15s,box-shadow .15s,border-color .15s;}
.entry:hover{background:rgba(255,253,243,0.6);}
.entry.active{border-color:rgba(168,50,40,0.26);background:linear-gradient(180deg,#fffdf6,#fbf4e2);box-shadow:0 7px 18px -10px rgba(60,40,20,0.4);}
.entry.active::before{content:"";position:absolute;left:0;top:11px;bottom:11px;width:2.5px;border-radius:2px;background:linear-gradient(180deg,var(--cinnabar),var(--cinnabar-d));}
.e-seal{flex:0 0 auto;width:30px;height:30px;border-radius:5px;display:grid;place-items:center;font-size:9.5px;font-weight:bold;line-height:1;text-align:center;margin-top:1px;}
.e-seal.faith{color:#fff;background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.45);box-shadow:inset 0 1px 0 rgba(255,255,255,0.22);}
.e-seal.doubt{color:var(--seal-doubt);background:rgba(92,74,46,0.06);border:1.5px solid var(--seal-doubt);}
.e-seal.rumor{color:var(--seal-rumor);background:rgba(156,139,107,0.05);border:1.5px dashed var(--seal-rumor);}
.e-main{flex:1;min-width:0;}
.e-title{font-size:13.5px;color:var(--ink);letter-spacing:0.02em;line-height:1.4;font-weight:bold;display:flex;align-items:center;gap:7px;}
.e-title .et-star{font-size:11px;color:var(--gold-hi);}
.e-meta{font-size:10.5px;color:var(--ink-faint);margin-top:3px;display:flex;flex-wrap:wrap;align-items:center;gap:4px 8px;}
.e-meta .etag{font-size:9.5px;padding:0 7px;border-radius:7px;color:#fff;line-height:1.55;}
.e-meta .dot{opacity:0.4;}
.e-excerpt{font-family:var(--font-doc);font-size:11.5px;color:var(--ink-soft);line-height:1.55;margin-top:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.e-refn{flex:0 0 auto;font-size:9.5px;color:var(--gold-d);letter-spacing:0;margin-top:2px;text-align:right;white-space:nowrap;}
.cat-empty{padding:44px 18px;text-align:center;color:var(--ink-faint);}
.cat-empty b{font-size:15px;letter-spacing:0.16em;color:var(--ink-soft);display:block;margin-bottom:8px;}
.cat-empty p{font-size:12px;line-height:1.7;}

/* ════ 右·卷宗详情 ════ */
.folio{flex:0 0 372px;}
.folio-scroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;padding:18px 20px 20px;}
.folio-scroll::-webkit-scrollbar{width:0;}
.fo-head{display:flex;align-items:flex-start;gap:13px;padding-bottom:13px;border-bottom:1px solid rgba(168,131,58,0.2);margin-bottom:14px;position:relative;}
.fo-seal{flex:0 0 auto;width:50px;height:50px;border-radius:7px;display:grid;place-items:center;position:relative;transform:rotate(-5deg);font-size:12px;font-weight:bold;line-height:1.1;text-align:center;}
.fo-seal.faith{color:#fff;background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.5);box-shadow:0 2px 7px rgba(122,32,24,0.4),inset 0 1px 0 rgba(255,255,255,0.25);}
.fo-seal.faith::after{content:"";position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.4);border-radius:5px;}
.fo-seal.doubt{color:var(--seal-doubt);background:rgba(92,74,46,0.07);border:1.5px solid var(--seal-doubt);box-shadow:inset 0 0 0 2px rgba(92,74,46,0.12);}
.fo-seal.rumor{color:var(--seal-rumor);background:rgba(156,139,107,0.05);border:1.5px dashed var(--seal-rumor);}
.fo-htext{flex:1;min-width:0;}
.fo-title{font-size:18px;color:var(--ink);letter-spacing:0.03em;line-height:1.34;font-weight:bold;text-shadow:0 1px 0 rgba(255,255,255,0.6);}
.fo-sub{font-size:11px;color:var(--ink-faint);margin-top:6px;letter-spacing:0.02em;display:flex;flex-wrap:wrap;gap:4px 9px;align-items:center;}
.fo-sub .ftag{font-size:10px;padding:1px 8px;border-radius:8px;color:#fff;}
.fo-star{position:absolute;right:0;top:0;font-size:17px;cursor:pointer;color:var(--gold);background:none;border:none;opacity:0.55;transition:.15s;}
.fo-star:hover{opacity:1;transform:scale(1.1);}.fo-star.on{opacity:1;color:var(--gold-hi);text-shadow:0 0 8px rgba(216,185,106,0.6);}
/* 正文 */
.fo-body{font-family:var(--font-doc);font-size:14px;line-height:2;color:var(--ink);letter-spacing:0.01em;text-align:justify;padding:13px 16px;border-radius:6px;
  background:repeating-linear-gradient(0deg, transparent 0 calc(2em - 1px), var(--rulec,var(--rule-ink)) calc(2em - 1px) 2em),rgba(255,253,247,0.55);}
.fo-body.faith{--rulec:var(--rule-red);}
/* 御批 */
.fo-annot{margin-top:13px;padding:10px 13px 10px 14px;border-radius:6px;position:relative;border:1px solid rgba(184,58,43,0.28);background:linear-gradient(180deg,rgba(184,58,43,0.05),rgba(184,58,43,0.02));}
.fo-annot::before{content:"御 批";position:absolute;left:-1px;top:-10px;font-size:10px;letter-spacing:0.1em;color:#fff;background:linear-gradient(150deg,var(--vermilion),var(--cinnabar-d));padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(122,32,24,0.34);}
.fo-annot p{font-family:var(--font);font-size:13.5px;line-height:1.75;color:var(--vermilion);letter-spacing:0.03em;margin-top:3px;}
/* 交叉引征 (资料库灵魂) */
.fo-sect{margin-top:15px;}
.fo-sect-t{font-size:11px;letter-spacing:0.14em;color:var(--ink-faint);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.fo-sect-t::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--gold);}
.fo-sect-t::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(168,131,58,0.26),transparent);}
.xref{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;font-family:var(--font);margin-bottom:5px;
  padding:7px 11px;border-radius:7px;border:1px solid rgba(168,131,58,0.24);background:rgba(255,252,242,0.5);transition:all .14s;}
.xref:hover{border-color:var(--gold);background:#fffdf6;transform:translateX(2px);}
.xref .xr-kind{flex:0 0 auto;font-size:9.5px;color:#fff;padding:1px 7px;border-radius:6px;letter-spacing:0.04em;}
.xref .xr-t{flex:1;min-width:0;font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.xref .xr-go{flex:0 0 auto;font-size:11px;color:var(--gold-d);}
.refnote{font-family:var(--font-doc);font-size:11.5px;line-height:1.7;color:var(--ink-soft);padding:7px 11px;border-radius:6px;border-left:3px solid rgba(120,90,40,0.3);background:rgba(168,131,58,0.06);}
.refnote .rn-lbl{color:var(--gold-d);margin-right:4px;font-family:var(--font);}
.refnote div+div{margin-top:2px;}
/* 关联 */
.assoc{display:flex;flex-wrap:wrap;gap:6px;}
.atag{font-family:var(--font);font-size:11px;letter-spacing:0.02em;cursor:pointer;padding:3px 11px;border-radius:11px;border:1px solid rgba(74,94,138,0.34);background:rgba(74,94,138,0.07);color:var(--indigo);transition:all .14s;display:inline-flex;align-items:center;gap:5px;}
.atag:hover{background:rgba(74,94,138,0.16);border-color:var(--indigo);}
.atag.fac{border-color:rgba(85,127,111,0.36);background:rgba(111,162,145,0.1);color:#2d5848;}
.atag.reg{border-color:rgba(184,139,47,0.36);background:rgba(184,139,47,0.1);color:var(--gold-d);}
/* 动作 */
.fo-acts{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(168,131,58,0.18);}
.fact{font-family:var(--font);font-size:12px;letter-spacing:0.04em;cursor:pointer;padding:7px 14px;border-radius:8px;border:1px solid rgba(168,131,58,0.36);background:rgba(255,252,243,0.5);color:var(--ink-soft);transition:all .14s;}
.fact:hover{background:#fffdf6;border-color:var(--gold);color:var(--ink);transform:translateY(-1px);}
.fact.red{border-color:rgba(184,58,43,0.4);color:var(--cinnabar-d);}
.fact.red:hover{background:rgba(184,58,43,0.08);}
.folio-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:40px;text-align:center;color:var(--ink-faint);}

.timeline{position:relative;height:40px;margin:14px 4px 0;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

</div>
<div class="toast" id="toast"></div>
<div class="previewbar">御案·史册库 · 史官实录(档案/资料库) 预览 <b>v2</b> · 四库+多维检索 · 目录查阅 · 交叉引征跳转 · 御批留档</div>

<script>
/* ───────── 字典 ───────── */
var CATS = [
  {key:'shiji',   label:'史 记', sub:'正史·回合大事', g:'记', c:'#a83228'},

  {key:'jishi',   label:'纪 事', sub:'一事本末线索', g:'纪', c:'#4a5e8a'},
  {key:'biannian',label:'编 年', sub:'跨年长期事势', g:'编', c:'#557f6f'}
];
function catDef(k){ return CATS.find(function(c){return c.key===k;})||CATS[0]; }
var AUTH = { faith:{label:'信史',g:'信史',desc:'据确凿·官修'}, doubt:{label:'存疑',g:'存疑',desc:'尚需查核'}, rumor:{label:'风闻',g:'风闻',desc:'稗野传闻'} };
var TYPE_C = { '战事':'#7a2018','人事':'#8e6aa8','灾异':'#b98b2f','党争':'#a83228','边务':'#4a5e8a','财赋':'#557f6f','礼制':'#a8833a','外交':'#4a5e8a' };
function typeColor(t){ return TYPE_C[t]||'#a8833a'; }

/* ───────── 档案数据(含 facet 维度 + 交叉引征 refs) ───────── */
var ARCHIVE = [
  {id:'s1', cat:'shiji', turn:3, era:'天启七年', date:'三月', title:'诏袁崇焕便宜行边', type:'边务', authority:'faith', star:true,
   persons:['袁崇焕'], factions:['明朝廷'], regions:['辽东'],
   body:'三月，上密诏辽东巡抚袁崇焕，许其相机料理关宁防务，若京师有警，许便宜入援，毋拘成法。崇焕受诏，克日整军，关宁为之一肃。史臣曰：人主能假边臣以权，则封疆得人；然便宜之柄，亦人主所慎也。',
   sources:['御案推演','密旨·袁崇焕'], basis:'本回时政记·辽东条', evidence:'起居注三月十二',
   refs:['q1','j1','b1'], annotation:'卿言是也，着即施行。边事付卿，朕无北顾之忧。'},
  {id:'s2', cat:'shiji', turn:3, era:'天启七年', date:'三月', title:'阉党余孽未尽辨', type:'党争', authority:'doubt', star:false,
   persons:['魏忠贤'], factions:['明朝廷'], regions:['京师'],
   body:'是月，言路交章论阉党余孽未尽，请究治。然所列名姓，多风影之词，未有实状。史臣录之以俟考。',
   sources:['朝议·常朝','奏疏·都察院'], basis:'本回廷议纪要', evidence:'',
   refs:['b3'], annotation:''},
  {id:'s3', cat:'shiji', turn:2, era:'天启七年', date:'二月', title:'陕西大旱饥民将起', type:'灾异', authority:'faith', star:false,
   persons:[], factions:['明朝廷'], regions:['陕西'],
   body:'二月，陕西自去秋不雨，至是大旱，赤地千里，斗米千钱，饥民相聚为盗。有司请蠲赋发赈，部议未决。史臣曰：天灾流行，国家代有，唯在备豫不虞耳。',
   sources:['地块事变·陕西','奏疏·三边'], basis:'本回灾异条', evidence:'近事·陕西饥',
   refs:[], annotation:'着户部速议蠲赈，毋使流离为乱。'},
  {id:'q1', cat:'qiju', turn:3, era:'天启七年', date:'三月十二', title:'遣密旨致袁崇焕', type:'边务', authority:'faith', star:false,
   persons:['袁崇焕'], factions:['明朝廷'], regions:['辽东'],
   body:'上御文华殿，亲拟密旨一道，遣密使八百里加急致辽东巡抚袁崇焕，谕以便宜入援之权。阴书缄封，阅后即焚。',
   sources:['鸿雁·密旨'], basis:'', evidence:'', refs:['s1'], annotation:''},
  {id:'q2', cat:'qiju', turn:3, era:'天启七年', date:'三月十一', title:'召对户部尚书毕自严', type:'财赋', authority:'faith', star:true,
   persons:['毕自严'], factions:['明朝廷'], regions:['京师'],
   body:'上召户部尚书毕自严入对，问辽饷出入之数。自严具陈太仓岁入不足支边，请清核屯田、裁冗费。上颔之，命详议以闻。',
   sources:['御前问对·毕自严'], basis:'纪事·辽饷', evidence:'', refs:['j2','b2'], annotation:'国用匮乏，节流为先。卿其实心任事。'},
  {id:'q3', cat:'qiju', turn:3, era:'天启七年', date:'三月初九', title:'览陕西塘报', type:'灾异', authority:'doubt', star:false,
   persons:[], factions:['明朝廷'], regions:['陕西'],
   body:'上览陕西塘报，言饥民聚众，恐生变。或言已成流寇数千，或言不过乌合，所报互异，未可遽信。',
   sources:['塘报·陕西'], basis:'', evidence:'', refs:['s3'], annotation:''},
  {id:'j1', cat:'jishi', turn:3, era:'天启七年', date:'三月·始末', title:'平辽方略本末', type:'边务', authority:'faith', star:true,
   persons:['袁崇焕','孙承宗'], factions:['明朝廷','后金'], regions:['辽东'],
   body:'自上即位，辽事屡议而未定。二月，起孙承宗议守；三月，畀袁崇焕以便宜，定以守为战、以辽人守辽土之策。诸臣议虽不一，要以固守关宁、徐图恢复为主。本末既具，著为一编。',
   sources:['朝议·常朝','御前问对·孙承宗','密旨·袁崇焕'], basis:'纪事·辽事三议', evidence:'起居注二月—三月',
   refs:['s1','q1','b1'], annotation:''},
  {id:'j2', cat:'jishi', turn:2, era:'天启七年', date:'二月·始末', title:'清核辽饷始末', type:'财赋', authority:'doubt', star:false,
   persons:['毕自严'], factions:['明朝廷'], regions:['京师'],
   body:'辽饷之议，始于太仓不继。毕自严请清屯田、裁冗，户部部议未决，兵部以缓不济急争之。事尚在议，未有定章。',
   sources:['御前问对·毕自严','奏疏·兵部'], basis:'', evidence:'', refs:['q2','b2'], annotation:''},
  {id:'b1', cat:'biannian', era:'天启七年', title:'辽东防务重整', type:'边务', authority:'faith', star:false,
   persons:['袁崇焕','孙承宗'], factions:['明朝廷'], regions:['辽东'], startTurn:1, nowTurn:3, endTurn:8, status:'going',
   body:'自起孙承宗、用袁崇焕以来，关宁防线渐次重整。预计经数回合修城、练兵、积粮，方可成犄角之势。',
   sources:['纪事·平辽方略'], basis:'', evidence:'', refs:['j1','s1'], annotation:'',
   nodes:[{t:1,l:'起孙承宗'},{t:3,l:'畀袁崇焕'},{t:5,l:'修宁锦'},{t:8,l:'成防线'}]},
  {id:'b2', cat:'biannian', era:'天启七年', title:'辽饷财政改革', type:'财赋', authority:'doubt', star:false,
   persons:['毕自严'], factions:['明朝廷'], regions:['京师'], startTurn:2, nowTurn:3, endTurn:7, status:'going',
   body:'清核屯田、裁汰冗费、整顿盐法，以纾太仓之困。改革方兴，部议未协，阻力犹在。',
   sources:['纪事·清核辽饷'], basis:'', evidence:'', refs:['j2','q2'], annotation:'',
   nodes:[{t:2,l:'议清核'},{t:3,l:'召毕自严'},{t:5,l:'行屯政'},{t:7,l:'见成效'}]},
  {id:'b3', cat:'biannian', era:'天启七年', title:'肃清阉党', type:'党争', authority:'faith', star:false,
   persons:['魏忠贤'], factions:['明朝廷'], regions:['京师'], startTurn:1, nowTurn:3, endTurn:4, status:'going',
   body:'魏忠贤虽除，党羽盘根。逐次罢黜、追论、定逆案，以清朝纲。',
   sources:['史记·阉党余孽'], basis:'', evidence:'', refs:['s2'], annotation:'',
   nodes:[{t:1,l:'诛魏阉'},{t:3,l:'论余党'},{t:4,l:'定逆案'}]}
];
function byId(id){ return ARCHIVE.find(function(x){return x.id===id;}); }

/* ───────── 状态 ───────── */
var state = { cat:'shiji', search:'', sort:'era', sel:null, facet:{type:'',person:'',authority:''}, stars:{} };
ARCHIVE.forEach(function(x){ if(x.star) state.stars[x.id]=true; });

/* ───────── 工具 ───────── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ var t=document.getElementById('toast'); t.innerHTML=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1900); }
function catRows(k){ return ARCHIVE.filter(function(x){return x.cat===k;}); }
function uniqCount(k, field){ var m={}; catRows(k).forEach(function(x){ var v=x[field]; if(Array.isArray(v)){ v.forEach(function(o){ if(o) m[o]=(m[o]||0)+1; }); } else if(v){ m[v]=(m[v]||0)+1; } }); return m; }

/* ───────── 渲染：chips ───────── */
function renderChips(){
  var faith=ARCHIVE.filter(function(x){return x.authority==='faith';}).length;
  document.getElementById('hdChips').innerHTML='<span class="chip green">馆藏 '+ARCHIVE.length+' 卷</span><span class="chip hot">信史 '+faith+'</span>';
}

/* ───────── 渲染：左·书库索引 ───────── */
function renderStacks(){
  document.getElementById('libCats').innerHTML = CATS.map(function(c){
    return '<button class="libcat '+(state.cat===c.key?'active':'')+'" data-cat="'+c.key+'" style="--cc:'+c.c+'">'+
      '<span class="libcat-g" style="--cc:'+c.c+'">'+esc(c.g)+'</span>'+
      '<span class="libcat-m"><b>'+esc(c.label)+'</b><span>'+esc(c.sub)+'</span></span>'+
      '<span class="libcat-n">'+catRows(c.key).length+'</span></button>';
  }).join('');
  // facet：事类 / 人物 / 权威（当前类目内聚合）
  var typeM=uniqCount(state.cat,'type'), personM=uniqCount(state.cat,'persons');
  var html='';
  html+=facetBlock('事类','type',Object.keys(typeM).map(function(t){return [t,t,typeM[t]];}));
  var ppl=Object.keys(personM).filter(function(p){return p;}).sort(function(a,b){return personM[b]-personM[a];}).slice(0,8);
  if(ppl.length) html+=facetBlock('人物','person',ppl.map(function(p){return [p,p,personM[p]];}));
  html+=facetBlock('权威','authority',['faith','doubt','rumor'].map(function(a){var n=catRows(state.cat).filter(function(x){return x.authority===a;}).length;return [a,AUTH[a].label,n,a];}));
  document.getElementById('facets').innerHTML=html;
  // 统计
  var rows=catRows(state.cat);
  document.getElementById('stacksStat').innerHTML=
    '<div class="ss-row"><span>本库</span><b>'+rows.length+' 卷</b></div>'+
    '<div class="ss-row"><span>信史 / 存疑 / 风闻</span><b>'+rows.filter(function(x){return x.authority==='faith';}).length+' / '+rows.filter(function(x){return x.authority==='doubt';}).length+' / '+rows.filter(function(x){return x.authority==='rumor';}).length+'</b></div>'+
    '<div class="ss-row"><span>星标</span><b>'+rows.filter(function(x){return state.stars[x.id];}).length+'</b></div>';
  bindStacks();
}
function facetBlock(title, field, opts){
  return '<div class="facet"><div class="facet-t">'+esc(title)+'</div><div class="facet-opts">'+opts.map(function(o){
    var val=o[0], lbl=o[1], n=o[2], ax=o[3];
    var active=state.facet[field]===val;
    return '<button class="fopt '+(active?'active':'')+'" data-facet="'+field+'" data-val="'+esc(val)+'">'+(ax?'<span class="ax '+ax+'"></span>':'')+esc(lbl)+'<span class="fn">'+n+'</span></button>';
  }).join('')+'</div></div>';
}

/* ───────── 渲染：中·目录 ───────── */
function visibleRows(){
  var rows=catRows(state.cat);
  if(state.facet.type) rows=rows.filter(function(x){return x.type===state.facet.type;});
  if(state.facet.person) rows=rows.filter(function(x){return (x.persons||[]).indexOf(state.facet.person)>=0;});
  if(state.facet.authority) rows=rows.filter(function(x){return x.authority===state.facet.authority;});
  var q=state.search.trim().toLowerCase();
  if(q) rows=rows.filter(function(x){ return [x.title,x.date,x.era,x.type,x.body,(x.persons||[]).join(''),(x.regions||[]).join('')].join(' ').toLowerCase().indexOf(q)>=0; });
  rows=rows.slice();
  if(state.sort==='era') rows.sort(function(a,b){return (b.turn||b.nowTurn||0)-(a.turn||a.nowTurn||0);});
  else if(state.sort==='auth'){ var rank={faith:3,doubt:2,rumor:1}; rows.sort(function(a,b){return (rank[b.authority]||0)-(rank[a.authority]||0);}); }
  else if(state.sort==='ref') rows.sort(function(a,b){return (b.refs||[]).length-(a.refs||[]).length;});
  return rows;
}
function renderSort(){
  var opts=[['era','年序'],['auth','权威'],['ref','引征']];
  document.getElementById('sortBar').innerHTML=opts.map(function(o){return '<button class="sortb '+(state.sort===o[0]?'active':'')+'" data-sort="'+o[0]+'">'+esc(o[1])+'</button>';}).join('');
}
function renderActive(){
  var chips=[];
  ['type','person','authority'].forEach(function(f){
    if(state.facet[f]){ var lbl=f==='authority'?(AUTH[state.facet[f]]||{}).label:state.facet[f]; chips.push('<button class="afilter" data-clear="'+f+'">'+esc(lbl)+'</button>'); }
  });
  document.getElementById('catActive').innerHTML=chips.join('');
}
function renderCatalog(){
  renderSort(); renderActive();
  var rows=visibleRows();
  var el=document.getElementById('catList');
  if(!rows.length){ el.innerHTML='<div class="cat-empty"><b>未检得此类档案</b><p>调整检索维度或关键词，<br>或切换其他档案库。</p></div>'; bindCatalog(); return; }
  el.innerHTML=rows.map(function(x){
    var sealCls=x.authority;
    var meta='<span class="etag" style="background:'+typeColor(x.type)+'">'+esc(x.type||'')+'</span>'+
      '<span>'+esc(x.era||'')+(x.date?'·'+esc(x.date):'')+'</span>'+
      ((x.persons&&x.persons.length)?'<span class="dot">·</span><span>'+esc(x.persons.join('、'))+'</span>':'');
    return '<button class="entry '+(state.sel===x.id?'active':'')+'" data-id="'+x.id+'">'+
      '<span class="e-seal '+sealCls+'">'+esc((AUTH[x.authority]||{}).g||'')+'</span>'+
      '<span class="e-main"><span class="e-title">'+(state.stars[x.id]?'<span class="et-star">★</span>':'')+esc(x.title)+'</span>'+
        '<span class="e-meta">'+meta+'</span>'+
        '<span class="e-excerpt">'+esc(x.body||'')+'</span></span>'+
      ((x.refs&&x.refs.length)?'<span class="e-refn">引 '+x.refs.length+'</span>':'')+'</button>';
  }).join('');
  document.getElementById('catActive').insertAdjacentHTML('beforeend','<span class="cat-count">共 '+rows.length+' 卷</span>');
  bindCatalog();
}

/* ───────── 渲染：右·卷宗详情 ───────── */
function renderFolio(){
  var el=document.getElementById('folio');
  if(!state.sel){ el.innerHTML='<div class="folio-empty"><span class="fe-seal">阅</span><b>择卷详阅</b><p>于左侧检索、中栏择一卷宗，<br>此处展其全文、御批、引征与关联。</p></div>'; return; }
  var x=byId(state.sel); if(!x){ state.sel=null; return renderFolio(); }
  var sealCls=x.authority, starred=state.stars[x.id];
  var sub='<span class="ftag" style="background:'+typeColor(x.type)+'">'+esc(x.type||'')+'</span>'+
    '<span>'+esc(catDef(x.cat).label.replace(/ /g,''))+'</span><span>·</span><span>'+esc(x.era||'')+(x.date?'·'+esc(x.date):'')+'</span>'+
    (x.turn?'<span>·</span><span>第 '+x.turn+' 回</span>':'')+'<span>·</span><span>'+esc((AUTH[x.authority]||{}).label)+'</span>';
  var html='<div class="fo-head"><span class="fo-seal '+sealCls+'">'+esc((AUTH[x.authority]||{}).g)+'</span>'+
    '<div class="fo-htext"><div class="fo-title">'+esc(x.title)+'</div><div class="fo-sub">'+sub+'</div></div>'+
    '<button class="fo-star'+(starred?' on':'')+'" data-fact="star">'+(starred?'★':'☆')+'</button></div>';
  // 正文
  html+='<div class="fo-body '+(x.authority==='faith'?'faith':'')+'">'+esc(x.body||'')+'</div>';
  // 编年长卷
  if(x.cat==='biannian' && x.nodes){
    var span=(x.endTurn-x.startTurn)||1, pct=Math.max(4,Math.min(100,Math.round((x.nowTurn-x.startTurn)/span*100)));
    var nodes=x.nodes.map(function(n){var px=Math.max(0,Math.min(100,Math.round((n.t-x.startTurn)/span*100)));var cls=n.t<x.nowTurn?'reached':(n.t===x.nowTurn?'now':'');return '<span class="tl-node '+cls+'" style="left:'+px+'%"><span class="tn-dot"></span><span class="tn-lbl">'+esc(n.l)+'</span></span>';}).join('');
    html+='<div class="fo-sect"><div class="fo-sect-t">事势进程</div><div class="timeline"><span class="tl-done" style="width:'+pct+'%"></span>'+nodes+'</div><div style="font-size:11px;color:var(--ink-faint);margin-top:20px;text-align:right">已历 <b style="color:var(--gold-d)">'+(x.nowTurn-x.startTurn)+'</b> 回 / 共约 '+span+' 回 · '+pct+'%</div></div>';
  }
  // 御批
  if(x.annotation) html+='<div class="fo-annot"><p>'+esc(x.annotation)+'</p></div>';
  // 交叉引征
  var refRows='';
  if(x.sources&&x.sources.length) refRows+='<div><span class="rn-lbl">来源</span>'+esc(x.sources.join('、'))+'</div>';
  if(x.basis) refRows+='<div><span class="rn-lbl">依据</span>'+esc(x.basis)+'</div>';
  if(x.evidence) refRows+='<div><span class="rn-lbl">佐证</span>'+esc(x.evidence)+'</div>';
  if(refRows) html+='<div class="fo-sect"><div class="fo-sect-t">引征</div><div class="refnote">'+refRows+'</div></div>';
  // 互见(交叉跳转)
  var seen=(x.refs||[]).map(byId).filter(Boolean);
  if(seen.length){
    html+='<div class="fo-sect"><div class="fo-sect-t">互见 · 相关卷宗</div>'+seen.map(function(r){
      return '<button class="xref" data-go="'+r.id+'"><span class="xr-kind" style="background:'+catDef(r.cat).c+'">'+esc(catDef(r.cat).g)+'</span><span class="xr-t">'+esc(r.title)+'</span><span class="xr-go">详阅 ›</span></button>';
    }).join('')+'</div>';
  }
  // 关联
  var assoc='';
  (x.persons||[]).forEach(function(p){ assoc+='<button class="atag" data-person="'+esc(p)+'">▣ '+esc(p)+'</button>'; });
  (x.factions||[]).forEach(function(f){ assoc+='<span class="atag fac">'+esc(f)+'</span>'; });
  (x.regions||[]).forEach(function(r){ assoc+='<span class="atag reg">'+esc(r)+'</span>'; });
  if(assoc) html+='<div class="fo-sect"><div class="fo-sect-t">关联</div><div class="assoc">'+assoc+'</div></div>';
  // 动作
  html+='<div class="fo-acts"><button class="fact red" data-fact="annot">'+(x.annotation?'改御批':'御批')+'</button><button class="fact" data-fact="excerpt">摘录</button><button class="fact" data-fact="export">导出此卷</button></div>';
  el.innerHTML=html;
  bindFolio();
}

/* ───────── 交互 ───────── */
function bindStacks(){
  document.querySelectorAll('[data-cat]').forEach(function(b){ b.onclick=function(){ state.cat=this.getAttribute('data-cat'); state.facet={type:'',person:'',authority:''}; state.search=''; document.getElementById('search').value=''; state.sel=null; renderStacks(); renderCatalog(); renderFolio(); }; });
  document.querySelectorAll('[data-facet]').forEach(function(b){ b.onclick=function(){ var f=this.getAttribute('data-facet'), v=this.getAttribute('data-val'); state.facet[f]=(state.facet[f]===v?'':v); renderStacks(); renderCatalog(); }; });
}
function bindCatalog(){
  document.querySelectorAll('.entry[data-id]').forEach(function(b){ b.onclick=function(){ state.sel=this.getAttribute('data-id'); renderCatalog(); renderFolio(); }; });
  document.querySelectorAll('[data-clear]').forEach(function(b){ b.onclick=function(){ state.facet[this.getAttribute('data-clear')]=''; renderStacks(); renderCatalog(); }; });
  document.querySelectorAll('[data-sort]').forEach(function(b){ b.onclick=function(){ state.sort=this.getAttribute('data-sort'); renderCatalog(); }; });
}
function bindFolio(){
  document.querySelectorAll('.xref[data-go]').forEach(function(b){ b.onclick=function(){ var id=this.getAttribute('data-go'); var r=byId(id); if(r){ state.cat=r.cat; state.facet={type:'',person:'',authority:''}; state.sel=id; renderStacks(); renderCatalog(); renderFolio(); toast('已跳至 · <b>'+esc(r.title)+'</b>'); } }; });
  document.querySelectorAll('.atag[data-person]').forEach(function(b){ b.onclick=function(){ var p=this.getAttribute('data-person'); state.facet.person=p; renderStacks(); renderCatalog(); toast('已按人物检索 · <b>'+esc(p)+'</b>'); }; });
  document.querySelectorAll('[data-fact]').forEach(function(b){ b.onclick=function(){ doFact(this.getAttribute('data-fact')); }; });
}
function doFact(act){
  var x=byId(state.sel); if(!x) return;
  if(act==='star'){ state.stars[x.id]=!state.stars[x.id]; renderStacks(); renderCatalog(); renderFolio(); return; }
  if(act==='annot'){ var v=prompt('御批（朱笔垂训）：', x.annotation||''); if(v!=null){ x.annotation=v.trim(); toast(x.annotation?'御批已朱书入卷':'御批已撤'); renderFolio(); } return; }
  if(act==='excerpt'){ toast('已摘录 · <b>'+esc(x.title)+'</b>'); return; }
  if(act==='export'){ toast('已导出 · <b>'+esc(x.title)+'</b>'); return; }
}
function bindTools(){
  document.getElementById('search').oninput=function(){ state.search=this.value; renderCatalog(); };
  document.querySelector('.shi-close').onclick=function(){ toast('（预览）退回御案'); };
}

function renderAll(){ renderChips(); renderStacks(); renderCatalog(); renderFolio(); }
bindTools(); renderAll();
</script>
