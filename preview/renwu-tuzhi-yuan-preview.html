<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人物图志 · 御案米金重做预览</title>
<style>
/* ===== 御案米金令牌（承 records v4 · 善本宣纸 + 装裱印玺） ===== */
:root{
  --silk-hi:#fffdf3;--silk:#f6efda;--silk-lo:#ece1c6;--silk-edge:#dcc99c;
  --paper:#fcf7ec;--ink:#241d15;--ink-soft:#574733;--ink-faint:#9c8b6b;
  --gold-hi:#d8b96a;--gold:#a8833a;--gold-d:#7d5e22;
  --cinnabar:#a83228;--cinnabar-hi:#c64a3e;--cinnabar-d:#7a2018;
  --jade:#6fa291;--jade-d:#2d5848;--indigo:#4a5e8a;--vermilion:#b83a2b;--purple:#8e6aa8;
  --rule-ink:rgba(120,90,40,0.10);
  --font:"STKaiti","KaiTi","楷体","Noto Serif SC","STSong",serif;
  --font-doc:"FangSong","STFangsong","仿宋","Noto Serif SC",serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;
  /* 宣纸纤理：极淡多层渐变叠噪点感 */
  background:
    radial-gradient(circle at 18% 12%,rgba(216,185,106,0.07),transparent 42%),
    radial-gradient(circle at 82% 86%,rgba(168,50,40,0.05),transparent 46%),
    repeating-linear-gradient(94deg,rgba(120,90,40,0.014) 0 2px,transparent 2px 5px),
    linear-gradient(160deg,#f3ead3,#e9dcbe);
}
.zhi-stage{position:fixed;inset:0;display:grid;place-items:center;padding:18px;}
.zhi-frame{
  width:min(1480px,100%);height:min(940px,100%);display:flex;flex-direction:column;
  background:linear-gradient(168deg,var(--silk-hi),var(--silk) 60%,var(--silk-lo));
  border:1px solid var(--silk-edge);border-radius:14px;position:relative;overflow:hidden;
  box-shadow:0 24px 70px rgba(58,40,22,0.34),0 2px 0 rgba(255,255,255,0.6) inset,0 -30px 60px rgba(120,90,40,0.06) inset;
}
/* 装裱外圈描金细线 */
.zhi-frame::before{content:"";position:absolute;inset:7px;border:1px solid rgba(168,131,58,0.26);border-radius:9px;pointer-events:none;z-index:30;}

/* ── 题首 ── */
.zhi-titlebar{position:relative;flex:0 0 auto;padding:13px 22px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(168,131,58,0.22);}
.zhi-close{position:absolute;left:14px;top:12px;z-index:40;width:31px;height:31px;border-radius:50%;border:1px solid var(--gold-d);background:rgba(255,253,243,0.7);color:var(--gold-d);font-size:17px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
.zhi-close:hover{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar);transform:rotate(90deg);}
.st-main{font-size:23px;font-weight:bold;letter-spacing:0.34em;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,0.7),0 2px 4px rgba(120,90,36,0.26),0 0 16px rgba(216,185,106,0.24);}
.st-main::before,.st-main::after{content:"";display:inline-block;width:26px;height:1px;vertical-align:0.34em;margin:0 14px;background:linear-gradient(90deg,transparent,var(--gold));}
.st-main::after{background:linear-gradient(90deg,var(--gold),transparent);}
.st-sub{font-size:11.5px;color:var(--ink-faint);letter-spacing:0.3em;margin-top:4px;text-align:center;}
.st-sub::before,.st-sub::after{content:"❖";font-size:7px;color:var(--gold);opacity:0.62;vertical-align:0.22em;margin:0 9px;}
.zhi-chips{display:flex;gap:7px;}
.chip{font-size:11px;letter-spacing:0.05em;padding:3px 10px;border-radius:11px;border:1px solid var(--gold-d);background:rgba(255,250,235,0.7);color:var(--ink-soft);white-space:nowrap;}
.chip.green{border-color:var(--jade-d);color:var(--jade-d);background:rgba(111,162,145,0.12);}
.chip.hot{border-color:var(--cinnabar);color:#fff;background:linear-gradient(160deg,var(--cinnabar),var(--cinnabar-d));}

/* ── 检索条 ── */
.global-bar{flex:0 0 auto;display:flex;gap:11px;padding:11px 22px;align-items:center;border-bottom:1px solid rgba(168,131,58,0.2);}
.gsearch{position:relative;flex:1;}
.gsearch input{width:100%;font-family:var(--font);font-size:13px;color:var(--ink);padding:9px 13px 9px 36px;border:1px solid rgba(168,131,58,0.36);border-radius:9px;background:rgba(255,252,242,0.78);outline:none;transition:border-color .15s,box-shadow .15s;}
.gsearch input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,131,58,0.1);}
.gsearch input::placeholder{color:var(--ink-faint);}
.gsearch::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--gold-d);}
.gbtn{font-family:var(--font);font-size:12px;letter-spacing:0.06em;cursor:pointer;padding:8px 16px;border-radius:9px;border:1px solid rgba(168,131,58,0.4);background:rgba(255,252,243,0.6);color:var(--ink-soft);transition:all .15s;white-space:nowrap;}
.gbtn:hover{background:#fffdf6;border-color:var(--gold);color:var(--ink);}
.gbtn.seal{border-color:var(--cinnabar-d);color:#fff;background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));box-shadow:0 2px 6px rgba(122,32,24,0.3);}

/* ── 三栏主体 ── */
.zhi-body{flex:1;display:grid;grid-template-columns:296px 1fr 300px;gap:0;min-height:0;}
.panel{display:flex;flex-direction:column;min-height:0;min-width:0;}
.panel.roster{border-right:1px solid rgba(168,131,58,0.2);background:linear-gradient(180deg,rgba(255,253,247,0.4),transparent);}
.panel.folio{border-left:1px solid rgba(168,131,58,0.2);background:linear-gradient(180deg,rgba(255,253,247,0.4),transparent);}

.panel-hd{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid rgba(168,131,58,0.18);}
.panel-hd .seal{width:29px;height:29px;flex:0 0 auto;display:grid;place-items:center;border-radius:7px;font-size:14px;color:#fff;font-weight:bold;background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));border:1px solid rgba(122,32,24,0.55);box-shadow:0 2px 6px rgba(122,32,24,0.36),0 1px 0 rgba(255,255,255,0.2) inset;transform:rotate(-1.5deg);}
.panel-hd .seal.gold{background:linear-gradient(155deg,var(--gold-hi),var(--gold-d));border-color:rgba(125,94,34,0.5);}
.panel-hd b{font-size:13.5px;letter-spacing:0.12em;color:var(--ink);display:block;}
.panel-hd span{font-size:10px;color:var(--ink-faint);letter-spacing:0.04em;}

/* ── 名籍·统计条 ── */
.statbar{flex:0 0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:1px;padding:9px 11px 6px;}
.stat{text-align:center;padding:3px 0;cursor:pointer;border-radius:6px;transition:background .14s;}
.stat:hover{background:rgba(168,131,58,0.1);}
.stat.on{background:rgba(168,50,40,0.1);}
.stat b{display:block;font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1;}
.stat.on b{color:var(--cinnabar-d);}
.stat span{font-size:9px;color:var(--ink-faint);letter-spacing:0.04em;}

/* ── 名籍·检索筛选 ── */
.roster-tools{flex:0 0 auto;padding:4px 11px 9px;border-bottom:1px solid rgba(168,131,58,0.16);}
.r-search{position:relative;margin-bottom:7px;}
.r-search input{width:100%;font-family:var(--font);font-size:12px;color:var(--ink);padding:7px 10px 7px 28px;border:1px solid rgba(168,131,58,0.32);border-radius:8px;background:rgba(255,252,242,0.7);outline:none;}
.r-search input:focus{border-color:var(--gold);}
.r-search::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--gold-d);}
.r-filters{display:flex;gap:5px;margin-bottom:6px;}
.r-sel{flex:1;min-width:0;font-family:var(--font);font-size:10.5px;color:var(--ink-soft);padding:5px 6px;border:1px solid rgba(168,131,58,0.3);border-radius:7px;background:rgba(255,252,242,0.6);cursor:pointer;outline:none;}
.r-meta{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--ink-faint);}
.r-meta b{color:var(--cinnabar-d);font-variant-numeric:tabular-nums;}
.r-check{display:inline-flex;align-items:center;gap:3px;cursor:pointer;}

/* ── 名籍·人物卡列表 ── */
.roster-list{flex:1;overflow-y:auto;padding:7px 9px 14px;}
.fac-hdr{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:0.1em;color:var(--ink-soft);margin:9px 3px 6px;padding-left:8px;border-left:3px solid var(--fc,var(--gold));}
.fac-hdr:first-child{margin-top:2px;}
.fac-hdr .n{font-size:9.5px;color:var(--ink-faint);background:rgba(168,131,58,0.13);border-radius:8px;padding:0 6px;}
.pcard{position:relative;display:flex;gap:9px;width:100%;text-align:left;cursor:pointer;font-family:var(--font);padding:8px 9px;border-radius:9px;border:1px solid rgba(168,131,58,0.2);background:linear-gradient(120deg,var(--silk-hi),var(--silk) 80%);margin-bottom:6px;transition:transform .15s,border-color .15s,box-shadow .15s;overflow:hidden;}
.pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc,var(--gold));opacity:0.55;}
.pcard:hover{transform:translateX(2px);border-color:var(--gold);box-shadow:-1px 1px 8px rgba(120,90,40,0.1);}
.pcard.active{border-color:var(--cinnabar);box-shadow:-2px 0 0 var(--cinnabar),0 2px 10px rgba(120,90,40,0.14);background:linear-gradient(120deg,#fffef7,#fbf4e0);}
.pcard.dead{opacity:0.62;filter:grayscale(0.4);}
/* 立轴装裱头像 */
.pc-face{width:46px;height:56px;flex:0 0 auto;border-radius:4px;overflow:hidden;background:linear-gradient(160deg,#efe3c4,#dcca9f);border:1px solid rgba(168,131,58,0.4);box-shadow:0 1px 3px rgba(120,90,40,0.2),0 0 0 2px rgba(255,253,243,0.6) inset;display:grid;place-items:center;position:relative;}
.pc-face .glyph{font-size:23px;font-weight:bold;color:var(--ink-soft);opacity:0.82;text-shadow:0 1px 0 rgba(255,255,255,0.5);}
.pc-face .pin{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;}
.pc-body{flex:1;min-width:0;}
.pc-name{display:flex;align-items:baseline;gap:5px;}
.pc-name b{font-size:14px;letter-spacing:0.04em;color:var(--ink);}
.pc-name .zi{font-size:10px;color:var(--ink-faint);}
.pc-name .age{font-size:9.5px;color:var(--ink-faint);margin-left:auto;}
.pc-off{font-size:10.5px;color:var(--ink-soft);margin:2px 0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc-off .rk{color:var(--gold-d);}
.pc-bars{display:flex;gap:7px;margin-bottom:4px;}
.pc-bar{flex:1;display:flex;align-items:center;gap:3px;font-size:9px;color:var(--ink-faint);}
.pc-bar i{flex:1;height:3px;border-radius:2px;background:rgba(120,90,40,0.16);overflow:hidden;}
.pc-bar i::after{content:"";display:block;height:100%;width:var(--v,0%);background:linear-gradient(90deg,var(--gold-d),var(--gold-hi));border-radius:2px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;}
.ptag{font-size:9px;padding:1px 6px;border-radius:8px;border:1px solid rgba(168,131,58,0.3);background:rgba(255,252,242,0.6);color:var(--ink-soft);}
.ptag.st{border-color:rgba(168,50,40,0.34);color:var(--cinnabar-d);background:rgba(168,50,40,0.06);}
.ptag.fac{border-color:rgba(74,94,138,0.34);color:var(--indigo);background:rgba(74,94,138,0.07);}
/* 卡上忠诚微环 */
.pc-loy{position:absolute;right:8px;top:8px;width:30px;height:30px;}

/* ── 列传·主区 ── */
.panel.main{background:linear-gradient(180deg,rgba(255,253,247,0.2),transparent);}
.main-scroll{flex:1;overflow-y:auto;}
/* 人物头屏 */
.dossier-head{position:relative;display:flex;gap:18px;padding:18px 22px 16px;border-bottom:1px solid rgba(168,131,58,0.2);background:linear-gradient(180deg,rgba(246,239,218,0.7),transparent);}
.dh-mount{flex:0 0 auto;width:118px;}
.dh-portrait{width:118px;height:150px;border-radius:5px;overflow:hidden;position:relative;background:linear-gradient(165deg,#efe3c4,#d8c397);border:1px solid rgba(168,131,58,0.5);box-shadow:0 4px 14px rgba(120,90,40,0.26),0 0 0 5px rgba(255,253,243,0.7) inset,0 0 0 1px rgba(125,94,34,0.3) inset;display:grid;place-items:center;}
.dh-portrait .glyph{font-size:56px;font-weight:bold;color:var(--ink-soft);opacity:0.8;text-shadow:0 2px 0 rgba(255,255,255,0.4);}
.dh-portrait::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(36,24,14,0.12));}
.dh-mount-cap{text-align:center;font-size:10px;color:var(--ink-faint);letter-spacing:0.2em;margin-top:5px;}
.dh-info{flex:1;min-width:0;}
.dh-titleline{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.dh-titleline h2{font-size:26px;letter-spacing:0.1em;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,0.6);}
.dh-titleline .zi{font-size:13px;color:var(--ink-soft);}
.dh-titleline .age{font-size:12px;color:var(--ink-faint);}
.dh-pills{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.dh-pill{font-size:11px;padding:3px 11px;border-radius:11px;border:1px solid rgba(168,131,58,0.34);background:rgba(255,252,242,0.65);color:var(--ink-soft);}
.dh-pill.fac{border-color:rgba(74,94,138,0.4);color:var(--indigo);background:rgba(74,94,138,0.08);}
.dh-pill.rank{border-color:var(--gold-d);color:var(--gold-d);background:rgba(168,131,58,0.1);}
.dh-hearts{display:flex;gap:18px;margin:10px 0 2px;}
.dh-heart{text-align:center;}
.dh-heart b{display:block;font-size:21px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1;}
.dh-heart.warn b{color:var(--cinnabar-d);}
.dh-heart span{font-size:10px;color:var(--ink-faint);letter-spacing:0.1em;}
.dh-acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.dact{font-family:var(--font);font-size:12px;cursor:pointer;padding:7px 16px;border-radius:8px;border:1px solid rgba(168,131,58,0.36);background:rgba(255,252,243,0.6);color:var(--ink-soft);transition:all .15s;}
.dact:hover{background:#fffdf6;border-color:var(--gold);transform:translateY(-1px);}
.dact.primary{border-color:var(--cinnabar-d);color:#fff;background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));box-shadow:0 2px 6px rgba(122,32,24,0.28);}
.dact.primary:hover{filter:brightness(1.07);}
.dact:disabled{opacity:0.4;cursor:not-allowed;}
/* 头屏忠诚立环 */
.dh-loy{position:absolute;right:22px;top:18px;width:74px;height:74px;text-align:center;}
.dh-loy .lbl{font-size:10px;color:var(--ink-faint);letter-spacing:0.2em;margin-top:1px;}

/* 朱批·人物判断 */
.verdict{margin:13px 22px 4px;padding:11px 15px 11px 16px;border-radius:7px;position:relative;border:1px solid rgba(184,58,43,0.26);background:linear-gradient(180deg,rgba(184,58,43,0.05),rgba(184,58,43,0.02));}
.verdict::before{content:"御 览";position:absolute;left:-1px;top:-10px;font-size:10px;letter-spacing:0.1em;color:#fff;background:linear-gradient(150deg,var(--vermilion),var(--cinnabar-d));padding:2px 8px;border-radius:4px;}
.verdict p{font-family:var(--font);font-size:13.5px;line-height:1.75;color:var(--vermilion);}

/* 页签 */
.tabs{display:flex;gap:2px;padding:11px 22px 0;border-bottom:1px solid rgba(168,131,58,0.22);overflow-x:auto;}
.tab{font-family:var(--font);font-size:13px;letter-spacing:0.08em;cursor:pointer;padding:8px 15px 9px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;color:var(--ink-faint);background:transparent;white-space:nowrap;transition:all .14s;position:relative;top:1px;}
.tab:hover{color:var(--ink-soft);background:rgba(168,131,58,0.06);}
.tab.active{color:var(--cinnabar-d);background:var(--paper);border-color:rgba(168,131,58,0.28);box-shadow:0 -2px 6px rgba(120,90,40,0.05);}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--paper);}

/* 详情卷轴 */
.detail{padding:16px 22px 30px;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dgrid.wide-first>.sec:first-child{grid-column:1/-1;}
.sec{border:1px solid rgba(168,131,58,0.22);border-radius:9px;background:linear-gradient(170deg,rgba(255,253,247,0.65),rgba(246,239,218,0.3));padding:13px 15px;margin-bottom:14px;position:relative;}
.sec.full{grid-column:1/-1;}
.sec-t{font-size:13px;letter-spacing:0.12em;color:var(--ink);font-weight:bold;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sec-t::before{content:"";width:13px;height:13px;border-radius:3px;background:linear-gradient(150deg,var(--gold-hi),var(--gold-d));box-shadow:0 1px 0 rgba(255,255,255,0.3) inset;transform:rotate(-4deg);}
.sec-t small{font-weight:normal;color:var(--ink-faint);font-size:10px;letter-spacing:0.04em;margin-left:auto;}

/* 命盘雷达双联 */
.mingpan-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mingpan{text-align:center;}
.mingpan svg{width:100%;height:auto;max-width:248px;display:block;margin:0 auto;}
.mingpan .cap{font-size:11px;letter-spacing:0.16em;color:var(--ink-soft);margin-top:2px;}

/* 数值条网格 */
.bars{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.bar{font-size:11px;color:var(--ink-soft);}
.bar .k{display:flex;justify-content:space-between;margin-bottom:2px;}
.bar .k b{color:var(--ink);font-variant-numeric:tabular-nums;}
.bar .k .bonus{color:var(--jade-d);font-size:9px;}
.bar .track{height:5px;border-radius:3px;background:rgba(120,90,40,0.13);overflow:hidden;}
.bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--c1,var(--gold-d)),var(--c2,var(--gold-hi)));}

/* 信息grid（身份档案） */
.idgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.idcell{padding:7px 9px;border-radius:7px;background:rgba(255,252,242,0.55);border:1px solid rgba(168,131,58,0.16);}
.idcell span{display:block;font-size:9.5px;color:var(--ink-faint);letter-spacing:0.06em;margin-bottom:2px;}
.idcell b{font-size:12.5px;color:var(--ink);font-weight:normal;}
.idcell.two{grid-column:span 2;}

/* 双重身份 */
.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dualbox{padding:10px 12px;border-radius:8px;background:rgba(255,252,242,0.6);border-left:3px solid var(--dc,var(--gold-d));}
.dualbox .lb{font-size:10px;letter-spacing:0.16em;color:var(--dc,var(--gold-d));margin-bottom:5px;}
.dualbox .v{font-size:13px;color:var(--ink);margin-bottom:3px;}
.dualbox .s{font-size:11px;color:var(--ink-soft);line-height:1.6;}

/* 仿宋传记/散文块 */
.prose{font-family:var(--font-doc);font-size:13px;line-height:1.95;color:var(--ink-soft);text-align:justify;}
.prose.indent{text-indent:2em;}
.prose-paper{padding:12px 15px;border-radius:7px;background:repeating-linear-gradient(0deg,transparent 0 calc(1.95em - 1px),var(--rule-ink) calc(1.95em - 1px) 1.95em),rgba(255,253,247,0.5);border:1px solid rgba(168,131,58,0.16);}

/* 特质/标签 */
.traits{display:flex;flex-wrap:wrap;gap:6px;}
.trait{font-size:11px;padding:3px 11px;border-radius:11px;border:1px solid rgba(168,131,58,0.3);background:rgba(255,252,242,0.6);color:var(--ink-soft);cursor:help;transition:all .14s;}
.trait:hover{border-color:var(--gold);background:#fffdf6;}
.trait.pos{border-color:rgba(111,162,145,0.4);color:var(--jade-d);background:rgba(111,162,145,0.08);}
.trait.neg{border-color:rgba(168,50,40,0.36);color:var(--cinnabar-d);background:rgba(168,50,40,0.06);}

/* 列表行 */
.rows{display:flex;flex-direction:column;}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 2px;border-bottom:1px dashed rgba(168,131,58,0.2);font-size:12px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--ink-faint);}
.row .v{color:var(--ink);text-align:right;max-width:64%;}
.row .v.link{color:var(--indigo);cursor:pointer;}
.row .v.link:hover{text-decoration:underline;}

/* 五常dot */
.wcrow{display:flex;gap:8px;align-items:center;}
.wcrow .lbl{font-size:10px;color:var(--ink-faint);letter-spacing:0.16em;}
.wcdot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;border:1px solid;position:relative;}
.wcdot small{position:absolute;bottom:-13px;font-size:8px;color:var(--ink-faint);font-variant-numeric:tabular-nums;}
.wcdot.hi{background:rgba(111,162,145,0.16);border-color:var(--jade);color:var(--jade-d);}
.wcdot.mid{background:rgba(168,131,58,0.12);border-color:var(--gold);color:var(--gold-d);}
.wcdot.lo{background:rgba(168,50,40,0.08);border-color:rgba(168,50,40,0.34);color:var(--cinnabar-d);}

/* 关系网络 */
.relnet{display:flex;flex-direction:column;gap:6px;}
.relrow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;background:rgba(255,252,242,0.55);border:1px solid rgba(168,131,58,0.16);cursor:pointer;transition:all .14s;}
.relrow:hover{border-color:var(--gold);transform:translateX(2px);}
.relrow .nm{font-size:12.5px;color:var(--ink);min-width:56px;}
.relrow .lbl{font-size:10.5px;padding:1px 8px;border-radius:8px;}
.relrow .lbl.good{color:var(--jade-d);background:rgba(111,162,145,0.13);}
.relrow .lbl.bad{color:var(--cinnabar-d);background:rgba(168,50,40,0.08);}
.relrow .lbl.neu{color:var(--ink-soft);background:rgba(168,131,58,0.1);}
.relrow .meter{flex:1;height:4px;border-radius:2px;background:rgba(120,90,40,0.14);overflow:hidden;position:relative;}
.relrow .meter i{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(120,90,40,0.3);}
.relrow .meter b{position:absolute;top:0;bottom:0;border-radius:2px;}
.relrow .sc{font-size:10px;color:var(--ink-faint);font-variant-numeric:tabular-nums;width:28px;text-align:right;}

/* 御批·君主好感 */
.opinion{padding:11px 14px;border-radius:7px;border-left:3px solid var(--cinnabar);background:linear-gradient(180deg,rgba(184,58,43,0.05),transparent);}
.opinion .big{font-size:26px;color:var(--cinnabar-d);font-variant-numeric:tabular-nums;}
.opinion .brk{font-size:11px;color:var(--ink-faint);}

/* 时间轴/履历 */
.tl{position:relative;padding-left:18px;}
.tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:linear-gradient(180deg,var(--gold-d),rgba(120,90,40,0.15));}
.tlrow{position:relative;padding:0 0 11px 8px;}
.tlrow::before{content:"";position:absolute;left:-15px;top:4px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--gold-d);}
.tlrow.key::before{background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border-color:var(--cinnabar-d);box-shadow:0 0 0 3px rgba(168,50,40,0.14);}
.tlrow .yr{font-size:10px;color:var(--gold-d);font-variant-numeric:tabular-nums;}
.tlrow .ti{font-size:12.5px;color:var(--ink);margin:1px 0;}
.tlrow .ds{font-size:11px;color:var(--ink-soft);line-height:1.6;}

/* 人生历练domain统计 */
.domains{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.dom{font-size:10.5px;padding:2px 9px;border-radius:9px;background:rgba(168,131,58,0.1);color:var(--ink-soft);border:1px solid rgba(168,131,58,0.2);}
.dom b{color:var(--cinnabar-d);font-variant-numeric:tabular-nums;}

/* 记忆条 */
.mems{display:flex;flex-direction:column;gap:1px;}
.mem{display:flex;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(168,131,58,0.13);font-size:12px;}
.mem .t{font-size:10px;color:var(--ink-faint);font-variant-numeric:tabular-nums;flex:0 0 auto;}
.mem .emo{flex:0 0 auto;}
.mem .ev{color:var(--ink-soft);line-height:1.55;}
.mem .who{color:var(--indigo);font-size:10px;}
.emo-喜{color:var(--jade-d);}.emo-怒{color:var(--cinnabar-d);}.emo-忧{color:#b07a2a;}.emo-惧{color:var(--indigo);}.emo-恨{color:var(--cinnabar-d);}.emo-敬{color:var(--jade-d);}.emo-平{color:var(--ink-faint);}
.archive-toggle{font-size:11px;color:var(--gold-d);cursor:pointer;padding:6px 4px;}
.archive-toggle:hover{color:var(--cinnabar-d);}

/* 文事作品 */
.works{display:flex;flex-direction:column;gap:7px;}
.work{padding:8px 11px;border-radius:7px;background:rgba(255,252,242,0.6);border:1px solid rgba(168,131,58,0.18);border-left:3px solid var(--gold-d);cursor:pointer;transition:all .14s;}
.work:hover{border-left-color:var(--cinnabar);transform:translateX(2px);}
.work .ti{font-size:12.5px;color:var(--ink);}
.work .ti .star{color:var(--gold-d);}
.work .mt{font-size:10px;color:var(--ink-faint);margin-top:2px;}

/* 家谱树 */
.fttitle{display:flex;align-items:baseline;gap:10px;}
.fttitle small{font-size:10px;color:var(--ink-faint);letter-spacing:0.04em;}
.ft-wrap{margin:4px -4px 0;overflow-x:auto;}
.ft-svg{width:100%;min-width:560px;height:auto;display:block;}
.ft-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:10.5px;color:var(--ink-faint);}
.ft-lg{display:inline-flex;align-items:center;gap:5px;}
.ft-mk{width:13px;height:11px;border-radius:2px;display:inline-block;}
.ft-mk.self{background:rgba(168,131,58,0.16);border:1.5px solid var(--gold);}
.ft-mk.blood{background:rgba(255,253,243,0.6);border:1px solid var(--gold-d);}
.ft-mk.inlaw{background:rgba(111,162,145,0.08);border:1px dashed var(--jade);}
.ft-mk.dead{background:rgba(120,90,40,0.1);border:1px solid var(--ink-faint);}
.clan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:4px;}
.clan-it{text-align:center;padding:9px 4px;border-radius:8px;background:rgba(255,252,242,0.5);border:1px solid rgba(168,131,58,0.16);}
.clan-it .lb{font-size:9.5px;color:var(--ink-faint);letter-spacing:0.1em;margin-bottom:4px;}
.clan-it .vv{font-size:18px;color:var(--ink);font-variant-numeric:tabular-nums;}
.clan-it .track{height:4px;border-radius:2px;background:rgba(120,90,40,0.13);margin-top:5px;overflow:hidden;}
.clan-it .track i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-hi));}

/* ── 案侧·folio ── */
.folio-scroll{flex:1;overflow-y:auto;padding:11px 13px 20px;}
.fcard{border:1px solid rgba(168,131,58,0.2);border-radius:9px;background:linear-gradient(170deg,rgba(255,253,247,0.7),rgba(246,239,218,0.3));padding:11px 13px;margin-bottom:11px;}
.fcard>.ft{font-size:11.5px;letter-spacing:0.1em;color:var(--ink-soft);font-weight:bold;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.fcard>.ft::before{content:"";width:4px;height:13px;border-radius:2px;background:var(--gold-d);}
.actgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.actgrid .span{grid-column:1/-1;}
.fact{font-family:var(--font);font-size:11.5px;cursor:pointer;padding:8px 6px;border-radius:7px;border:1px solid rgba(168,131,58,0.32);background:rgba(255,252,243,0.6);color:var(--ink-soft);transition:all .14s;text-align:center;}
.fact:hover{background:#fffdf6;border-color:var(--gold);transform:translateY(-1px);}
.fact.primary{border-color:var(--cinnabar-d);color:#fff;background:linear-gradient(155deg,var(--cinnabar-hi),var(--cinnabar-d));}
.fact:disabled{opacity:0.4;cursor:not-allowed;}
.fnote{font-size:10.5px;color:var(--ink-faint);line-height:1.6;margin-top:8px;}
.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.risk{text-align:center;padding:6px 2px;border-radius:6px;background:rgba(255,252,242,0.5);}
.risk span{display:block;font-size:9px;color:var(--ink-faint);}
.risk b{font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums;}
.fverdict{padding:8px 10px;border-radius:6px;background:rgba(168,50,40,0.06);border-left:3px solid var(--cinnabar);margin-bottom:9px;}
.fverdict strong{display:block;font-size:12px;color:var(--cinnabar-d);}
.fverdict span{font-size:10.5px;color:var(--ink-soft);line-height:1.5;}

/* scrollbar */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(168,131,58,0.3);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:rgba(168,131,58,0.5);}
::-webkit-scrollbar-track{background:transparent;}

/* ===== v2 增补 ===== */
/* 版心鱼尾·装裱角花 */
.zhi-frame::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:29;
  background-image:radial-gradient(circle at 0 0,rgba(125,94,34,0.16) 0 1px,transparent 1.4px),radial-gradient(circle at 100% 0,rgba(125,94,34,0.16) 0 1px,transparent 1.4px),radial-gradient(circle at 0 100%,rgba(125,94,34,0.16) 0 1px,transparent 1.4px),radial-gradient(circle at 100% 100%,rgba(125,94,34,0.16) 0 1px,transparent 1.4px);
  background-size:18px 18px;background-repeat:no-repeat;background-position:11px 11px,calc(100% - 11px) 11px,11px calc(100% - 11px),calc(100% - 11px) calc(100% - 11px);}
/* 印鉴 */
.seal-mark{flex:0 0 auto;width:36px;height:36px;}
.seal-mark svg{display:block;width:100%;height:100%;filter:drop-shadow(0 1px 1px rgba(122,32,24,0.3));transform:rotate(-2deg);}
/* 立轴题跋（竖排） */
.dh-colophon{writing-mode:vertical-rl;text-orientation:upright;font-family:var(--font-doc);font-size:10.5px;letter-spacing:0.18em;color:var(--ink-faint);height:150px;line-height:1.5;margin-left:2px;max-height:150px;overflow:hidden;border-left:1px solid rgba(168,131,58,0.2);padding-left:3px;}
.dh-mountwrap{display:flex;gap:4px;}
/* 境遇横幅 */
.situation{display:flex;align-items:center;gap:9px;margin:9px 0 2px;padding:7px 13px;border-radius:7px;font-size:12px;letter-spacing:0.08em;position:relative;overflow:hidden;}
.situation .sg{flex:0 0 auto;width:24px;height:24px;border-radius:5px;display:grid;place-items:center;font-size:13px;font-weight:bold;color:#fff;}
.situation .stx b{font-size:12.5px;}.situation .stx span{font-size:10.5px;opacity:0.85;margin-left:6px;}
.situation.imprison{background:linear-gradient(100deg,rgba(122,32,24,0.12),rgba(122,32,24,0.03));border:1px solid rgba(122,32,24,0.3);color:var(--cinnabar-d);}
.situation.imprison .sg{background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));}
.situation.exile{background:linear-gradient(100deg,rgba(142,106,168,0.12),rgba(142,106,168,0.03));border:1px solid rgba(142,106,168,0.3);color:var(--purple);}
.situation.exile .sg{background:linear-gradient(150deg,#a98ac4,#6f4f8a);}
.situation.travel{background:linear-gradient(100deg,rgba(168,131,58,0.13),rgba(168,131,58,0.03));border:1px solid rgba(168,131,58,0.3);color:var(--gold-d);}
.situation.travel .sg{background:linear-gradient(150deg,var(--gold-hi),var(--gold-d));}
.situation.dead{background:linear-gradient(100deg,rgba(120,90,40,0.1),transparent);border:1px solid rgba(120,90,40,0.26);color:var(--ink-soft);}
.situation.dead .sg{background:linear-gradient(150deg,#9c8b6b,#6b5d44);}
.situation.scheme{background:linear-gradient(100deg,rgba(36,24,14,0.1),transparent);border:1px solid rgba(36,24,14,0.26);color:var(--ink);}
.situation.scheme .sg{background:linear-gradient(150deg,#574733,#241d15);}
/* 关系图谱 ego-network */
.egonet{position:relative;}
.egonet svg{width:100%;height:auto;display:block;}
.egonode{cursor:pointer;}
.egonode rect,.egonode circle.nbg{transition:all .15s;}
.egonode:hover rect{stroke-width:2;}
.egonode.self{cursor:default;}
.egolegend{display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:10.5px;color:var(--ink-faint);}
.egolegend span{display:inline-flex;align-items:center;gap:5px;}
.egolegend i{width:14px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block;}
/* 对参 compare */
.cmp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 22px 12px;border-bottom:1px solid rgba(168,131,58,0.22);background:linear-gradient(180deg,rgba(246,239,218,0.7),transparent);}
.cmp-head h2{font-size:19px;letter-spacing:0.14em;color:var(--ink);}
.cmp-head h2 small{font-size:11px;color:var(--ink-faint);letter-spacing:0.04em;margin-left:8px;}
.cmp-clear{font-family:var(--font);font-size:12px;cursor:pointer;padding:6px 14px;border-radius:8px;border:1px solid rgba(168,131,58,0.4);background:rgba(255,252,243,0.6);color:var(--ink-soft);}
.cmp-clear:hover{border-color:var(--cinnabar);color:var(--cinnabar-d);}
.cmp-body{padding:16px 22px 30px;}
.cmp-people{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.cmp-person{display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:9px;border:1px solid;background:linear-gradient(170deg,rgba(255,253,247,0.7),rgba(246,239,218,0.3));border-left-width:4px;}
.cmp-person.a{border-color:rgba(168,50,40,0.4);border-left-color:var(--cinnabar);}
.cmp-person.b{border-color:rgba(74,94,138,0.4);border-left-color:var(--indigo);}
.cmp-face{width:46px;height:56px;flex:0 0 auto;border-radius:4px;background:linear-gradient(160deg,#efe3c4,#dcca9f);border:1px solid rgba(168,131,58,0.4);display:grid;place-items:center;font-size:22px;font-weight:bold;color:var(--ink-soft);}
.cmp-person .nm{font-size:16px;color:var(--ink);}
.cmp-person .of{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.cmp-person .fa{font-size:10.5px;margin-top:3px;}
.cmp-radar-wrap{display:flex;flex-direction:column;align-items:center;}
.cmp-radar-wrap svg{max-width:300px;width:100%;}
.cmp-verdict{margin-top:12px;padding:11px 15px;border-radius:7px;border-left:3px solid var(--gold-d);background:rgba(168,131,58,0.07);font-family:var(--font-doc);font-size:13px;line-height:1.8;color:var(--ink-soft);}
.cmp-verdict b{font-family:var(--font);color:var(--gold-d);}
.cmpbar{display:grid;grid-template-columns:60px 1fr 38px 1fr 60px;align-items:center;gap:8px;font-size:11px;margin-bottom:7px;}
.cmpbar .ka{text-align:right;color:var(--cinnabar-d);font-variant-numeric:tabular-nums;}
.cmpbar .kb{text-align:left;color:var(--indigo);font-variant-numeric:tabular-nums;}
.cmpbar .lab{text-align:center;color:var(--ink-faint);}
.cmpbar .ta,.cmpbar .tb{height:7px;background:rgba(120,90,40,0.12);border-radius:4px;overflow:hidden;position:relative;}
.cmpbar .ta i{position:absolute;right:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(168,50,40,0.5),var(--cinnabar));border-radius:4px;}
.cmpbar .tb i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--indigo),rgba(74,94,138,0.5));border-radius:4px;}
.cmpbarN{display:grid;grid-template-columns:48px 1fr;align-items:center;gap:10px;margin-bottom:10px;font-size:11px;}
.cmpbarN .lab{color:var(--ink-faint);text-align:right;}
.cmpbarN .cells{display:flex;flex-direction:column;gap:3px;}
.cwbar{display:flex;align-items:center;gap:6px;}
.cwbar i{height:6px;border-radius:3px;min-width:2px;}
.cwbar b{font-variant-numeric:tabular-nums;font-size:11px;width:26px;text-align:right;}
.cmp-person{position:relative;}
.cmp-drop{position:absolute;right:7px;top:7px;width:18px;height:18px;border-radius:5px;border:1px solid rgba(168,131,58,0.34);background:rgba(255,252,242,0.85);color:var(--ink-faint);font-size:11px;display:grid;place-items:center;cursor:pointer;z-index:2;}
.cmp-drop:hover{border-color:var(--cinnabar);color:var(--cinnabar-d);}
/* 对参按钮(roster卡) */
.pc-cmp{position:absolute;right:8px;bottom:8px;width:20px;height:20px;border-radius:5px;border:1px solid rgba(168,131,58,0.34);background:rgba(255,252,242,0.8);color:var(--gold-d);font-size:12px;display:grid;place-items:center;cursor:pointer;opacity:0;transition:all .14s;z-index:2;}
.pcard:hover .pc-cmp{opacity:1;}
.pc-cmp:hover{border-color:var(--cinnabar);color:var(--cinnabar-d);background:#fff;transform:scale(1.1);}
/* 微交互·按压回弹 */
.dact:active,.fact:active,.gbtn:active{transform:scale(0.97);}

/* ===== v3: 视图切换 + 朝局全景 + 排行榜 ===== */
.viewtabs{display:flex;gap:3px;flex:0 0 auto;}
.vtab{font-family:var(--font);font-size:12px;letter-spacing:0.08em;cursor:pointer;padding:8px 14px;border-radius:8px;border:1px solid rgba(168,131,58,0.34);background:rgba(255,252,243,0.5);color:var(--ink-soft);transition:all .15s;}
.vtab:hover{border-color:var(--gold);}
.vtab.active{color:#fff;background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border-color:var(--cinnabar-d);box-shadow:0 2px 6px rgba(122,32,24,0.26);}
.chaoju,.paihang{padding:16px 22px 30px;}
.chaoju-graph svg{width:100%;height:auto;display:block;}
.cnode{cursor:pointer;}.cnode text{pointer-events:none;}
.cj-balance{margin-bottom:14px;padding:11px 15px;border-radius:9px;background:linear-gradient(170deg,rgba(255,253,247,0.7),rgba(246,239,218,0.3));border:1px solid rgba(168,131,58,0.22);}
.cj-balance .bt{font-size:11.5px;color:var(--ink-soft);letter-spacing:0.1em;margin-bottom:7px;}
.cj-bar{height:18px;border-radius:9px;overflow:hidden;display:flex;border:1px solid rgba(168,131,58,0.3);}
.cj-bar span{height:100%;display:flex;align-items:center;justify-content:center;font-size:9.5px;color:#fff;white-space:nowrap;overflow:hidden;text-shadow:0 1px 1px rgba(0,0,0,0.3);}
.cj-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px;}
.cj-card{border:1px solid rgba(168,131,58,0.22);border-top:3px solid var(--fc,var(--gold));border-radius:9px;background:linear-gradient(170deg,rgba(255,253,247,0.7),rgba(246,239,218,0.3));padding:11px 13px;}
.cj-card .ct{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
.cj-card .ct b{font-size:14px;letter-spacing:0.1em;color:var(--ink);}
.cj-card .ct .pw{font-size:10px;color:var(--ink-faint);}
.cj-members{display:flex;flex-wrap:wrap;gap:5px;}
.cj-mem{font-size:11px;padding:2px 9px;border-radius:9px;border:1px solid rgba(168,131,58,0.26);background:rgba(255,252,242,0.6);color:var(--ink-soft);cursor:pointer;transition:all .14s;}
.cj-mem:hover{border-color:var(--cinnabar);color:var(--cinnabar-d);transform:translateY(-1px);}
.cj-mem.lead{border-color:var(--gold-d);color:var(--gold-d);font-weight:bold;background:rgba(168,131,58,0.12);}
.cj-mem.dead{opacity:0.5;text-decoration:line-through;}
.cj-legend{display:flex;gap:16px;justify-content:center;margin:8px 0 2px;font-size:10.5px;color:var(--ink-faint);}
.cj-legend i{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block;vertical-align:middle;margin-right:5px;}
.ph-ctrl{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.ph-ctrl .lb{font-size:11px;color:var(--ink-faint);letter-spacing:0.06em;}
.phb{font-family:var(--font);font-size:11px;cursor:pointer;padding:5px 12px;border-radius:7px;border:1px solid rgba(168,131,58,0.3);background:rgba(255,252,242,0.55);color:var(--ink-soft);transition:all .14s;}
.phb:hover{border-color:var(--gold);}
.phb.active{color:#fff;background:linear-gradient(150deg,var(--gold),var(--gold-d));border-color:var(--gold-d);}
.ph-table{width:100%;border-collapse:collapse;font-size:12px;}

.ph-rank{font-size:14px;color:var(--gold-d);font-weight:bold;width:32px;}

/* 御笔朱批 */
.zhubi{margin:11px 22px 4px;padding:10px 15px 10px 16px;border-radius:7px;position:relative;border:1px solid rgba(184,58,43,0.3);background:linear-gradient(180deg,rgba(184,58,43,0.06),rgba(184,58,43,0.02));}
.zhubi::before{content:"御 笔";position:absolute;left:-1px;top:-10px;font-size:10px;letter-spacing:0.1em;color:#fff;background:linear-gradient(150deg,var(--vermilion),var(--cinnabar-d));padding:2px 8px;border-radius:4px;}
.zhubi .zb-txt{font-family:var(--font);font-size:13.5px;line-height:1.75;color:var(--vermilion);min-height:20px;}
.zhubi .zb-txt.empty{color:var(--ink-faint);font-style:italic;}
.zhubi .zb-edit{position:absolute;right:10px;top:8px;font-size:11px;color:var(--cinnabar-d);cursor:pointer;border:1px solid rgba(184,58,43,0.3);border-radius:6px;padding:2px 9px;background:rgba(255,252,243,0.7);}
.zhubi .zb-edit:hover{background:var(--cinnabar);color:#fff;}
.zhubi textarea{width:100%;font-family:var(--font);font-size:13px;color:var(--vermilion);background:rgba(255,253,247,0.8);border:1px solid rgba(184,58,43,0.3);border-radius:6px;padding:7px 9px;resize:vertical;min-height:54px;outline:none;line-height:1.7;}
.zhubi .zb-acts{margin-top:7px;display:flex;gap:7px;justify-content:flex-end;}
.zhubi .zb-acts button{font-family:var(--font);font-size:11px;cursor:pointer;padding:4px 12px;border-radius:6px;border:1px solid rgba(168,131,58,0.4);background:rgba(255,252,243,0.6);color:var(--ink-soft);}
.zhubi .zb-acts button.save{border-color:var(--cinnabar-d);color:#fff;background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));}
/* 本纪长卷(横向编年) */
.benji-wrap{position:relative;margin:2px 0 4px;}
.benji-scroll{overflow-x:auto;overflow-y:hidden;padding:30px 6px 14px;}
.benji-rail{position:relative;display:inline-flex;align-items:flex-start;gap:0;min-width:100%;}
.benji-rail::before{content:"";position:absolute;left:8px;right:8px;top:14px;height:3px;border-radius:2px;background:linear-gradient(90deg,rgba(120,90,40,0.16),var(--gold-d),rgba(120,90,40,0.16));}
.bj-node{position:relative;flex:0 0 auto;width:150px;padding:0 10px;}
.bj-node .dot{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid var(--gold-d);z-index:1;}
.bj-node.key .dot{background:linear-gradient(150deg,var(--cinnabar-hi),var(--cinnabar-d));border-color:var(--cinnabar-d);box-shadow:0 0 0 3px rgba(168,50,40,0.16);}
.bj-node.arc .dot{border-color:var(--indigo);}
.bj-node .when{text-align:center;font-size:10px;color:var(--gold-d);font-variant-numeric:tabular-nums;margin-bottom:8px;margin-top:-2px;}
.bj-node .card{border:1px solid rgba(168,131,58,0.24);border-radius:8px;background:linear-gradient(170deg,rgba(255,253,247,0.8),rgba(246,239,218,0.4));padding:8px 10px;margin-top:18px;min-height:60px;}
.bj-node.key .card{border-color:rgba(168,50,40,0.34);}
.bj-node .card .ti{font-size:12.5px;color:var(--ink);margin-bottom:3px;}
.bj-node .card .ds{font-size:10.5px;color:var(--ink-soft);line-height:1.55;}
.bj-node .card .tag{display:inline-block;font-size:9px;color:var(--ink-faint);border:1px solid rgba(168,131,58,0.3);border-radius:7px;padding:0 6px;margin-bottom:3px;}
/* 视角(此人眼中) */
.pov-lead{font-family:var(--font-doc);font-size:14px;line-height:1.9;color:var(--ink);text-align:justify;padding:12px 16px;border-radius:7px;background:repeating-linear-gradient(0deg,transparent 0 calc(1.9em - 1px),var(--rule-ink) calc(1.9em - 1px) 1.9em),rgba(255,253,247,0.5);border:1px solid rgba(168,131,58,0.18);border-left:3px solid var(--purple);}
.pov-lead .me{color:var(--purple);font-weight:bold;}
.pov-eye{display:flex;flex-direction:column;gap:7px;}
.pov-row{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:7px;background:rgba(255,252,242,0.55);border:1px solid rgba(168,131,58,0.16);cursor:pointer;transition:all .14s;}

.pov-row .who{flex:0 0 auto;font-size:13px;color:var(--ink);min-width:52px;}
.pov-row .say{flex:1;font-family:var(--font-doc);font-size:12.5px;line-height:1.6;color:var(--ink-soft);font-style:italic;}
.pov-row .say.good{color:var(--jade-d);}.pov-row .say.bad{color:var(--cinnabar-d);}

/* ===== v3c: 善本质感深化 + 翻卷动效 + 立绘装裱 ===== */
/* 纸纤理加层 + 四角做旧晕 */
.zhi-frame{background:
  repeating-linear-gradient(46deg,rgba(120,90,40,0.016) 0 1px,transparent 1px 6px),
  radial-gradient(130% 70% at 50% -5%,transparent 62%,rgba(90,66,28,0.055)),
  radial-gradient(130% 70% at 50% 105%,transparent 62%,rgba(90,66,28,0.06)),
  linear-gradient(168deg,var(--silk-hi),var(--silk) 60%,var(--silk-lo));}
/* 命盘描入 */
@keyframes radarIn{from{opacity:0;transform:scale(0.82);}to{opacity:1;transform:scale(1);}}
.radar-svg{animation:radarIn .55s cubic-bezier(.2,.7,.3,1) both;transform-origin:center;}
/* 翻卷:视图/对参换页 */
@keyframes pageTurn{from{opacity:0;transform:perspective(1400px) rotateY(-3.5deg) translateX(-7px);transform-origin:left center;}to{opacity:1;transform:none;}}
.chaoju,.paihang,.cmp-body{animation:pageTurn .42s ease-out both;}
/* 立绘装裱:锦边+描金+米色裱绫,天杆,钤印 */
.dh-mount{position:relative;}
.dh-mount::before{content:"";position:absolute;left:-5px;right:-5px;top:-8px;height:5px;border-radius:3px;background:linear-gradient(180deg,var(--gold-d),var(--gold-hi));box-shadow:0 1px 3px rgba(120,90,40,0.34);}
.dh-portrait{box-shadow:0 5px 16px rgba(120,90,40,0.3),0 0 0 5px rgba(252,247,236,0.85) inset,0 0 0 6px rgba(125,94,34,0.42),0 0 0 10px rgba(168,131,58,0.2),0 0 0 11px rgba(125,94,34,0.3);}
.dh-seal-on{position:absolute;right:3px;bottom:3px;width:24px;height:24px;z-index:2;}
.dh-seal-on .seal-mark{width:24px;height:24px;}
.dh-seal-on .seal-mark svg{transform:rotate(4deg);filter:drop-shadow(0 1px 1px rgba(122,32,24,0.4));}

/* 入场动效（克制·只动卷轴内容·尊重 reduced-motion） */
@keyframes leaf{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.detail>*{animation:leaf .3s ease-out both;}
.detail>*:nth-child(2){animation-delay:.04s;}
.detail>*:nth-child(3){animation-delay:.08s;}
.detail>*:nth-child(4){animation-delay:.12s;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);z-index:90;opacity:0;pointer-events:none;font-size:13px;letter-spacing:0.08em;color:#fff;padding:11px 22px;border-radius:9px;background:linear-gradient(155deg,rgba(58,40,22,0.96),rgba(36,24,14,0.96));border:1px solid var(--gold-d);box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast b{color:var(--gold-hi);}
.previewbar{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:50;font-family:var(--font);font-size:10.5px;color:var(--ink-faint);background:rgba(255,250,235,0.7);border:1px solid rgba(168,131,58,0.3);padding:3px 12px;border-radius:20px;}
.previewbar b{color:var(--cinnabar-d);}

/* ===================== 工具 ===================== */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function clamp(v){return Math.max(0,Math.min(100,Number(v)||0));}
function toast(m){var t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1900);}
var FACOLOR={'皇室':'#a8833a','阉党':'#8e6aa8','边镇':'#7a2018','清流':'#557f6f','东林':'#4a5e8a','后宫':'#c64a3e','无派系':'#9c8b6b'};

function findP(name){return PEOPLE.find(function(p){return p.name===name;});}
function isCivil(p){return (p.administration||0)>(p.military||0) && p.faction!=='后宫' && !!p.officialTitle && p.faction!=='阉党'||(p.role==='辅臣'||p.role==='元辅');}
function roleOf(p){
  if(p.faction==='后宫') return 'harem';
  if(p.faction==='阉党') return 'harem';
  if(!p.officialTitle && !p.title) return 'bu';
  if((p.military||0)>=(p.administration||0) && (p.military||0)>=40) return 'mili';
  return 'civil';
}
function inCapital(p){return /京|宫|乾清|慈庆|东厂/.test(String(p.location||''));}

function faceGlyph(p){return esc((p.name||'?').charAt(0));}

/* ===================== 忠诚环 SVG ===================== */
function loyRing(val,size){
  var v=clamp(val),r=size*0.4,c=2*Math.PI*r,off=c*(1-v/100),cx=size/2;
  var col=v>=70?'#6fa291':v>=40?'#a8833a':'#a83228';
  return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="rgba(120,90,40,0.16)" stroke-width="'+(size*0.07)+'"/>'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+(size*0.07)+'" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cx+')"/>'
    +'<text x="'+cx+'" y="'+(cx-1)+'" text-anchor="middle" font-size="'+(size*0.34)+'" font-weight="bold" fill="'+col+'" font-family="serif">'+Math.round(v)+'</text>'
    +'<text x="'+cx+'" y="'+(cx+size*0.26)+'" text-anchor="middle" font-size="'+(size*0.16)+'" fill="#9c8b6b" font-family="serif">忠</text>'
    +'</svg>';
}

/* ===================== 禀赋命盘（雷达）SVG ===================== */
function radar(axes,opts){
  opts=opts||{};
  var size=opts.size||220,cx=size/2,cy=size/2+4,maxR=size*0.34,rings=4;
  var col=opts.color||'#a83228',n=axes.length;
  var s='<svg viewBox="0 0 '+size+' '+(size+8)+'" class="radar-svg">';
  // 同心墨环
  for(var ri=1;ri<=rings;ri++){
    var rr=maxR*ri/rings,pts=[];
    for(var i=0;i<n;i++){var a=-Math.PI/2+i*2*Math.PI/n;pts.push((cx+rr*Math.cos(a)).toFixed(1)+','+(cy+rr*Math.sin(a)).toFixed(1));}
    s+='<polygon points="'+pts.join(' ')+'" fill="'+(ri===rings?'rgba(255,253,243,0.4)':'none')+'" stroke="rgba(120,90,40,'+(ri===rings?0.34:0.16)+')" stroke-width="1"/>';
  }
  // 辐 + 轴名 + 数据点
  var dpts=[];
  for(var i2=0;i2<n;i2++){
    var a2=-Math.PI/2+i2*2*Math.PI/n;
    var ex=cx+maxR*Math.cos(a2),ey=cy+maxR*Math.sin(a2);
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ex.toFixed(1)+'" y2="'+ey.toFixed(1)+'" stroke="rgba(168,131,58,0.34)" stroke-width="1"/>';
    var lx=cx+(maxR+15)*Math.cos(a2),ly=cy+(maxR+15)*Math.sin(a2);
    var anchor=Math.abs(Math.cos(a2))<0.3?'middle':(Math.cos(a2)>0?'start':'end');
    s+='<text x="'+lx.toFixed(1)+'" y="'+(ly+3).toFixed(1)+'" text-anchor="'+anchor+'" font-size="11" fill="#574733" font-family="serif">'+esc(axes[i2].label)+'</text>';
    var v=clamp(axes[i2].value),dr=maxR*v/100;
    dpts.push((cx+dr*Math.cos(a2)).toFixed(1)+','+(cy+dr*Math.sin(a2)).toFixed(1));
  }
  // 第三数据集(对参·最下层·点线)
  if(opts.third && opts.third.axes){
    var c3=opts.third.color||'#557f6f',d3=[];
    for(var k=0;k<n;k++){var ak=-Math.PI/2+k*2*Math.PI/n,vk=clamp(opts.third.axes[k].value),drk=maxR*vk/100;d3.push((cx+drk*Math.cos(ak)).toFixed(1)+','+(cy+drk*Math.sin(ak)).toFixed(1));}
    s+='<polygon points="'+d3.join(' ')+'" fill="'+c3+'" fill-opacity="0.12" stroke="'+c3+'" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="1.5,3"/>';
    for(var k2=0;k2<n;k2++){var ak2=-Math.PI/2+k2*2*Math.PI/n,vk2=clamp(opts.third.axes[k2].value),drk2=maxR*vk2/100;s+='<circle cx="'+(cx+drk2*Math.cos(ak2)).toFixed(1)+'" cy="'+(cy+drk2*Math.sin(ak2)).toFixed(1)+'" r="2" fill="'+c3+'"/>';}
  }
  // 第二数据集(对参·下层·虚线)
  if(opts.second && opts.second.axes){
    var c2=opts.second.color||'#4a5e8a',d2=[];
    for(var j=0;j<n;j++){var aj=-Math.PI/2+j*2*Math.PI/n,vj=clamp(opts.second.axes[j].value),drj=maxR*vj/100;d2.push((cx+drj*Math.cos(aj)).toFixed(1)+','+(cy+drj*Math.sin(aj)).toFixed(1));}
    s+='<polygon points="'+d2.join(' ')+'" fill="'+c2+'" fill-opacity="0.14" stroke="'+c2+'" stroke-width="1.6" stroke-linejoin="round" stroke-dasharray="4,2.5"/>';
    for(var j2=0;j2<n;j2++){var aj2=-Math.PI/2+j2*2*Math.PI/n,vj2=clamp(opts.second.axes[j2].value),drj2=maxR*vj2/100;s+='<circle cx="'+(cx+drj2*Math.cos(aj2)).toFixed(1)+'" cy="'+(cy+drj2*Math.sin(aj2)).toFixed(1)+'" r="2.2" fill="'+c2+'"/>';}
  }
  // 主数据多边形
  s+='<polygon points="'+dpts.join(' ')+'" fill="'+col+'" fill-opacity="0.2" stroke="'+col+'" stroke-width="1.7" stroke-linejoin="round"/>';
  for(var i3=0;i3<n;i3++){
    var a3=-Math.PI/2+i3*2*Math.PI/n,v3=clamp(axes[i3].value),dr3=maxR*v3/100;
    s+='<circle cx="'+(cx+dr3*Math.cos(a3)).toFixed(1)+'" cy="'+(cy+dr3*Math.sin(a3)).toFixed(1)+'" r="2.4" fill="'+col+'"/>';
  }
  s+='</svg>';
  return s;
}

/* ===================== 五代家谱树 SVG ===================== */
function familyTree(p){
  var groups={'-2':[],'-1':[],'0':[],'1':[],'2':[]};
  (p.bloodRelatives||[]).forEach(function(m){var g=String(m.generation==null?0:m.generation);if(groups[g])groups[g].push(m);});
  groups['0'].unshift({name:p.name,relation:'本人',self:true,age:p.age,title:p.officialTitle||p.rank});
  var labels={'-2':'祖 辈','-1':'父 辈','0':'同 辈','1':'子 嗣','2':'孙 辈'};
  var yMap={'-2':30,'-1':128,'0':226,'1':324,'2':422};
  var W=620,H=470;
  var s='<svg viewBox="0 0 '+W+' '+H+'" class="ft-svg">';
  s+='<g font-family="serif" font-size="10" letter-spacing="2" fill="#8a6d2b">';
  Object.keys(labels).forEach(function(g){if(groups[g]&&groups[g].length)s+='<text x="8" y="'+(yMap[g]+22)+'">'+labels[g]+'</text>';});
  s+='<line x1="4" y1="26" x2="4" y2="'+(H-20)+'" stroke="#b89a53" stroke-width="1" opacity="0.34"/></g>';
  s+='<g font-family="serif">';
  Object.keys(groups).forEach(function(g){
    var row=groups[g];if(!row.length)return;
    var gap=Math.min(116,(W-110)/Math.max(1,row.length)),rowW=(row.length-1)*gap+96,startX=Math.max(56,(W+30)/2-rowW/2);
    row.forEach(function(m,idx){
      var x=startX+idx*gap,y=yMap[g],dead=m.dead,inLaw=m.inLaw||/妻|夫|姻|母|嫂|媳|岳|对食/.test(m.relation||'');
      var rectFill=m.self?'rgba(168,131,58,0.14)':(inLaw?'rgba(111,162,145,0.06)':'rgba(255,253,243,0.55)');
      var rectStroke=m.self?'#a8833a':(inLaw?'#6fa291':'#b89a53'),rsw=m.self?'2':'1',dash=inLaw?' stroke-dasharray="3,2"':'';
      var txtCol=m.self?'#7d5e22':(dead?'#9c8b6b':'#241d15'),relCol=m.self?'#a8833a':(inLaw?'#2d5848':'#7d5e22'),nh=m.self?48:40;
      var sub=(m.age?m.age+'岁 · ':'')+(m.title||m.note||'');
      s+='<g transform="translate('+x+','+y+')">';
      s+='<rect width="96" height="'+nh+'" rx="4" fill="'+rectFill+'" stroke="'+rectStroke+'" stroke-width="'+rsw+'"'+dash+'/>';
      s+='<text x="48" y="14" text-anchor="middle" font-size="8.5" fill="'+relCol+'" letter-spacing="1.5">'+esc(m.relation||'亲属')+'</text>';
      s+='<text x="48" y="'+(m.self?32:29)+'" text-anchor="middle" font-size="'+(m.self?15:13)+'" fill="'+txtCol+'" '+(m.self?'font-weight="bold"':'')+'>'+esc((m.name||'')+(dead?' †':''))+'</text>';
      s+='<text x="48" y="'+(m.self?43:38)+'" text-anchor="middle" font-size="8" fill="#9c8b6b">'+esc(sub.slice(0,12))+'</text>';
      s+='</g>';
    });
  });
  s+='</g></svg>';
  return s;
}

/* ===================== 名籍·统计 + 列表 ===================== */
function computeStat(){
  var st={all:0,civil:0,mili:0,harem:0,bu:0,dead:0};
  PEOPLE.forEach(function(p){
    if(p.alive===false){st.dead++;return;}
    var r=roleOf(p);
    if(r==='harem')st.harem++;else if(r==='mili'){st.mili++;st.all++;}else if(r==='bu')st.bu++;else{st.civil++;st.all++;}
  });
  return st;
}
function renderStatbar(){
  var st=computeStat();
  var cells=[['all',st.all,'在朝'],['civil',st.civil,'文臣'],['mili',st.mili,'武将'],['harem',st.harem,'内廷'],['bu',st.bu,'布衣'],['dead',st.dead,'已殁']];
  document.getElementById('statbar').innerHTML=cells.map(function(c){
    return '<div class="stat'+(state.roleStat===c[0]?' on':'')+'" onclick="quickStat(\''+c[0]+'\')"><b>'+c[1]+'</b><span>'+c[2]+'</span></div>';
  }).join('');
}
function quickStat(k){
  if(k==='dead'){state.dead=true;document.getElementById('fDead').checked=true;state.role='all';}
  else if(k==='all'){state.role='all';}
  else {state.role=k;}
  document.getElementById('fRole').value=(k==='all'||k==='dead')?'all':k;
  state.roleStat=state.roleStat===k?'all':k;
  renderRoster();renderStatbar();
}
function renderFacOptions(){
  var facs=Array.from(new Set(PEOPLE.map(function(p){return p.faction;})));
  document.getElementById('fFac').innerHTML='<option value="all">全部党派</option>'+facs.map(function(f){return '<option value="'+esc(f)+'">'+esc(f)+'</option>';}).join('');
}
function filtered(){
  var list=PEOPLE.slice();
  if(!state.dead)list=list.filter(function(p){return p.alive!==false;});
  if(state.q){var kw=state.q.toLowerCase();list=list.filter(function(p){return (p.name+(p.zi||'')+(p.officialTitle||'')+(p.faction||'')+(p.title||'')).toLowerCase().indexOf(kw)>=0;});}
  if(state.fac!=='all')list=list.filter(function(p){return p.faction===state.fac;});
  if(state.role!=='all')list=list.filter(function(p){return roleOf(p)===state.role;});
  list.sort(function(a,b){
    if(a.isPlayer&&!b.isPlayer)return -1;if(!a.isPlayer&&b.isPlayer)return 1;
    if(state.sort==='name')return a.name.localeCompare(b.name,'zh');
    return (b[state.sort]||0)-(a[state.sort]||0);
  });
  return list;
}
function pcard(p){
  var fc=FACOLOR[p.faction]||'#a8833a';
  var bars=[['智',p.intelligence],['政',p.administration],['武',p.military]];
  var tags=[];
  if(p._travelTo)tags.push('<span class="ptag st">赴任</span>');
  if(p._scheming)tags.push('<span class="ptag st">密谋</span>');
  if(p.alive===false)tags.push('<span class="ptag st">已殁</span>');
  if((p.stress||0)>70)tags.push('<span class="ptag st">重压</span>');
  tags.push('<span class="ptag fac">'+esc(p.faction)+'</span>');
  return '<button class="pcard'+(p.name===state.sel?' active':'')+(p.alive===false?' dead':'')+'" style="--fc:'+fc+'" onclick="selectP(\''+esc(p.name)+'\')">'
    +'<span class="pc-face"><span class="glyph">'+faceGlyph(p)+'</span></span>'
    +'<span class="pc-body">'
      +'<span class="pc-name"><b>'+esc(p.name)+'</b>'+(p.zi?'<span class="zi">字'+esc(p.zi)+'</span>':'')+'<span class="age">'+(p.age||'?')+'岁</span></span>'
      +'<span class="pc-off">'+esc(p.officialTitle||p.title||'布衣')+' <span class="rk">'+esc(p.rank||'')+'</span></span>'
      +'<span class="pc-bars">'+bars.map(function(b){return '<span class="pc-bar">'+b[0]+'<i style="--v:'+clamp(b[1])+'%"></i></span>';}).join('')+'</span>'
      +'<span class="pc-tags">'+tags.join('')+'</span>'
    +'</span>'
    +'<span class="pc-loy">'+loyRing(p.loyalty,30)+'</span>'
    +(p.name===state.sel?'':'<span class="pc-cmp" title="与当前选中者对参" onclick="event.stopPropagation();setCompare(\''+esc(p.name)+'\')">⇌</span>')
  +'</button>';
}
function renderRoster(){
  var list=filtered();
  document.getElementById('visCount').textContent=list.length;
  var box=document.getElementById('rosterList');
  if(!list.length){box.innerHTML='<div style="text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:12px;">朝野寂寂　无匹配之人<br>试调拨筛选或放宽检索</div>';return;}
  // 按派系分组（fac=all 时）
  if(state.fac==='all'){
    var groups={};list.forEach(function(p){(groups[p.faction]=groups[p.faction]||[]).push(p);});
    var keys=Object.keys(groups).sort(function(a,b){return groups[b].length-groups[a].length;});
    box.innerHTML=keys.map(function(k){
      var fc=FACOLOR[k]||'#a8833a';
      return '<div class="fac-hdr" style="--fc:'+fc+'">'+esc(k)+'<span class="n">'+groups[k].length+'人</span></div>'+groups[k].map(pcard).join('');
    }).join('');
  }else{
    box.innerHTML=list.map(pcard).join('');
  }
}

    +idcell('姓名',p.name)+idcell('字号',p.zi||'未录')+idcell('性别',(p.age?p.age+'岁·':'')+(p.gender||''))

      +'<div class="dualbox" style="--dc:var(--purple)"><div class="lb">私 人 身 份</div><div class="v">'+esc(p.name)+(p.age?'，'+p.age+'岁':'')+'</div><div class="s">'+esc(p.personality||'')+'</div></div>'

      +'<div class="prose indent prose-paper">'+esc(p.bio||'传略未录。')+'</div></section>';

/* — 心绪 — */
function tabMind(p){
  var moodMap={'喜':'心情愉悦','怒':'满腔怒火','忧':'忧心忡忡','惧':'惴惴不安','恨':'满怀怨恨','敬':'心怀敬意','平':'心境平和'};
  var stressLbl=p.stress>=80?'濒于崩溃':p.stress>=60?'重压在身':p.stress>=35?'略有焦劳':'从容自持';
  return '<div class="dgrid"><section class="sec"><div class="sec-t">当 前 心 绪</div>'
    +'<div class="opinion" style="border-left-color:var(--purple);background:linear-gradient(180deg,rgba(142,106,168,0.06),transparent)"><div style="font-size:15px;color:var(--ink)">〔'+esc(p._mood||'平')+'〕'+esc(moodMap[p._mood]||'')+'</div><div class="brk" style="margin-top:4px">压力 '+Math.round(p.stress||0)+' / 100 · '+stressLbl+'</div></div></section>'
    +'<section class="sec"><div class="sec-t">心 性 变 量</div>'
      +'<div class="bar"><div class="k"><span>压力</span><b>'+Math.round(p.stress||0)+'</b></div><div class="track"><div class="fill" style="width:'+clamp(p.stress)+'%;--c1:#a83228;--c2:#c64a3e"></div></div></div>'
      +'<div class="bar" style="margin-top:7px"><div class="k"><span>野心</span><b>'+Math.round(p.ambition||0)+'</b></div><div class="track"><div class="fill" style="width:'+clamp(p.ambition)+'%;--c1:#8e6aa8;--c2:#a98ac4"></div></div></div>'
      +'<div class="bar" style="margin-top:7px"><div class="k"><span>廉介</span><b>'+Math.round(p.integrity||0)+'</b></div><div class="track"><div class="fill" style="width:'+clamp(p.integrity)+'%;--c1:#557f6f;--c2:#6fa291"></div></div></div></section></div>'
    +'<section class="sec full"><div class="sec-t">五 常 心 性</div><div style="display:flex;gap:26px;justify-content:center;padding:6px 0 16px">'
      +['仁','义','礼','智','信'].map(function(k){var v=(p.wuchang||{})[k];var lv=v==null?'mid':v>=60?'hi':v>=30?'mid':'lo';return '<div class="wcrow"><span class="wcdot '+lv+'">'+k+'<small>'+(v==null?'?':Math.round(v))+'</small></span></div>';}).join('')+'</div></section>'
    +'<section class="sec full"><div class="sec-t">内 省 与 行 止</div><div class="prose indent">'+esc(p.personality||'')+'　'+esc(p.bio||'')+'</div></section>';
}

/* — 关系 — */
function relLabel(strength){var s=strength;return s>=50?['莫逆','good']:s>=25?['亲近','good']:s<=-50?['死敌','bad']:s<=-25?['不睦','bad']:['一般','neu'];}
function relMeter(strength){var s=Math.max(-100,Math.min(100,strength));var col=s>=0?'#6fa291':'#a83228';var w=Math.abs(s)/2;var left=s>=0?50:50-w;return '<b style="left:'+left+'%;width:'+w+'%;background:'+col+'"></b>';}
function tabRelations(p){
  var html='';
  // 对君主好感（御批）
  if(!p.isPlayer && p.impressions){
    var toKing=p.impressions.find(function(x){return x.name==='朱由检';});
    if(toKing){
      html+='<section class="sec full"><div class="sec-t">对 君 主 之 心 <small>御批</small></div><div class="opinion"><span class="big">'+(toKing.favor>0?'+':'')+toKing.favor+'</span> <span style="color:var(--cinnabar-d);font-size:14px">'+esc(toKing.label)+'</span><div class="brk" style="margin-top:4px">由累积受恩、事件、立场综合而成（OpinionSystem）。</div></div></section>';
    }
  }
  // 关系图谱(ego-network)
  html+='<section class="sec full"><div class="sec-t">人 际 关 系 图 谱 <small>AffinityMap · 点节点可跳转</small></div><div class="egonet">'+egoNetwork(p)+'</div>'
    +'<div class="egolegend"><span><i style="border-color:#557f6f"></i>亲善</span><span><i style="border-color:#a83228"></i>嫌隙</span><span><i style="border-color:#9c8b6b"></i>泛交</span><span>线粗 ≈ 关系强弱</span></div></section>';
  // 强弱细览
  html+='<section class="sec full"><div class="sec-t">关 系 强 弱 细 览</div><div class="relnet">'+(p.relationships||[]).map(function(r){
    var L=relLabel(r.strength);
    return '<div class="relrow" onclick="selectP(\''+esc(r.name)+'\')"><span class="nm">'+esc(r.name)+'</span><span class="lbl '+(r.sign||L[1])+'">'+esc(r.label||L[0])+'</span><span class="meter"><i></i>'+relMeter(r.strength)+'</span><span class="sc">'+(r.strength>0?'+':'')+r.strength+'</span></div>';
  }).join('')+'</div></section>';
  // 印象 + 血亲
  html+='<div class="dgrid">'
    +'<section class="sec"><div class="sec-t">对 他 人 印 象</div><div class="rows">'+((p.impressions||[]).map(function(im){var col=im.favor>=0?'good':'bad';return '<div class="row"><span class="k">'+esc(im.name)+'</span><span class="v"><span class="lbl '+col+'" style="font-size:11px;padding:1px 8px;border-radius:8px">'+esc(im.label)+'（'+(im.favor>0?'+':'')+im.favor+'）</span></span></div>';}).join('')||'<div class="prose">暂无印象记录。</div>')+'</div></section>'
    +'<section class="sec"><div class="sec-t">血 亲</div><div class="rows">'+((p.bloodRelatives||[]).filter(function(m){return !m.self;}).map(function(m){return '<div class="row"><span class="k">'+esc(m.relation)+'</span><span class="v link" onclick="selectP(\''+esc(m.name)+'\')">'+esc(m.name)+(m.dead?' †':'')+'</span></div>';}).join('')||'<div class="prose">暂无血亲记录。</div>')+'</div></section></div>';
  return html;
}

/* — 本纪长卷 — */

  var ribbon=nodes.length?('<div class="benji-wrap"><div class="benji-scroll"><div class="benji-rail">'+nodes.map(function(nd){

      +'<div class="row"><span class="k">品秩</span><span class="v">'+esc(p.rank||'未记')+'</span></div>'
      +'<div class="row"><span class="k">出身</span><span class="v">'+esc(p.learning||'未记')+'</span></div>'
      +'<div class="row"><span class="k">任所</span><span class="v">'+esc(p.location||'未记')+(p._travelTo?' → '+esc(p._travelTo.toLocation):'')+'</span></div>'
    +'</div></section>'
    +'<section class="sec full"><div class="sec-t">人 生 历 练 <small>按领域</small></div><div class="domains">'+domHtml+'</div>'

/* — 视角(此人眼中) — */
function tabPov(p){
  var me=p.isPlayer?'朕':'吾';
  var lead='<div class="pov-lead"><span class="me">'+esc(p.name)+'自陈：</span>'+esc(p.personalGoal||p.bio||'')+'</div>';
  var eyes='';
  if(!p.isPlayer){
    var tk=(p.relationships||[]).find(function(r){return r.name==='朱由检';});
    var tki=(p.impressions||[]).find(function(x){return x.name==='朱由检';});
    if(tk||tki){var lbl=(tk&&tk.label)||(tki&&tki.label)||'',sc=(tk&&tk.strength)||(tki&&tki.favor)||0;var cls=sc>0?'good':sc<0?'bad':'';eyes+='<div class="pov-row" onclick="selectP(\'朱由检\')"><span class="who">视君上</span><span class="say '+cls+'">'+me+'于今上，'+esc(lbl)+'。</span></div>';}
  }
  (p.relationships||[]).filter(function(r){return r.name!=='朱由检';}).forEach(function(r){
    var cls=r.strength>=25?'good':r.strength<=-25?'bad':'';
    eyes+='<div class="pov-row" onclick="selectP(\''+esc(r.name)+'\')"><span class="who">视'+esc(r.name)+'</span><span class="say '+cls+'">'+me+'视'+esc(r.name)+'，'+esc(r.label||'')+'（'+(r.strength>0?'亲':r.strength<0?'疏':'平')+'）。</span></div>';
  });
  var recent=(p.memory||[]).slice(-3).reverse();
  var recentHtml=recent.length?('<div class="pov-eye">'+recent.map(function(m){return '<div class="pov-row"><span class="who">T'+m.turn+'</span><span class="say">〔'+esc(m.emotion)+'〕'+esc(m.event)+'</span></div>';}).join('')+'</div>'):'<div class="prose">近来心绪未着痕迹。</div>';
  return '<section class="sec full"><div class="sec-t">此 人 眼 中 <small>主观视角 · 接 AI 记忆/印象</small></div>'+lead+'</section>'
    +'<section class="sec full"><div class="sec-t">'+me+' 眼 中 诸 人</div><div class="pov-eye">'+(eyes||'<div class="prose">'+me+'与朝中诸人未有深交。</div>')+'</div></section>'
    +'<section class="sec full"><div class="sec-t">萦 怀 之 事 <small>近日记忆</small></div>'+recentHtml+'</section>'
    +'<section class="sec full"><div class="sec-t">'+me+' 之 立 场</div><div class="rows"><div class="row"><span class="k">立场</span><span class="v">'+esc(p.stance||'未明')+'</span></div><div class="row"><span class="k">党派</span><span class="v">'+esc(p.party||p.faction||'无')+'</span></div><div class="row"><span class="k">所求</span><span class="v">'+esc((p.personalGoal||'').slice(0,26))+'</span></div></div></section>';
}

/* — 御笔朱批 — */
function getZhubi(name){try{return localStorage.getItem('tm_zhubi_'+name)||'';}catch(e){return '';}}
function setZhubiLS(name,txt){try{if(txt)localStorage.setItem('tm_zhubi_'+name,txt);else localStorage.removeItem('tm_zhubi_'+name);}catch(e){}}
function zhubiBlock(p){
  var t=getZhubi(p.name);
  return '<div class="zhubi" id="zhubiBlock"><span class="zb-edit" onclick="editZhubi()">'+(t?'改批':'御批')+'</span><div class="zb-txt'+(t?'':' empty')+'">'+(t?esc(t):'（尚无御批。可亲书数语，志其亲疏向背、堪用与否。）')+'</div></div>';
}
function editZhubi(){
  var p=findP(state.sel);if(!p)return;var t=getZhubi(p.name);
  document.getElementById('zhubiBlock').innerHTML='<textarea id="zbInput" placeholder="御笔亲批……">'+esc(t)+'</textarea><div class="zb-acts"><button onclick="cancelZhubi()">取消</button><button class="save" onclick="saveZhubi()">钤 定</button></div>';
  var ta=document.getElementById('zbInput');if(ta)ta.focus();
}
function saveZhubi(){var p=findP(state.sel);if(!p)return;var v=(document.getElementById('zbInput').value||'').trim();setZhubiLS(p.name,v);document.getElementById('zhubiBlock').outerHTML=zhubiBlock(p);renderFolio();toast('御批已钤');}
function cancelZhubi(){var p=findP(state.sel);if(p)document.getElementById('zhubiBlock').outerHTML=zhubiBlock(p);}

/* — 家族 — */
function tabFamily(p){
  var tierMap={imperial:'皇族',noble:'世家',gentry:'士族',common:'寒门'};
  var renown=p.familyTier==='imperial'?100:p.familyTier==='gentry'?60:p.familyTier==='noble'?78:40;
  var clanGrid=[['门第',tierMap[p.familyTier]||'—',null],['族丁',(p.bloodRelatives||[]).filter(function(m){return !m.self;}).length,null],['家望',renown,renown],['家族',p.family||'—',null]];
  var harem='';
  if(p.spouseRank==='empress'||p.faction==='后宫'||p.isPlayer){
    var sp=p.spouse?'<div class="row"><span class="k">配偶</span><span class="v">'+esc(p.spouse)+'（'+esc({empress:'皇后',consort:'妃',concubine:'嫔'}[p.spouseRank]||'')+'）</span></div>':'';
    var ch=(p.children&&p.children.length&&p.children[0]!=='—')?'<div class="row"><span class="k">子嗣</span><span class="v">'+p.children.map(esc).join('、')+'</span></div>':'';
    if(sp||ch)harem='<section class="sec full"><div class="sec-t">后 宫 与 子 嗣</div><div class="rows">'+sp+ch+'</div></section>';
  }
  return '<section class="sec full"><div class="fttitle sec-t">五 代 家 谱 树 <small>金框为本人 · 虚线为姻亲 · † 已故</small></div>'
    +'<div class="ft-wrap">'+familyTree(p)+'</div>'
    +'<div class="ft-legend"><span class="ft-lg"><span class="ft-mk self"></span>本人</span><span class="ft-lg"><span class="ft-mk blood"></span>血亲</span><span class="ft-lg"><span class="ft-mk inlaw"></span>姻亲</span><span class="ft-lg"><span class="ft-mk dead"></span>已故</span></div></section>'
    +'<section class="sec full"><div class="sec-t">家 族 统 览</div><div class="clan-grid">'+clanGrid.map(function(c){return '<div class="clan-it"><div class="lb">'+c[0]+'</div><div class="vv">'+esc(c[1])+'</div>'+(c[2]!=null?'<div class="track"><i style="width:'+clamp(c[2])+'%"></i></div>':'')+'</div>';}).join('')+'</div></section>'
    +harem;
}

/* — 文事 — */
function tabWorks(p){
  if(!p.works||!p.works.length)return '<section class="sec full"><div class="sec-t">著 述 文 事</div><div class="prose" style="text-align:center;padding:30px 0;color:var(--ink-faint)">此人未有著述传世。</div></section>';
  return '<section class="sec full"><div class="sec-t">著 述 文 事 <small>'+p.works.length+' 篇</small></div><div class="works">'+p.works.map(function(w){
    return '<div class="work" onclick="toast(\'阅《'+esc(w.title)+'》全文\')"><div class="ti">'+(w.preserved?'<span class="star">★</span>':'')+'《'+esc(w.title)+'》</div><div class="mt">'+esc(w.genre||'')+(w.mood?' · '+esc(w.mood):'')+' · T'+(w.turn||0)+' · 品 '+(w.quality||0)+'</div></div>';
  }).join('')+'</div></section>';
