function renderTab(p){
  switch(state.tab){
    case 'identity':return tabIdentity(p);
    case 'mind':return tabMind(p);
    case 'relations':return tabRelations(p);
    case 'benji':return tabBenji(p);
    case 'family':return tabFamily(p);
    case 'memory':return tabMemory(p);
    case 'works':return tabWorks(p);
    case 'pov':return tabPov(p);
    default:return tabOverview(p);
  }
}
function renderMain(){
  if(state.view==='chaoju'){renderChaoju();return;}
  if(state.view==='paihang'){renderPaihang();return;}
  if(state.compare){renderCompare();return;}
  var p=findP(state.sel)||PEOPLE[0];
  var tabsHtml='<div class="tabs">'+TABS.map(function(t){return '<button class="tab'+(state.tab===t[0]?' active':'')+'" onclick="switchTab(\''+t[0]+'\')">'+t[1]+'</button>';}).join('')+'</div>';
  document.getElementById('mainScroll').innerHTML=dossierHead(p)+verdict(p)+zhubiBlock(p)+tabsHtml+'<div class="detail">'+renderTab(p)+'</div>';
}

/* — 两人对参 — */
function cmpAxes(p){return [{label:'智',value:p.intelligence},{label:'武',value:p.valor},{label:'军',value:p.military},{label:'政',value:p.administration},{label:'管',value:p.management},{label:'交',value:p.diplomacy},{label:'魅',value:p.charisma},{label:'仁',value:p.benevolence}];}
function renderCompare(){
  var A=findP(state.sel),B=findP(state.compare),C=state.compare2?findP(state.compare2):null;
  if(!A||!B){clearCompare();return;}
  var ppl=[A,B];if(C)ppl.push(C);
  var cols=['#a83228','#4a5e8a','#557f6f'],clsn=['a','b','c'],dash=['━','┅','┈'];
  var ro={color:cols[0],size:300,second:{axes:cmpAxes(B),color:cols[1]}};
  if(C)ro.third={axes:cmpAxes(C),color:cols[2]};
  var radarHtml=radar(cmpAxes(A),ro);
  var metrics=[['忠诚','loyalty'],['野心','ambition'],['压力','stress'],['康健','health'],['名望','mingwang'],['贤能','xianneng'],['廉介','integrity']];
  var bars=metrics.map(function(m){
    var cells=ppl.map(function(p,i){return '<span class="cwbar"><i style="width:'+clamp(p[m[1]])+'%;background:'+cols[i]+'"></i><b style="color:'+cols[i]+'">'+Math.round(p[m[1]]||0)+'</b></span>';}).join('');
    return '<div class="cmpbarN"><span class="lab">'+m[0]+'</span><span class="cells">'+cells+'</span></div>';
  }).join('');
  var relPairs=[];
  for(var i=0;i<ppl.length;i++)for(var j=0;j<ppl.length;j++){if(i===j)continue;var r=(ppl[i].relationships||[]).find(function(x){return x.name===ppl[j].name;});if(r)relPairs.push('“'+esc(ppl[i].name)+'”视“'+esc(ppl[j].name)+'”'+esc(r.label||'')+'（'+(r.strength>0?'+':'')+r.strength+'）');}
  var relTxt=relPairs.length?relPairs.join('；')+'。':'诸人之间无显性关系记录。';
  var byLoy=ppl.slice().sort(function(a,b){return b.loyalty-a.loyalty;});
  var byXian=ppl.slice().sort(function(a,b){return (b.xianneng||0)-(a.xianneng||0);});
  var verdictTxt='<b>权衡：</b>'+esc(byLoy[0].name)+'忠诚最笃（'+Math.round(byLoy[0].loyalty)+'）'+(byLoy[0].ambition>=70?'，然野心炽盛宜防尾大；':'，且野心尚可控驭；')+'　'+esc(byXian[0].name)+'才略最优，可委以繁剧。';
  var miniP=function(p,i){return '<div class="cmp-person '+clsn[i]+'" style="border-left-color:'+cols[i]+'">'+(i>0?'<span class="cmp-drop" onclick="dropCompare('+i+')" title="移出对参">✕</span>':'')+'<div class="cmp-face">'+faceGlyph(p)+'</div><div><div class="nm">'+esc(p.name)+'</div><div class="of">'+esc(p.officialTitle||p.title||'布衣')+' · '+esc(p.rank||'')+'</div><div class="fa" style="color:'+cols[i]+'">'+esc(p.faction)+(p.party?' · '+esc(p.party):'')+'</div></div></div>';};
  var legend=ppl.map(function(p,i){return '<span style="color:'+cols[i]+'">'+dash[i]+esc(p.name)+'</span>';}).join(' ');
  var addHint=C?'':'<div class="fnote" style="text-align:center;margin-top:8px">再点名籍卡的 ⇌ 可加第三人同盘对参</div>';
  var html='<div class="cmp-head"><h2>'+(C?'三':'两')+' 人 对 参<small>'+ppl.map(function(p){return esc(p.name);}).join(' ⇌ ')+'</small></h2><button class="cmp-clear" onclick="clearCompare()">✕ 退出对参</button></div>'
    +'<div class="cmp-body">'
      +'<div class="cmp-people" style="grid-template-columns:repeat('+ppl.length+',1fr)">'+ppl.map(miniP).join('')+'</div>'
      +'<div class="dgrid">'
        +'<section class="sec"><div class="sec-t">禀 赋 叠 盘 <small>'+legend+'</small></div><div class="cmp-radar-wrap">'+radarHtml+'</div></section>'
        +'<section class="sec"><div class="sec-t">心性·声望 并校</div>'+bars+'</section>'
      +'</div>'
      +'<section class="sec full"><div class="sec-t">'+(C?'三':'两')+' 人 之 间</div><div class="prose">'+relTxt+'</div></section>'
      +'<div class="cmp-verdict">'+verdictTxt+'</div>'+addHint
    +'</div>';
  document.getElementById('mainScroll').innerHTML=html;
}

/* ===================== 朝局全景 ===================== */
function factionData(){
  var facs={};
  PEOPLE.forEach(function(p){var f=p.faction||'无派系';(facs[f]=facs[f]||{name:f,members:[],power:0,color:FACOLOR[f]||'#a8833a'}).members.push(p);});
  Object.keys(facs).forEach(function(f){
    var alive=facs[f].members.filter(function(p){return p.alive!==false;});
    facs[f].power=alive.reduce(function(s,p){return s+(p.mingwang||50);},0);
    facs[f].lead=facs[f].members.slice().sort(function(a,b){return (b.mingwang||0)-(a.mingwang||0);})[0];
  });
  return facs;
}
function factionTensions(){
  var nameFac={};PEOPLE.forEach(function(p){nameFac[p.name]=p.faction;});
  var pair={};
  PEOPLE.forEach(function(p){(p.relationships||[]).forEach(function(r){
    var f1=p.faction,f2=nameFac[r.name];if(!f1||!f2||f1===f2)return;
    var key=[f1,f2].sort().join('|');pair[key]=(pair[key]||0)+r.strength;
  });});
  return pair;
}
function renderChaoju(){
  var facs=factionData();
  var keys=Object.keys(facs).sort(function(a,b){return facs[b].power-facs[a].power;});
  var total=keys.reduce(function(s,k){return s+facs[k].power;},0)||1;
  var tensions=factionTensions();
  var balance='<div class="cj-balance"><div class="bt">朝 局 权 力 天 平 <span style="color:var(--ink-faint)">（按名望聚合·占比）</span></div><div class="cj-bar">'+keys.map(function(k){
    var pct=Math.round(facs[k].power/total*100);
    return '<span style="width:'+pct+'%;background:'+facs[k].color+'" title="'+esc(k)+' '+pct+'%">'+(pct>=9?esc(k)+pct+'%':'')+'</span>';
  }).join('')+'</div></div>';
  var W=820,H=420,cx=410,cy=200;
  var radial=keys.filter(function(k){return k!=='皇室';}),pos={};
  if(facs['皇室'])pos['皇室']={x:cx,y:cy,r:34};
  radial.forEach(function(k,i){var a=-Math.PI/2+i*2*Math.PI/radial.length;pos[k]={x:cx+300*Math.cos(a),y:cy+148*Math.sin(a),r:20+Math.min(24,facs[k].power/26)};});
  if(!pos['皇室'])keys.forEach(function(k,i){var a=-Math.PI/2+i*2*Math.PI/keys.length;pos[k]={x:cx+280*Math.cos(a),y:cy+148*Math.sin(a),r:24};});
  var svg='<svg viewBox="0 0 '+W+' '+H+'">';
  Object.keys(tensions).forEach(function(key){
    var ps=key.split('|'),a=pos[ps[0]],b=pos[ps[1]];if(!a||!b)return;
    var net=tensions[key],col=net<0?'#a83228':'#557f6f',w=(1+Math.min(5,Math.abs(net)/40)).toFixed(1);
    svg+='<line x1="'+a.x.toFixed(0)+'" y1="'+a.y.toFixed(0)+'" x2="'+b.x.toFixed(0)+'" y2="'+b.y.toFixed(0)+'" stroke="'+col+'" stroke-width="'+w+'" opacity="0.42"'+(net<0?' stroke-dasharray="6,4"':'')+'/>';
  });
  keys.forEach(function(k){
    var pp=pos[k];if(!pp)return;var f=facs[k];
    svg+='<g class="cnode" onclick="filterFaction(\''+esc(k)+'\')" transform="translate('+pp.x.toFixed(0)+','+pp.y.toFixed(0)+')">';
    svg+='<circle r="'+pp.r.toFixed(0)+'" fill="'+f.color+'" fill-opacity="0.17" stroke="'+f.color+'" stroke-width="2.2"/>';
    svg+='<text x="0" y="-2" text-anchor="middle" font-size="13" font-weight="bold" fill="'+f.color+'" font-family="serif">'+esc(k)+'</text>';
    svg+='<text x="0" y="13" text-anchor="middle" font-size="9" fill="#7d6a48" font-family="serif">'+f.members.length+'人·望'+Math.round(f.power)+'</text></g>';
  });
  svg+='</svg>';
  var legend='<div class="cj-legend"><span><i style="border-color:#a83228;border-top-style:dashed"></i>派系敌对</span><span><i style="border-color:#557f6f"></i>派系亲善</span><span>圈大≈势力 · 线粗≈强度</span></div>';
  var cards='<div class="cj-cards">'+keys.map(function(k){var f=facs[k];
    return '<div class="cj-card" style="--fc:'+f.color+'"><div class="ct"><b style="color:'+f.color+'">'+esc(k)+'</b><span class="pw">'+f.members.length+'人 · 望'+Math.round(f.power)+'</span></div><div class="cj-members">'+f.members.map(function(p){
      return '<span class="cj-mem'+(p===f.lead?' lead':'')+(p.alive===false?' dead':'')+'" onclick="selectP(\''+esc(p.name)+'\')">'+esc(p.name)+'</span>';
    }).join('')+'</div></div>';
  }).join('')+'</div>';
  document.getElementById('mainScroll').innerHTML='<div class="chaoju"><div class="sec-t" style="margin-bottom:11px">朝 局 全 景 <small>派系势力 · 张力 · 谁主谁从</small></div>'+balance+'<div class="chaoju-graph">'+svg+'</div>'+legend+cards+'</div>';
}

/* ===================== 群臣排行 ===================== */
var PH_DIMS=[['loyalty','忠诚'],['xianneng','贤能'],['ambition','野心'],['stress','压力'],['mingwang','名望'],['integrity','廉介'],['military','军事'],['administration','政务']];
function renderPaihang(){
  var sk=state.phSort;
  var list=PEOPLE.filter(function(p){return state.dead?true:p.alive!==false;}).slice().sort(function(a,b){return (b[sk]||0)-(a[sk]||0);});
  var maxV=Math.max.apply(null,list.map(function(p){return p[sk]||0;}))||100;
  var dimLabel=(PH_DIMS.find(function(d){return d[0]===sk;})||['',''])[1];
  var ctrl='<div class="ph-ctrl"><span class="lb">排序维度：</span>'+PH_DIMS.map(function(d){return '<button class="phb'+(d[0]===sk?' active':'')+'" onclick="setPhSort(\''+d[0]+'\')">'+d[1]+'</button>';}).join('')+'</div>';
  var rows=list.map(function(p,i){
    var v=Math.round(p[sk]||0),bw=Math.round((p[sk]||0)/maxV*84);
    return '<tr class="'+(p.alive===false?'dead':'')+'" onclick="selectP(\''+esc(p.name)+'\')">'
      +'<td class="ph-rank'+(i<3?' top':'')+'">'+(i+1)+'</td>'
      +'<td class="ph-name">'+esc(p.name)+'<small>'+esc(p.faction)+'</small></td>'
      +'<td>'+esc(p.officialTitle||p.title||'布衣')+'</td>'
      +'<td class="ph-pri"><b>'+v+'</b><i class="vb" style="width:'+bw+'px"></i></td>'
      +'<td>'+Math.round(p.loyalty||0)+'</td><td>'+Math.round(p.ambition||0)+'</td><td>'+Math.round(p.stress||0)+'</td><td>'+Math.round(p.mingwang||0)+'</td><td>'+Math.round(p.xianneng||0)+'</td></tr>';
  }).join('');
  var table='<table class="ph-table"><thead><tr><th>名次</th><th style="text-align:left">姓名</th><th>官职</th><th style="color:var(--cinnabar-d)">'+esc(dimLabel)+' ▼</th><th>忠诚</th><th>野心</th><th>压力</th><th>名望</th><th>贤能</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('mainScroll').innerHTML='<div class="paihang"><div class="sec-t" style="margin-bottom:8px">群 臣 排 行 <small>全 '+list.length+' 人 · 点行入列传</small></div>'+ctrl+table+'</div>';
}

/* ===================== 案侧 ===================== */
function renderFolioChaoju(){
  var facs=factionData(),keys=Object.keys(facs).sort(function(a,b){return facs[b].power-facs[a].power;});
  var total=keys.reduce(function(s,k){return s+facs[k].power;},0)||1;
  var html='<div class="fcard"><div class="ft">派 系 势 力 榜</div><div class="relnet">'+keys.map(function(k){var f=facs[k];return '<div class="relrow" onclick="filterFaction(\''+esc(k)+'\')"><span class="nm" style="color:'+f.color+'">'+esc(k)+'</span><span class="sc">'+Math.round(f.power/total*100)+'%</span></div>';}).join('')+'</div></div>';
  html+='<div class="fcard"><div class="ft">朝 局 提 要</div><div class="fnote">圈大者势隆，线赤者交恶。点派系入其名籍，点人物入列传。当前以名望聚合估算势力，正式接入可换权位/兵权/财权多维。</div></div>';
  document.getElementById('folio').innerHTML=html;
}
function renderFolioPaihang(){
  var dim={loyalty:'忠诚',xianneng:'贤能',ambition:'野心',stress:'压力',mingwang:'名望',integrity:'廉介',military:'军事',administration:'政务'};
  var list=PEOPLE.filter(function(p){return p.alive!==false;}).slice().sort(function(a,b){return (b[state.phSort]||0)-(a[state.phSort]||0);}).slice(0,3);
  var mk=['①','②','③'];
  var html='<div class="fcard"><div class="ft">'+esc(dim[state.phSort]||'')+' 前 三</div><div class="relnet">'+list.map(function(p,i){return '<div class="relrow" onclick="selectP(\''+esc(p.name)+'\')"><span class="nm">'+mk[i]+' '+esc(p.name)+'</span><span class="sc">'+Math.round(p[state.phSort]||0)+'</span></div>';}).join('')+'</div></div>';
  html+='<div class="fcard"><div class="ft">说 明</div><div class="fnote">点列首维度切排序，点任一行入其列传。维度皆取引擎真值。</div></div>';
  document.getElementById('folio').innerHTML=html;
}
function renderFolio(){
  if(state.view==='chaoju')return renderFolioChaoju();
  if(state.view==='paihang')return renderFolioPaihang();
  var p=findP(state.sel)||PEOPLE[0];
  var cap=inCapital(p);
  var rels=(p.relationships||[]).slice().sort(function(a,b){return Math.abs(b.strength)-Math.abs(a.strength);}).slice(0,5);
  var vd=p.loyalty>=70?['可托腹心','忠悃可恃，宜假事权。']:p.loyalty>=45?['可接触','向背未定，宜以恩结之。']:['需防范','离心已著，当谨防其变。'];
  if(p.alive===false)vd=['已殁','存其遗事，可追赠以励来者。'];
  var acts;
  if(p.isPlayer)acts='<button class="fact primary span" onclick="toast(\'御览心志\')">御览心志</button><button class="fact" onclick="toast(\'起居注\')">起居注</button><button class="fact" onclick="toast(\'近事\')">近事</button>';
  else if(p.alive===false)acts='<button class="fact primary span" onclick="switchTab(\'works\')">阅其遗著</button><button class="fact" onclick="toast(\'追赠\')">追赠昭雪</button><button class="fact" onclick="switchTab(\'family\')">问其后</button>';
  else acts='<button class="fact primary span" onclick="toast(\''+(cap?'召入问对':'鸿雁传书')+'\')">'+(cap?'召入问对':'鸿雁传书')+'</button>'
    +'<button class="fact" onclick="toast(\'鸿雁传书\')">鸿雁传书</button><button class="fact" onclick="toast(\'官制任免\')">官制任免</button>'
    +'<button class="fact" onclick="toast(\'钉选\')">钉选</button><button class="fact" onclick="switchTab(\'relations\')">关系</button>';
  var html=(getZhubi(p.name)?'<div class="fcard"><div class="ft">御 笔 朱 批</div><div style="font-size:12.5px;color:var(--vermilion);line-height:1.72;font-family:var(--font)">'+esc(getZhubi(p.name))+'</div></div>':'')+'<div class="fcard"><div class="ft">可 用 入 口</div><div class="actgrid">'+acts+'</div><div class="fnote">'+(cap?'此人在京，可即召问对。':p.alive===false?'此人已殁，仅存遗事遗著可考。':'此人在外，须以鸿雁传书。')+'</div></div>';
  html+='<div class="fcard"><div class="ft">朝 堂 研 判</div><div class="fverdict"><strong>'+vd[0]+'</strong><span>'+vd[1]+'</span></div>'
    +'<div class="risk-grid">'+[['忠诚',p.loyalty],['野心',p.ambition],['压力',p.stress],['康健',p.health],['名望',p.mingwang],['贤能',p.xianneng]].map(function(r){return '<div class="risk"><span>'+r[0]+'</span><b>'+(r[1]==null?'—':Math.round(r[1]))+'</b></div>';}).join('')+'</div></div>';
  html+='<div class="fcard"><div class="ft">关 系 焦 点</div><div class="relnet">'+rels.map(function(r){var L=relLabel(r.strength);return '<div class="relrow" onclick="selectP(\''+esc(r.name)+'\')"><span class="nm">'+esc(r.name)+'</span><span class="lbl '+(r.sign||L[1])+'">'+esc(r.label||L[0])+'</span><span class="sc">'+(r.strength>0?'+':'')+r.strength+'</span></div>';}).join('')+'</div></div>';
  var recent=(p.memory||[]).slice(-3).reverse();
  html+='<div class="fcard"><div class="ft">近 日 记 忆</div><div class="mems">'+(recent.length?recent.map(function(m){return '<div class="mem"><span class="t">T'+m.turn+'</span><span class="ev">'+esc(m.event)+'</span></div>';}).join(''):'<div class="prose">暂无。</div>')+'</div></div>';
  html+='<div class="fcard"><div class="ft">五 常 速 览</div><div style="display:flex;gap:14px;justify-content:center;padding:4px 0 14px">'+['仁','义','礼','智','信'].map(function(k){var v=(p.wuchang||{})[k];var lv=v==null?'mid':v>=60?'hi':v>=30?'mid':'lo';return '<span class="wcdot '+lv+'">'+k+'<small>'+(v==null?'?':Math.round(v))+'</small></span>';}).join('')+'</div></div>';
  document.getElementById('folio').innerHTML=html;
}

/* ===================== 交互 ===================== */
function selectP(name){if(!findP(name))return;state.sel=name;state.compare=null;state.compare2=null;state.view='liezhuan';renderViewTabs();renderMain();renderFolio();renderRoster();var ms=document.getElementById('mainScroll');if(ms)ms.scrollTop=0;}
function switchTab(t){state.tab=t;renderMain();}
function renderViewTabs(){var vs=[['liezhuan','列传'],['chaoju','朝局'],['paihang','排行']];document.getElementById('viewtabs').innerHTML=vs.map(function(v){return '<button class="vtab'+(state.view===v[0]?' active':'')+'" onclick="setView(\''+v[0]+'\')">'+v[1]+'</button>';}).join('');}
function setView(v){state.view=v;state.compare=null;renderViewTabs();renderMain();renderFolio();var ms=document.getElementById('mainScroll');if(ms)ms.scrollTop=0;}
function filterFaction(f){state.fac=f;var sel=document.getElementById('fFac');if(sel)sel.value=f;state.roleStat='all';var fd=factionData()[f];renderRoster();if(fd&&fd.lead)selectP(fd.lead.name);}
function setPhSort(k){state.phSort=k;renderPaihang();renderFolio();}
function setCompare(name){
  if(!findP(name)||name===state.sel)return;
  if(name===state.compare||name===state.compare2)return;
  if(!state.compare){state.compare=name;}
  else if(!state.compare2){state.compare2=name;}
  else {state.compare2=name;}
  renderMain();renderRoster();var ms=document.getElementById('mainScroll');if(ms)ms.scrollTop=0;
  toast('对参：'+esc(state.sel)+' ⇌ '+esc(state.compare)+(state.compare2?' ⇌ '+esc(state.compare2):''));
}
function dropCompare(which){if(which===2)state.compare2=null;else{state.compare=state.compare2;state.compare2=null;}if(!state.compare){clearCompare();return;}renderMain();renderRoster();}
function clearCompare(){state.compare=null;state.compare2=null;renderMain();renderRoster();}
function onSearch(v){state.q=v;document.getElementById('gsearch').value=v;document.getElementById('rsearch').value=v;renderRoster();}
function onFilter(){state.fac=document.getElementById('fFac').value;state.role=document.getElementById('fRole').value;state.sort=document.getElementById('fSort').value;state.dead=document.getElementById('fDead').checked;state.roleStat='all';renderRoster();renderStatbar();}
function renderChips(){var alive=PEOPLE.filter(function(p){return p.alive!==false;}).length;document.getElementById('hdChips').innerHTML='<span class="chip green">入志 '+PEOPLE.length+'</span><span class="chip hot">存世 '+alive+'</span>';}

/* init */
renderChips();renderFacOptions();renderViewTabs();renderStatbar();renderRoster();renderMain();renderFolio();
document.querySelector('.zhi-close').onclick=function(){toast('退回御案（预览态）');};
</script>
