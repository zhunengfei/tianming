<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>天命创意工坊审核台</title>
<style>
  :root{
    --bg:#100d09;--panel:#19130e;--panel2:#211811;--line:rgba(214,177,93,.24);--line2:rgba(214,177,93,.44);
    --gold:#d8b56a;--gold2:#f2d487;--ink:#efe4d0;--muted:rgba(239,228,208,.66);--dim:rgba(239,228,208,.44);
    --ok:#7ec98b;--bad:#e76952;--warn:#f0b45a;--shadow:rgba(0,0,0,.48);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at 20% 0,rgba(136,64,36,.16),transparent 34%),var(--bg);color:var(--ink);font-family:"Microsoft YaHei","Noto Sans SC",Arial,sans-serif;}
  button,input,textarea{font:inherit}
  button{min-height:36px;border:1px solid var(--line);background:rgba(214,177,93,.1);color:var(--ink);padding:0 13px;cursor:pointer}
  button:hover{border-color:var(--line2);background:rgba(214,177,93,.16)}
  button.primary{border-color:var(--gold);background:linear-gradient(180deg,#a93d2f,#6f2119);color:#fff1c2}
  button.good{border-color:rgba(126,201,139,.72);color:#d7f4d7;background:rgba(63,128,78,.18)}
  button.bad{border-color:rgba(231,105,82,.72);color:#ffd4ca;background:rgba(130,34,24,.18)}
  button:disabled{opacity:.48;cursor:not-allowed}
  input,textarea{border:1px solid var(--line);background:#0b0805;color:var(--ink);padding:9px 11px;outline:none}
  input:focus,textarea:focus{border-color:var(--gold)}
  .shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
  .top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end;padding:18px 22px;border-bottom:1px solid var(--line);background:rgba(12,8,5,.82);box-shadow:0 12px 40px var(--shadow)}
  h1{margin:0;color:var(--gold2);font-family:"Noto Serif SC","Songti SC",serif;font-size:22px;letter-spacing:2px}
  .sub{margin-top:5px;color:var(--muted);font-size:12.5px;line-height:1.6}
  .conn{display:grid;grid-template-columns:minmax(260px,420px) 220px auto;gap:8px;align-items:end}
  .field{display:grid;gap:5px}
  .field label{font-size:11px;color:var(--gold);letter-spacing:1px}
  .main{display:grid;grid-template-columns:380px minmax(0,1fr);min-height:0}
  .queue{border-right:1px solid var(--line);background:rgba(0,0,0,.16);min-height:0;display:grid;grid-template-rows:auto 1fr}
  .qhead{padding:14px;border-bottom:1px solid var(--line)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
  .stat{border:1px solid var(--line);background:rgba(0,0,0,.2);padding:9px 10px}
  .stat b{display:block;color:var(--gold2);font-size:18px;font-family:"Noto Serif SC","Songti SC",serif}
  .stat small{color:var(--muted);font-size:11px}
  .filter{display:grid;grid-template-columns:1fr 128px;gap:8px}
  .list{overflow:auto;padding:10px;display:grid;align-content:start;gap:9px}
  .item{border:1px solid var(--line);background:linear-gradient(180deg,rgba(38,25,17,.8),rgba(12,8,5,.72));display:grid;grid-template-columns:82px 1fr;gap:10px;padding:9px;text-align:left}
  .item.on{border-color:var(--gold);box-shadow:inset 3px 0 0 var(--gold)}
  .thumb{height:82px;border:1px solid var(--line);background:radial-gradient(circle at 50% 35%,#8f3a2b,#321710);display:grid;place-items:center;overflow:hidden;color:var(--gold2);font-family:"Noto Serif SC","Songti SC",serif;font-size:28px}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .ititle{font-family:"Noto Serif SC","Songti SC",serif;color:var(--gold2);font-size:14px;line-height:1.35}
  .imeta{margin-top:4px;color:var(--muted);font-size:11.5px;line-height:1.55}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .badge{font-size:10.5px;border:1px solid var(--line);color:var(--muted);padding:1px 7px}
  .badge.warn{border-color:rgba(240,180,90,.6);color:#ffd69a;background:rgba(145,84,18,.18)}
  .badge.bad{border-color:rgba(231,105,82,.6);color:#ffc7bc;background:rgba(130,34,24,.18)}
  .detail{min-width:0;min-height:0;overflow:auto;padding:18px 22px 30px}
  .empty{height:100%;display:grid;place-items:center;color:var(--muted);text-align:center;border:1px dashed var(--line);background:rgba(0,0,0,.12)}
  .hero{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:start}
  .cover{aspect-ratio:4/3;border:1px solid var(--line2);background:radial-gradient(circle at 50% 35%,#8f3a2b,#321710);display:grid;place-items:center;overflow:hidden;color:var(--gold2);font-family:"Noto Serif SC","Songti SC",serif;font-size:54px;box-shadow:inset 0 0 30px rgba(0,0,0,.45)}
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .title{font-family:"Noto Serif SC","Songti SC",serif;color:var(--gold2);font-size:25px;line-height:1.3;margin:0 0 8px}
  .meta{display:flex;gap:8px 15px;flex-wrap:wrap;color:var(--muted);font-size:12.5px;margin-bottom:12px}
  .desc{border:1px solid var(--line);background:rgba(0,0,0,.16);padding:12px 14px;line-height:1.75;color:var(--ink);font-size:13px;margin:12px 0}
  .section{margin-top:16px}
  .section h2{font-family:"Noto Serif SC","Songti SC",serif;color:var(--gold2);font-size:15px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .section h2:before{content:"";width:3px;height:15px;background:var(--gold)}
  .shots{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .shot{aspect-ratio:16/9;border:1px solid var(--line);background:rgba(0,0,0,.22);display:grid;place-items:center;overflow:hidden;color:var(--dim)}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .kv{border:1px solid var(--line);background:rgba(0,0,0,.16);padding:10px 12px}
  .kv small{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
  .kv b{color:var(--gold2);font-size:13px;word-break:break-all}
  .risk{border:1px solid rgba(240,180,90,.5);background:rgba(145,84,18,.12);padding:10px 12px;color:#ffe0aa;font-size:12.5px;line-height:1.65}
  .risk.bad{border-color:rgba(231,105,82,.62);background:rgba(130,34,24,.15);color:#ffd0c7}
  .risk code{display:block;margin-top:5px;color:#ffd0c7;word-break:break-all;white-space:pre-wrap}
  .actions{position:sticky;bottom:0;display:flex;gap:9px;flex-wrap:wrap;margin-top:18px;padding:12px 0;background:linear-gradient(180deg,transparent,var(--bg) 28%)}
  pre{max-height:360px;overflow:auto;border:1px solid var(--line);background:#080604;padding:12px;color:#e8ddca;white-space:pre-wrap;word-break:break-word}
  .status{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);max-width:min(720px,92vw);border:1px solid var(--line2);background:rgba(16,11,7,.96);box-shadow:0 12px 42px var(--shadow);padding:10px 14px;color:var(--gold2);font-size:13px;z-index:20;display:none}
  .status.show{display:block}
  @media(max-width:980px){.top{grid-template-columns:1fr}.conn{grid-template-columns:1fr}.main{grid-template-columns:1fr}.queue{border-right:0;border-bottom:1px solid var(--line)}.list{max-height:42vh}.hero{grid-template-columns:1fr}.shots,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div>
      <h1>天命创意工坊审核台</h1>
      <div class="sub">审核创作者提交的资源包。通过后进入公开目录，玩家才能下载；驳回后不会上架。</div>
    </div>
    <div class="conn">
      <div class="field"><label>在线 API</label><input id="api" placeholder="https://api.themisfitserspeople.top/tianming-api/"></div>
      <div class="field"><label>管理员密钥</label><input id="key" type="password" placeholder="TIANMING_ADMIN_KEY"></div>
      <button class="primary" id="refreshBtn">刷新待审</button>
    </div>
  </header>
  <main class="main">
    <aside class="queue">
      <div class="qhead">
        <div class="stats">
          <div class="stat"><b id="statPending">0</b><small>待审核</small></div>
          <div class="stat"><b id="statRisk">0</b><small>有风险标记</small></div>
          <div class="stat"><b id="statMedia">0</b><small>带封面</small></div>
        </div>
        <div class="filter">
          <input id="search" placeholder="搜索标题、作者、ID">
          <input id="typeFilter" placeholder="类型，如 mod">
        </div>
      </div>
      <div class="list" id="list"></div>
    </aside>
    <section class="detail" id="detail">
      <div class="empty">填写 API 与管理员密钥后刷新。<br>选择左侧待审项查看资源包与商店信息。</div>
    </section>
  </main>
</div>
<div class="status" id="status"></div>
<script>
(function(){
  'use strict';
  var DEFAULT_API = 'https://api.themisfitserspeople.top/tianming-api/';
  var API_KEY = 'tm_workshop_admin_api';
  var ADMIN_KEY = 'tm_workshop_admin_key';
  var packs = [];
  var selectedId = '';

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function api(){ var v = ($('api').value || '').trim() || DEFAULT_API; return v.endsWith('/') ? v : v + '/'; }
  function key(){ return ($('key').value || '').trim(); }
  function saveSettings(){ try { localStorage.setItem(API_KEY, api()); localStorage.setItem(ADMIN_KEY, key()); } catch(e) {} }
  function typeLabel(t){ return ({scenario:'剧本',portrait:'立绘',music:'音乐',map:'地图',mod:'MOD'})[String(t || 'scenario')] || t; }
  function fmtBytes(n){ n = Number(n) || 0; if(n > 1048576) return (n / 1048576).toFixed(1) + ' MB'; if(n > 1024) return (n / 1024).toFixed(1) + ' KB'; return n + ' B'; }
  function coverUrl(p){ return p && p.coverImage && p.coverImage.url ? p.coverImage.url : ''; }
  function gallery(p){ return Array.isArray(p && p.galleryImages) ? p.galleryImages.filter(function(x){ return x && x.url; }) : []; }
  function tags(p){ return Array.isArray(p && p.tags) ? p.tags : []; }
  function flags(p){ return Array.isArray(p && p.flags) ? p.flags : []; }
  function assets(p){ return Array.isArray(p && p.assets) ? p.assets : []; }
  function selected(){ return packs.find(function(p){ return String(p.id) === String(selectedId); }) || packs[0] || null; }
  function show(msg, isBad){
    var el = $('status');
    el.textContent = msg;
    el.style.color = isBad ? '#ffd0c7' : 'var(--gold2)';
    el.classList.add('show');
    clearTimeout(show._timer);
    show._timer = setTimeout(function(){ el.classList.remove('show'); }, 3600);
  }
  async function request(path, opts){
    opts = opts || {};
    var headers = Object.assign({ 'X-Admin-Key': key() }, opts.headers || {});
    if (opts.body != null) headers['Content-Type'] = 'application/json';
    var res = await fetch(new URL(path, api()).toString(), { method: opts.method || 'GET', headers: headers, body: opts.body != null ? JSON.stringify(opts.body) : undefined });
    var text = await res.text();
    var json = null;
    try { json = JSON.parse(text); } catch(e) {}
    return { status: res.status, json: json, text: text, headers: res.headers };
  }
  function filtered(){
    var q = ($('search').value || '').trim().toLowerCase();
    var t = ($('typeFilter').value || '').trim().toLowerCase();
    return packs.filter(function(p){
      var hay = [p.id, p.title, p.author, p.description].join(' ').toLowerCase();
      return (!q || hay.indexOf(q) >= 0) && (!t || String(p.type || '').toLowerCase().indexOf(t) >= 0);
    });
  }
  function renderList(){
    $('statPending').textContent = packs.length;
    $('statRisk').textContent = packs.filter(function(p){ return flags(p).length; }).length;
    $('statMedia').textContent = packs.filter(function(p){ return !!coverUrl(p); }).length;
    var rows = filtered();
    if (!rows.length) {
      $('list').innerHTML = '<div class="empty">没有匹配的待审项。</div>';
      renderDetail();
      return;
    }
    if (!selectedId || !rows.some(function(p){ return String(p.id) === String(selectedId); })) selectedId = rows[0].id;
    $('list').innerHTML = rows.map(function(p){
      var cu = coverUrl(p);
      var f = flags(p).length;
      return '<button class="item' + (String(p.id) === String(selectedId) ? ' on' : '') + '" data-id="' + esc(p.id) + '">' +
        '<div class="thumb">' + (cu ? '<img src="' + esc(cu) + '" alt="">' : esc(String(p.title || p.id || '审').charAt(0))) + '</div>' +
        '<div><div class="ititle">' + esc(p.title || p.id) + '</div>' +
        '<div class="imeta">' + esc(p.id) + '<br>' + esc(typeLabel(p.type)) + ' · ' + esc(p.author || '佚名') + ' · ' + esc(fmtBytes(p.size)) + '</div>' +
        '<div class="badges"><span class="badge">' + esc(p.version || '1.0.0') + '</span>' +
        (f ? '<span class="badge bad">风险 ' + f + '</span>' : '<span class="badge">未标风险</span>') +
        (cu ? '<span class="badge warn">有封面</span>' : '') + '</div></div></button>';
    }).join('');
    Array.prototype.forEach.call(document.querySelectorAll('.item'), function(btn){
      btn.onclick = function(){ selectedId = btn.getAttribute('data-id'); renderList(); renderDetail(); };
    });
    renderDetail();
  }
  function renderDetail(){
    var p = selected();
    if (!p) {
      $('detail').innerHTML = '<div class="empty">暂无待审核投稿。</div>';
      return;
    }
    var cu = coverUrl(p);
    var g = gallery(p);
    var f = flags(p);
    var a = assets(p);
    $('detail').innerHTML =
      '<div class="hero"><div class="cover">' + (cu ? '<img src="' + esc(cu) + '" alt="">' : esc(String(p.title || p.id || '审').charAt(0))) + '</div>' +
      '<div><h2 class="title">' + esc(p.title || p.id) + '</h2>' +
      '<div class="meta"><span>ID ' + esc(p.id) + '</span><span>' + esc(typeLabel(p.type)) + '</span><span>v' + esc(p.version || '1.0.0') + '</span><span>' + esc(fmtBytes(p.size)) + '</span><span>作者 ' + esc(p.author || '佚名') + '</span></div>' +
      '<div class="badges">' + tags(p).map(function(t){ return '<span class="badge">' + esc(t) + '</span>'; }).join('') + '</div>' +
      '<div class="desc">' + esc(p.description || '未填写简介。') + '</div></div></div>' +
      '<div class="actions"><button class="good" id="approveBtn">通过并上架</button><button class="bad" id="rejectBtn">驳回</button><button id="downloadBtn">下载投稿资源包</button><button id="inspectBtn">查看包内容/预览</button><button id="refreshOneBtn">刷新列表</button></div>' +
      '<div class="section"><h2>提交信息</h2><div class="grid2">' +
      kv('文件名', p.fileName || '') + kv('包类型', p.packageKind || 'direct-package') + kv('SHA256', p.sha256 || '') + kv('更新时间', p.updatedAt || '') +
      '</div></div>' +
      (p.releaseNotes ? '<div class="section"><h2>创作者说明</h2><div class="desc">' + esc(p.releaseNotes) + '</div></div>' : '') +
      '<div class="section"><h2>审核风险</h2>' + (f.length ? '<div class="risk bad">' + f.map(function(x){ return '<div>命中规则：' + esc(x.pattern || '') + '<code>' + esc(x.snippet || '') + '</code></div>'; }).join('') + '</div>' : '<div class="risk">未命中自动风险标记。仍建议下载资源包抽查 manifest、版权素材与路径安全。</div>') + '</div>' +
      (g.length ? '<div class="section"><h2>展示图</h2><div class="shots">' + g.map(function(img){ return '<div class="shot"><img src="' + esc(img.url) + '" alt="' + esc(img.name || '') + '"></div>'; }).join('') + '</div></div>' : '') +
      (a.length ? '<div class="section"><h2>资源清单</h2><div class="desc">' + a.map(function(x){ return esc(x.name || ''); }).join(' · ') + '</div></div>' : '') +
      '<div class="section" id="previewSec" style="display:none;"><h2>包内容预览</h2><pre id="preview"></pre></div>';
    $('approveBtn').onclick = function(){ moderate(p.id, 'approve'); };
    $('rejectBtn').onclick = function(){ moderate(p.id, 'reject'); };
    $('downloadBtn').onclick = function(){ downloadPackage(p); };
    $('inspectBtn').onclick = function(){ inspectPackage(p); };
    $('refreshOneBtn').onclick = refresh;
  }
  function kv(k, v){ return '<div class="kv"><small>' + esc(k) + '</small><b>' + esc(v || '未提供') + '</b></div>'; }
  async function refresh(){
    saveSettings();
    if (!key()) { show('先填写管理员密钥。', true); return; }
    $('refreshBtn').disabled = true;
    show('正在拉取待审列表...');
    try {
      var res = await request('admin/workshop/pending');
      if (res.status === 403) { show('管理员密钥错误，或服务端未设置 TIANMING_ADMIN_KEY。', true); return; }
      if (!res.json || !res.json.success) { show('拉取失败：' + ((res.json && res.json.error) || ('HTTP ' + res.status)), true); return; }
      packs = res.json.packs || [];
      selectedId = selectedId || (packs[0] && packs[0].id) || '';
      renderList();
      show('已刷新：' + packs.length + ' 个待审项。');
    } catch(e) {
      show('网络错误：' + (e && e.message || e), true);
    } finally {
      $('refreshBtn').disabled = false;
    }
  }
  async function moderate(id, action){
    var verb = action === 'approve' ? '通过并上架' : '驳回';
    if (!confirm(verb + '《' + id + '》？')) return;
    show('正在' + verb + '...');
    try {
      var res = await request('admin/workshop/moderate', { method:'POST', body:{ id:id, action:action } });
      if (!res.json || !res.json.success) { show(verb + '失败：' + ((res.json && res.json.error) || ('HTTP ' + res.status)), true); return; }
      show('已' + verb + '：' + id);
      packs = packs.filter(function(p){ return String(p.id) !== String(id); });
      selectedId = packs[0] && packs[0].id || '';
      renderList();
    } catch(e) {
      show('网络错误：' + (e && e.message || e), true);
    }
  }
  async function downloadPackage(p){
    show('正在下载投稿资源包...');
    try {
      var res = await fetch(new URL('admin/workshop/file?id=' + encodeURIComponent(p.id), api()).toString(), { headers:{ 'X-Admin-Key': key() } });
      if (res.status !== 200) { show('下载失败：HTTP ' + res.status, true); return; }
      var blob = await res.blob();
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = p.fileName || (p.id + '.tm-pack');
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
      show('已开始下载：' + (p.fileName || p.id));
    } catch(e) {
      show('下载失败：' + (e && e.message || e), true);
    }
  }
  async function inspectPackage(p){
    var sec = $('previewSec'), pre = $('preview');
    sec.style.display = 'block';
    pre.textContent = '正在读取...';
    try {
      var res = await fetch(new URL('admin/workshop/file?id=' + encodeURIComponent(p.id), api()).toString(), { headers:{ 'X-Admin-Key': key() } });
      if (res.status !== 200) { pre.textContent = '读取失败：HTTP ' + res.status; return; }
      var type = res.headers.get('content-type') || '';
      if (type.indexOf('application/json') >= 0 || /\.json$/i.test(p.fileName || '')) {
        var text = await res.text();
        try { pre.textContent = JSON.stringify(JSON.parse(text), null, 2); } catch(e) { pre.textContent = text; }
      } else {
        var blob = await res.blob();
        pre.textContent = '这是二进制资源包，大小 ' + fmtBytes(blob.size) + '。请点击“下载投稿资源包”后检查包内 manifest、路径与素材授权。';
      }
    } catch(e) {
      pre.textContent = '读取失败：' + (e && e.message || e);
    }
  }
  function init(){
    try {
      $('api').value = localStorage.getItem(API_KEY) || DEFAULT_API;
      $('key').value = localStorage.getItem(ADMIN_KEY) || '';
    } catch(e) {
      $('api').value = DEFAULT_API;
    }
    $('refreshBtn').onclick = refresh;
    $('search').oninput = renderList;
    $('typeFilter').oninput = renderList;
    renderList();
  }
  init();
})();
</script>
</body>
</html>
